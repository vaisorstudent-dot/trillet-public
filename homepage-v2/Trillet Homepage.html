deploy-card.enterprise ul li::before { background: var(--brand-highlight); }\n  .lb-deploy-card.agency ul li { color: var(--text-body); }\n  .lb-deploy-card.agency ul li::before { background: var(--brand-secondary); }\n  .lb-deploy-card .card-ctas {\n    margin-top: auto; padding-top: 8px;\n    display: flex; gap: 10px; flex-wrap: wrap;\n    position: relative; z-index: 1;\n  }\n\n  @media (max-width: 1024px) {\n    .lb-panel { grid-template-columns: 1fr; }\n    .lb-intro { grid-template-columns: 1fr; }\n    .lb-deploy-grid { grid-template-columns: 1fr; }\n    .lb-deploy-card { min-height: auto; }\n    .lb-proof-cards { grid-template-columns: repeat(2, 1fr); }\n    .lb-phase-cards { grid-template-columns: repeat(2, 1fr); }\n    .lb-phase-band { height: auto; padding: 8px 0; flex-wrap: wrap; gap: 8px; justify-content: center; }\n    .lb-phase-band::before { display: none; }\n    .lb-compliance-foot { grid-template-columns: 1fr; gap: 24px; align-items: start; }\n    .lb-compliance-actions { justify-content: flex-start; }\n    .lb-close-row { grid-template-columns: 1fr; }\n    .lb-close .ctas { align-items: flex-start; }\n    .lb-close-anchors { grid-template-columns: 1fr; }\n  }\n  @media (max-width: 640px) {\n    .lb-proof-cards { grid-template-columns: 1fr; }\n  }\n\n  /* ========== OPTION A · SINGLE-CALL SPINE ==========\n     Replaces the canonical Anatomy section (band + definition cards + operator console).\n     A single caller — +1 (415) 555-0482 on retail-banking-v3 — is walked through\n     Verify → Ground → Act → Follow-through. Sticky caller card on the left,\n     4 phase panels stacked on the right. IntersectionObserver updates the sticky\n     card's active-phase chip as you scroll.\n     ===================================================================== */\n  .lb-story {\n    background: white; padding: 120px 32px 140px;\n    position: relative;\n  }\n  .lb-story-inner { max-width: var(--page-max); margin: 0 auto; }\n  .lb-story-head { max-width: 720px; margin: 0 auto 80px; text-align: center; }\n  .lb-story-head .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary); margin-bottom: 18px;\n  }\n  .lb-story-head .eyebrow::before {\n    content: ''; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--status-live); box-shadow: 0 0 8px var(--status-live);\n  }\n  .lb-story-head h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(32px, 4vw, 52px);\n    letter-spacing: -0.025em; line-height: 1.05;\n    color: var(--text-primary); margin: 0 0 16px 0;\n  }\n  .lb-story-head p {\n    font-size: 17px; color: var(--text-body); line-height: 1.6;\n    margin: 0;\n  }\n\n  /* 2-col grid: sticky caller card + scroll-through phase stack */\n  .lb-story-grid {\n    display: grid; grid-template-columns: 0.85fr 1.15fr;\n    gap: 64px; align-items: start;\n  }\n  /* Caller card — rolls naturally with the page (per 2026-04-17 user feedback: sticky pinning created stasis; rolling reads as \"you and the caller move through the call together\") */\n  /* Caller column — caller scrolls naturally with the page (Option 2 per 2026-04-17) */\n  .lb-story-caller-col { position: relative; }\n  .lb-story-caller {\n    will-change: transform;\n    background:\n      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(131, 228, 255, 0.12) 0%, transparent 55%),\n      radial-gradient(ellipse 50% 60% at 15% 90%, rgba(39, 163, 253, 0.12) 0%, transparent 60%),\n      linear-gradient(135deg, #0A1938 0%, #14265A 100%);\n    border: 1px solid rgba(131, 228, 255, 0.18);\n    border-radius: 20px;\n    padding: 28px;\n    box-shadow: none;\n    border: var(--card-border-dark);\n    color: white;\n  }\n  .lb-story-caller-head {\n    display: flex; justify-content: space-between; align-items: center;\n    font-size: 11px; color: var(--text-on-dark-muted);\n    letter-spacing: 0.04em;\n    padding-bottom: 18px; margin-bottom: 20px;\n    border-bottom: 1px solid rgba(255,255,255,0.08);\n  }\n  .lb-story-caller-head .dot {\n    width: 6px; height: 6px; border-radius: 50%; background: var(--status-live);\n    display: inline-block; margin-right: 6px; box-shadow: 0 0 8px var(--status-live);\n  }\n  .lb-story-caller-id {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 16px; font-weight: 700; color: white;\n    letter-spacing: 0.02em;\n  }\n  .lb-story-caller-meta {\n    display: flex; flex-direction: column; gap: 2px;\n    margin-top: 6px; font-size: 12px; color: var(--text-on-dark-body);\n  }\n  .lb-story-caller-meta .deployment {\n    font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    color: var(--brand-highlight); letter-spacing: 0.04em;\n  }\n  .lb-story-orb-wrap {\n    display: flex; justify-content: center; align-items: center;\n    padding: 28px 0 20px; position: relative; min-height: 220px;\n  }\n  /* Reuse the orb styling but scoped smaller */\n  .lb-story-caller .orb-aura {\n    width: 170px; height: 170px;\n  }\n  .lb-story-caller .orb-aura::after { inset: -22px; }\n  .lb-story-caller .orb-ring-3 {\n    width: 236px; height: 236px;\n  }\n  .lb-story-caller .orb {\n    width: 150px; height: 150px;\n  }\n  .lb-story-phase-chip {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 14px 16px; border-radius: 12px;\n    background: rgba(255,255,255,0.04);\n    border: 1px solid rgba(255,255,255,0.08);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;\n    text-transform: uppercase;\n    transition: all 400ms ease;\n  }\n  .lb-story-phase-chip .label {\n    display: flex; align-items: center; gap: 10px;\n    color: white;\n  }\n  .lb-story-phase-chip .label .active-dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: var(--status-live);\n    box-shadow: 0 0 10px var(--status-live);\n    animation: pulseDot 1.6s ease-in-out infinite;\n  }\n  @keyframes pulseDot {\n    0%, 100% { opacity: 1; transform: scale(1); }\n    50% { opacity: 0.6; transform: scale(0.85); }\n  }\n  .lb-story-phase-chip[data-phase=\"verify\"] { border-color: rgba(246, 196, 83, 0.45); }\n  .lb-story-phase-chip[data-phase=\"verify\"] .label { color: #F6C453; }\n  .lb-story-phase-chip[data-phase=\"ground\"] { border-color: rgba(72, 207, 132, 0.45); }\n  .lb-story-phase-chip[data-phase=\"ground\"] .label { color: #48CF84; }\n  .lb-story-phase-chip[data-phase=\"act\"] { border-color: rgba(131, 228, 255, 0.45); }\n  .lb-story-phase-chip[data-phase=\"act\"] .label { color: #83E4FF; }\n  .lb-story-phase-chip[data-phase=\"follow\"] { border-color: rgba(168, 132, 255, 0.45); }\n  .lb-story-phase-chip[data-phase=\"follow\"] .label { color: #A884FF; }\n  .lb-story-phase-chip .counter {\n    color: var(--text-on-dark-muted); font-weight: 500; letter-spacing: 0.12em;\n  }\n  .lb-story-timer {\n    margin-top: 14px;\n    display: flex; justify-content: space-between; align-items: center;\n    font-size: 11px; color: var(--text-on-dark-muted);\n    padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);\n  }\n  .lb-story-timer .elapsed {\n    font-family: 'JetBrains Mono', monospace; font-size: 13px;\n    font-weight: 700; color: white; letter-spacing: 0.08em;\n  }\n\n  /* Scroll column — phase panels stacked vertically */\n  .lb-story-phases { display: flex; flex-direction: column; gap: 64px; }\n  .lb-story-phase {\n    min-height: 520px;\n    display: flex; flex-direction: column; gap: 20px;\n    scroll-margin-top: 80px;\n  }\n  .lb-story-phase-header {\n    display: flex; align-items: center; gap: 14px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;\n    text-transform: uppercase;\n  }\n  .lb-story-phase-num {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 32px; height: 32px; border-radius: 8px;\n    font-size: 12px; font-weight: 700; letter-spacing: 0;\n    background: var(--bg-tint); color: var(--brand-primary);\n  }\n  .lb-story-phase[data-phase=\"verify\"] .lb-story-phase-num { background: rgba(246, 196, 83, 0.14); color: #B4831A; }\n  .lb-story-phase[data-phase=\"ground\"] .lb-story-phase-num { background: rgba(72, 207, 132, 0.14); color: #1F8B52; }\n  .lb-story-phase[data-phase=\"act\"] .lb-story-phase-num { background: rgba(2, 98, 233, 0.12); color: var(--brand-primary); }\n  .lb-story-phase[data-phase=\"follow\"] .lb-story-phase-num { background: rgba(168, 132, 255, 0.14); color: #6C4DD6; }\n  .lb-story-phase-header .name { color: var(--text-primary); font-weight: 700; }\n  .lb-story-phase-header .sep { color: var(--border-medium); }\n  .lb-story-phase-header .pledge { color: var(--text-subtle); }\n  .lb-story-phase h3 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(26px, 2.6vw, 36px);\n    line-height: 1.15; letter-spacing: -0.018em;\n    color: var(--text-primary); margin: 0;\n    max-width: 540px;\n  }\n  .lb-story-phase > p {\n    font-size: 16px; line-height: 1.65; color: var(--text-body);\n    max-width: 540px; margin: 0;\n  }\n\n  /* Evidence card — the right-side visual showing what's happening on Trillet's side */\n  .lb-story-evidence {\n    margin-top: 12px;\n    background:\n      linear-gradient(135deg, #0A1938 0%, #14265A 100%);\n    border: 1px solid rgba(131, 228, 255, 0.12);\n    border-radius: 16px;\n    padding: 24px;\n    color: white;\n    box-shadow: none;\n    border: var(--card-border-dark);\n  }\n  .lb-story-evidence-head {\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--text-on-dark-muted);\n    padding-bottom: 14px; margin-bottom: 16px;\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n  }\n  .lb-story-evidence-title { color: var(--brand-highlight); }\n\n  /* Phase-specific evidence layouts */\n  /* Verify: 2FA challenge */\n  .ev-verify {\n    display: grid; grid-template-columns: 1fr; gap: 14px;\n  }\n  .ev-verify-step {\n    display: grid; grid-template-columns: 20px 1fr auto; gap: 12px; align-items: center;\n    padding: 12px 14px; border-radius: 10px;\n    background: rgba(255,255,255,0.03);\n    border: 1px solid rgba(255,255,255,0.05);\n    font-size: 13px; color: var(--text-on-dark-body);\n  }\n  .ev-verify-step .check {\n    width: 18px; height: 18px; border-radius: 50%;\n    background: rgba(72, 207, 132, 0.18);\n    border: 1px solid rgba(72, 207, 132, 0.5);\n    display: flex; align-items: center; justify-content: center;\n  }\n  .ev-verify-step .check svg { width: 10px; height: 10px; color: #48CF84; }\n  .ev-verify-step .time {\n    font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    color: var(--text-on-dark-muted);\n  }\n  .ev-verify-code {\n    display: flex; gap: 8px; justify-content: center;\n    padding: 16px; border-radius: 10px;\n    background: rgba(131, 228, 255, 0.06);\n    border: 1px dashed rgba(131, 228, 255, 0.2);\n  }\n  .ev-verify-code span {\n    width: 36px; height: 46px;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;\n    color: white; background: rgba(255,255,255,0.04);\n    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;\n  }\n\n  /* Ground: live data reads */\n  .ev-ground {\n    display: grid; grid-template-columns: 1fr; gap: 10px;\n  }\n  .ev-ground-row {\n    display: grid; grid-template-columns: 140px 1fr 12px; gap: 14px; align-items: center;\n    padding: 10px 14px; border-radius: 10px;\n    background: rgba(255,255,255,0.03);\n    border: 1px solid rgba(255,255,255,0.05);\n    font-size: 12px;\n  }\n  .ev-ground-row .source {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--brand-highlight);\n  }\n  .ev-ground-row .value { color: var(--text-on-dark-body); font-size: 13px; }\n  .ev-ground-row .pulse {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: #48CF84; box-shadow: 0 0 8px #48CF84;\n  }\n\n  /* Act: actions executed */\n  .ev-act {\n    display: grid; grid-template-columns: 1fr; gap: 10px;\n  }\n  .ev-act-step {\n    display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: center;\n    padding: 12px 14px; border-radius: 10px;\n    background: rgba(131, 228, 255, 0.04);\n    border: 1px solid rgba(131, 228, 255, 0.12);\n    font-size: 13px; color: var(--text-on-dark-body);\n  }\n  .ev-act-step .icon {\n    width: 24px; height: 24px; border-radius: 6px;\n    background: rgba(131, 228, 255, 0.12);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--brand-highlight);\n  }\n  .ev-act-step .status {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;\n    letter-spacing: 0.14em; padding: 4px 8px; border-radius: 6px;\n    background: rgba(72, 207, 132, 0.14); color: #48CF84;\n    border: 1px solid rgba(72, 207, 132, 0.3);\n  }\n  .ev-act-step .label-sub {\n    font-size: 11px; color: var(--text-on-dark-muted);\n    font-family: 'JetBrains Mono', monospace;\n  }\n\n  /* Follow-through: queued + written + routed */\n  .ev-follow {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\n  }\n  .ev-follow-item {\n    padding: 14px; border-radius: 10px;\n    background: rgba(168, 132, 255, 0.05);\n    border: 1px solid rgba(168, 132, 255, 0.18);\n  }\n  .ev-follow-item .kind {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: #A884FF; margin-bottom: 8px;\n  }\n  .ev-follow-item .what {\n    font-size: 13px; color: var(--text-on-dark-body); line-height: 1.45;\n  }\n\n  /* Where most voice agents stop — callout that appears BETWEEN Act and Follow-through\n     (contrast moment: industry ends the call after Act; Trillet's follow-through is where the differentiation lives) */\n  .lb-story-stop-callout {\n    position: relative;\n    margin: 8px auto;\n    padding: 28px 24px 20px;\n    max-width: 580px;\n    text-align: center;\n  }\n  .lb-story-stop-callout::before,\n  .lb-story-stop-callout::after {\n    content: ''; position: absolute; left: 50%; transform: translateX(-50%);\n    width: 1px; height: 28px;\n    background: linear-gradient(to bottom, transparent, rgba(2,58,132,0.3));\n  }\n  .lb-story-stop-callout::before { top: 0; }\n  .lb-story-stop-callout::after {\n    bottom: 0; background: linear-gradient(to top, transparent, rgba(2,58,132,0.3));\n  }\n  .lb-story-stop-callout .line {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--brand-primary);\n    margin-bottom: 6px;\n  }\n  .lb-story-stop-callout .text {\n    font-family: 'Urbanist', sans-serif; font-weight: 500;\n    font-size: 18px; color: var(--text-primary); line-height: 1.35;\n    letter-spacing: -0.01em;\n  }\n  .lb-story-stop-callout .text em {\n    font-style: normal; color: var(--brand-primary);\n  }\n\n  /* PHASE PROGRESS STRIP — in-flow rhythm element (Option 2 per 2026-04-17: no sticky, sits naturally above story grid) */\n  .lb-story-progress-wrap {\n    position: relative; z-index: 1;\n    margin: 40px auto 48px;\n    max-width: 920px;\n    /* sticky needs a container that defines the flow context */\n  }\n  .lb-story-progress {\n    display: flex; gap: 0; align-items: stretch;\n    border-radius: 14px;\n    border: 1px solid var(--border-soft);\n    background: rgba(255,255,255,0.92);\n    backdrop-filter: blur(8px);\n    -webkit-backdrop-filter: blur(8px);\n    overflow: hidden;\n    font-family: 'JetBrains Mono', monospace;\n    box-shadow: none;\n    border: var(--card-border);\n  }\n  .lb-story-progress-step {\n    flex: 1;\n    display: flex; align-items: center; gap: 12px;\n    padding: 16px 20px;\n    border-right: 1px solid var(--border-soft);\n    transition: background 350ms ease, color 350ms ease;\n    position: relative;\n  }\n  .lb-story-progress-step:last-child { border-right: none; }\n  .lb-story-progress-num {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 26px; height: 26px; border-radius: 7px;\n    font-size: 11px; font-weight: 700;\n    background: var(--bg-tint); color: var(--text-subtle);\n    transition: all 350ms ease;\n  }\n  .lb-story-progress-label {\n    font-size: 11px; font-weight: 700; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--text-subtle);\n    transition: color 350ms ease;\n  }\n  /* active step gets phase color */\n  .lb-story-progress-step.is-active[data-phase=\"verify\"] { background: rgba(246,196,83,0.08); }\n  .lb-story-progress-step.is-active[data-phase=\"verify\"] .lb-story-progress-num { background: rgba(246,196,83,0.2); color: #B4831A; }\n  .lb-story-progress-step.is-active[data-phase=\"verify\"] .lb-story-progress-label { color: #B4831A; }\n  .lb-story-progress-step.is-active[data-phase=\"ground\"] { background: rgba(72,207,132,0.08); }\n  .lb-story-progress-step.is-active[data-phase=\"ground\"] .lb-story-progress-num { background: rgba(72,207,132,0.2); color: #1F8B52; }\n  .lb-story-progress-step.is-active[data-phase=\"ground\"] .lb-story-progress-label { color: #1F8B52; }\n  .lb-story-progress-step.is-active[data-phase=\"act\"] { background: rgba(2,98,233,0.08); }\n  .lb-story-progress-step.is-active[data-phase=\"act\"] .lb-story-progress-num { background: rgba(2,98,233,0.18); color: var(--brand-primary); }\n  .lb-story-progress-step.is-active[data-phase=\"act\"] .lb-story-progress-label { color: var(--brand-primary); }\n  .lb-story-progress-step.is-active[data-phase=\"follow\"] { background: rgba(168,132,255,0.08); }\n  .lb-story-progress-step.is-active[data-phase=\"follow\"] .lb-story-progress-num { background: rgba(168,132,255,0.2); color: #6C4DD6; }\n  .lb-story-progress-step.is-active[data-phase=\"follow\"] .lb-story-progress-label { color: #6C4DD6; }\n  /* completed steps — checkmark instead of number */\n  .lb-story-progress-step.is-done .lb-story-progress-num {\n    background: rgba(72,207,132,0.18); color: #1F8B52;\n  }\n\n  /* CALLER CARD ENRICHMENT — per-phase transcript snippet that swaps as user scrolls */\n  .lb-story-caller-transcript {\n    margin-top: 14px;\n    padding: 12px 14px;\n    background: rgba(255,255,255,0.04);\n    border-left: 2px solid rgba(131, 228, 255, 0.5);\n    border-radius: 0 8px 8px 0;\n    font-size: 12px; line-height: 1.5;\n    color: var(--text-on-dark-body);\n    min-height: 56px;\n    transition: opacity 280ms ease;\n  }\n  .lb-story-caller-transcript .speaker {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;\n    color: var(--brand-highlight);\n    text-transform: uppercase;\n    display: block; margin-bottom: 4px;\n  }\n  .lb-story-caller-transcript.is-changing { opacity: 0; }\n  /* Tiny activity row beneath transcript — changes per phase */\n  .lb-story-caller-activity {\n    margin-top: 12px;\n    display: flex; justify-content: space-between; align-items: center;\n    padding: 10px 12px;\n    background: rgba(0,0,0,0.18);\n    border-radius: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n  .lb-story-caller-activity .left { color: var(--text-on-dark-muted); }\n  .lb-story-caller-activity .right { color: white; font-weight: 700; }\n  .lb-story-caller-activity .pulse {\n    display: inline-block; width: 6px; height: 6px; border-radius: 50%;\n    margin-right: 6px; vertical-align: 1px;\n    background: var(--brand-highlight);\n    box-shadow: 0 0 6px var(--brand-highlight);\n    animation: pulseDot 1.4s ease-in-out infinite;\n  }\n\n  /* CLOSURE CARD — appended after follow-through evidence; \"WRAPPED · 04:23\" beat that closes the loop emotionally */\n  .lb-story-closure {\n    margin-top: 32px;\n    padding: 22px 24px;\n    border-radius: 14px;\n    background: linear-gradient(135deg, rgba(72,207,132,0.06) 0%, rgba(2,98,233,0.04) 100%);\n    border: 1px solid rgba(72,207,132,0.22);\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 20px;\n  }\n  .lb-story-closure-left { display: flex; align-items: center; gap: 14px; }\n  .lb-story-closure-icon {\n    width: 36px; height: 36px; border-radius: 10px;\n    background: rgba(72,207,132,0.18);\n    display: inline-flex; align-items: center; justify-content: center;\n    color: #1F8B52;\n  }\n  .lb-story-closure-text {\n    font-family: 'Urbanist', sans-serif; font-weight: 500;\n    font-size: 16px; color: var(--text-primary);\n  }\n  .lb-story-closure-text strong { font-weight: 700; color: #1F8B52; }\n  .lb-story-closure-time {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; font-weight: 700; letter-spacing: 0.14em;\n    color: #1F8B52;\n    padding: 8px 14px; border-radius: 8px;\n    background: rgba(72,207,132,0.12);\n  }\n\n  /* Scale-out bridge line — transitions from \"one call\" to \"1.4M calls\" */\n  .lb-story-scale {\n    margin-top: 80px; text-align: center;\n    padding: 32px 20px 0;\n    border-top: 1px solid rgba(2,58,132,0.08);\n  }\n  .lb-story-scale .lead {\n    font-family: 'Urbanist', sans-serif; font-weight: 500;\n    font-size: clamp(20px, 2vw, 26px);\n    color: var(--text-primary); line-height: 1.4;\n    letter-spacing: -0.01em; max-width: 640px; margin: 0 auto;\n  }\n  .lb-story-scale .lead em {\n    font-style: normal; color: var(--brand-primary); font-weight: 600;\n  }\n\n  @media (max-width: 1024px) {\n    .lb-story-grid { grid-template-columns: 1fr; }\n    .lb-story-caller-col { position: static; }\n    .lb-story-phase { min-height: auto; }\n    .ev-follow { grid-template-columns: 1fr; }\n  }\n\n<\u002Fstyle>\n<style>\n  /* Standalone export: hide dev-only chrome (preview banner, palette explorer, option footer) */\n  .preview-banner, .palette-switcher, .option-footer, #palette-immersion-styles + aside { display: none !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"atm-frames\" data-palette=\"dark\">\n\n<a href=\"#main\" class=\"skip-link\">Skip to main content<\u002Fa>\n\n<div class=\"preview-banner\" style=\"background: #3B1F68;\">\n  <div class=\"label\">🧪 OPTION A · Single-call spine — narrative alternative to v2 locked baseline<\u002Fdiv>\n  <div class=\"links\">\n    <a href=\"homepage-v2.html\">← v2 baseline<\u002Fa>\n    <a class=\"active\" href=\"homepage-v2-option-a.html\">Option A<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<header class=\"site-nav\">\n  <a href=\"locked-baseline.html\" class=\"wordmark\"><img src=\"a955320f-1fde-4282-b6c0-5a628da5f846\" alt=\"Trillet\"><\u002Fa>\n  <nav>\n    <a href=\"../2026-04-16-page-mockups/platform.html\">Platform<\u002Fa>\n    <a href=\"../2026-04-16-page-mockups/enterprise.html\">Enterprise<\u002Fa>\n    <a href=\"../2026-04-16-page-mockups/agency.html\">Agency<\u002Fa>\n    <a href=\"../2026-04-16-page-mockups/agent.html\">Agent<\u002Fa>\n    <a href=\"#\">Sign in<\u002Fa>\n    <a href=\"#\" class=\"cta\">Get started<\u002Fa>\n  <\u002Fnav>\n<\u002Fheader>\n\n<!-- HERO · Option 01's dark navy panel inside light page, with voice-agent orb (brand staple preserved) -->\n<main id=\"main\">\n\n<!-- ═════════════════════════════════════════════════════════════════\n     PALETTE IMMERSION · 2026-04-18\n     Press 1 · 2 · 3 to try different background palettes at full page scale.\n     Hotkeys work anywhere on the page. Current palette is shown bottom-right.\n     Remove this block when a palette is chosen.\n     ═════════════════════════════════════════════════════════════════ -->\n<style id=\"palette-immersion-styles\">\n  /* Palette 2 — Warm editorial (Mercury / Pitch direction) */\n  body[data-palette=\"warm\"] {\n    --ink: #1A1613 !important;\n    --ink-2: #3A3530 !important;\n    --ink-3: #6B645B !important;\n    --ink-4: #9A928A !important;\n    --rule-hair: #EFE9DE !important;\n    --rule-soft: #DDD5C7 !important;\n    --rule-firm: #B8AD9B !important;\n    --surface: #FAF7F1 !important;\n    --surface-rest: #F3EDE0 !important;\n    --bg-dark: #1C1714 !important;\n    --bg-tint: #F3EDE0 !important;\n  }\n  body[data-palette=\"warm\"] .lb-panel,\n  body[data-palette=\"warm\"] .lb-close-inner {\n    background: #1C1714 !important;\n  }\n  body[data-palette=\"warm\"] .lb-proof,\n  body[data-palette=\"warm\"] .lb-story,\n  body[data-palette=\"warm\"] .lb-compliance {\n    background: #FAF7F1 !important;\n  }\n  body[data-palette=\"warm\"] .lb-deploy { background: #F3EDE0 !important; }\n  body[data-palette=\"warm\"] .lb-hero-wrap {\n    background: linear-gradient(to bottom, #FAF7F1 0%, #F3EDE0 100%) !important;\n  }\n  body[data-palette=\"warm\"] .lb-close {\n    background: linear-gradient(to top, #FAF7F1 0%, #F3EDE0 100%) !important;\n  }\n\n  /* Palette 3 — Cold industrial (Linear / Stripe direction) */\n  body[data-palette=\"cold\"] {\n    --ink: #05070E !important;\n    --ink-2: #1A1F2E !important;\n    --ink-3: #4A5064 !important;\n    --ink-4: #7A8196 !important;\n    --rule-hair: #E3E7EE !important;\n    --rule-soft: #CCD2DD !important;\n    --rule-firm: #A1A9B8 !important;\n    --surface: #FFFFFF !important;\n    --surface-rest: #EEF1F6 !important;\n    --bg-dark: #060E24 !important;\n    --bg-tint: #EEF1F6 !important;\n  }\n  body[data-palette=\"cold\"] .lb-panel,\n  body[data-palette=\"cold\"] .lb-close-inner {\n    background: #060E24 !important;\n  }\n  body[data-palette=\"cold\"] .lb-proof,\n  body[data-palette=\"cold\"] .lb-story,\n  body[data-palette=\"cold\"] .lb-compliance {\n    background: #FFFFFF !important;\n  }\n  body[data-palette=\"cold\"] .lb-deploy { background: #EEF1F6 !important; }\n  body[data-palette=\"cold\"] .lb-hero-wrap {\n    background: linear-gradient(to bottom, #FFFFFF 0%, #EEF1F6 100%) !important;\n  }\n  body[data-palette=\"cold\"] .lb-close {\n    background: linear-gradient(to top, #FFFFFF 0%, #EEF1F6 100%) !important;\n  }\n\n  /* Palette 4 — Fully dark (Linear / Vercel homepage territory)\n     Three near-blacks stacked: deep black for Hero/Close panels, a slightly lifted\n     black for the outer page, a slightly cooler black for the alt section (Deploy).\n     Everything inverts — text is off-white, ink colors invert, hairlines become\n     faint whites. The orb becomes the signature light source for the whole page. */\n  body[data-palette=\"dark\"] {\n    --ink: #F5F6FA !important;\n    --ink-2: #C2C6D2 !important;\n    --ink-3: #8A8FA0 !important;\n    --ink-4: #5B6071 !important;\n    --rule-hair: rgba(255,255,255,0.08) !important;\n    --rule-soft: rgba(255,255,255,0.12) !important;\n    --rule-firm: rgba(255,255,255,0.22) !important;\n    --surface: #0B0E17 !important;\n    --surface-rest: #0E1320 !important;\n    --bg-dark: #06080F !important;\n    --bg-tint: #0E1320 !important;\n    --text-primary: #F5F6FA !important;\n    --text-body: #C2C6D2 !important;\n    --text-subtle: #8A8FA0 !important;\n  }\n  body[data-palette=\"dark\"] {\n    background: #0B0E17 !important;\n    color: #F5F6FA !important;\n  }\n  body[data-palette=\"dark\"] .site-nav {\n    background: rgba(11, 14, 23, 0.86) !important;\n    border-bottom-color: rgba(255,255,255,0.08) !important;\n    backdrop-filter: blur(14px);\n  }\n  body[data-palette=\"dark\"] .site-nav a { color: rgba(245,246,250,0.82) !important; }\n  body[data-palette=\"dark\"] .site-nav .cta {\n    background: #F5F6FA !important;\n    color: #06080F !important;\n  }\n  body[data-palette=\"dark\"] .site-nav .wordmark img {\n    filter: invert(1) brightness(1.1);\n  }\n  /* Hero and Close — the deepest black */\n  body[data-palette=\"dark\"] .lb-panel,\n  body[data-palette=\"dark\"] .lb-close-inner {\n    background: #06080F !important;\n    box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) !important;\n  }\n  /* Close panel specifically — deeper than hero + cyan halo underneath to create\n     a \"landing\" moment. The eye should pause when it reaches here. 2026-04-18 iteration. */\n  body[data-palette=\"dark\"] .lb-close-inner {\n    background: #03050E !important;\n    box-shadow:\n      0 40px 80px rgba(0,0,0,0.65),\n      0 0 120px rgba(131, 228, 255, 0.06),\n      0 0 0 1px rgba(255,255,255,0.04) !important;\n    position: relative;\n  }\n  /* Faint cyan atmospheric glow ringing the close panel from beneath —\n     reads as \"this is where we've arrived.\" Very subtle. */\n  body[data-palette=\"dark\"] .lb-close-inner::after {\n    content: '';\n    position: absolute;\n    inset: -40px;\n    background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(131, 228, 255, 0.10), transparent 70%);\n    pointer-events: none;\n    z-index: -1;\n    border-radius: 28px;\n  }\n  /* Hero panel's internal gradient — slightly warm-up from fully-muted (current dark rule) */\n  body[data-palette=\"dark\"] .lb-close-inner::before {\n    background:\n      radial-gradient(ellipse 55% 55% at 12% 85%, rgba(131, 228, 255, 0.18) 0%, transparent 60%),\n      radial-gradient(ellipse 45% 45% at 85% 15%, rgba(2, 58, 132, 0.45) 0%, transparent 55%),\n      radial-gradient(ellipse 30% 30% at 25% 25%, rgba(39, 163, 253, 0.14) 0%, transparent 60%) !important;\n  }\n  /* Outer page sections — slightly lifted black (creates tone-on-tone) */\n  body[data-palette=\"dark\"] .lb-hero-wrap,\n  body[data-palette=\"dark\"] .lb-proof,\n  body[data-palette=\"dark\"] .lb-story,\n  body[data-palette=\"dark\"] .lb-compliance,\n  body[data-palette=\"dark\"] .lb-close {\n    background: #0B0E17 !important;\n    border-top-color: rgba(255,255,255,0.06) !important;\n  }\n  /* Deploy — very slightly cooler tint so it reads as a distinct section */\n  body[data-palette=\"dark\"] .lb-deploy {\n    background: #0E1320 !important;\n    border-top-color: rgba(255,255,255,0.06) !important;\n  }\n  /* Footer inherits the dark tone */\n  body[data-palette=\"dark\"] .site-footer {\n    background: #06080F !important;\n    border-top-color: rgba(255,255,255,0.06) !important;\n    color: rgba(245,246,250,0.72) !important;\n  }\n  body[data-palette=\"dark\"] .site-footer a,\n  body[data-palette=\"dark\"] .site-footer h4 {\n    color: rgba(245,246,250,0.82) !important;\n  }\n  body[data-palette=\"dark\"] .site-footer .footer-mark p {\n    color: rgba(245,246,250,0.58) !important;\n  }\n  body[data-palette=\"dark\"] .site-footer .footer-bar { color: rgba(245,246,250,0.48) !important; }\n  body[data-palette=\"dark\"] .footer-mark img { filter: invert(1) brightness(1.1); }\n\n  /* Proof Ledger in dark mode — the big 1.4M+ counter needs light color */\n  body[data-palette=\"dark\"] .lb-counter {\n    color: #F5F6FA !important;\n    -webkit-text-fill-color: #F5F6FA !important;\n  }\n  body[data-palette=\"dark\"] .lb-counter-label { color: rgba(245,246,250,0.72) !important; }\n  body[data-palette=\"dark\"] .proof-name { color: #F5F6FA !important; }\n  body[data-palette=\"dark\"] .proof-metric { color: #F5F6FA !important; }\n  body[data-palette=\"dark\"] .proof-desc {\n    color: rgba(245,246,250,0.72) !important;\n    border-top-color: rgba(255,255,255,0.08) !important;\n  }\n  body[data-palette=\"dark\"] .proof-metric-label { color: rgba(245,246,250,0.55) !important; }\n  body[data-palette=\"dark\"] .lb-proof-cards {\n    background: rgba(255,255,255,0.06) !important;\n    border-color: rgba(255,255,255,0.08) !important;\n  }\n  body[data-palette=\"dark\"] .lb-proof-card {\n    background: #0B0E17 !important;\n  }\n\n  /* Deploy cards in dark mode — Enterprise stays (already dark); Solo gets dark treatment */\n  body[data-palette=\"dark\"] .lb-deploy-card {\n    background: #0B0E17 !important;\n    border-color: rgba(255,255,255,0.08) !important;\n    color: #F5F6FA !important;\n  }\n  body[data-palette=\"dark\"] .lb-deploy-card .card-body,\n  body[data-palette=\"dark\"] .lb-deploy-card ul li {\n    color: rgba(245,246,250,0.78) !important;\n  }\n  body[data-palette=\"dark\"] .lb-deploy-card h3 { color: #F5F6FA !important; }\n  /* Keep the Agency sky-blue card readable in dark mode — it's meant to be a pop */\n  body[data-palette=\"dark\"] .lb-deploy-card.agency {\n    background: #7DC3EA !important;\n    color: #0B1220 !important;\n  }\n\n  /* Story section in dark mode */\n  body[data-palette=\"dark\"] .lb-story-phase h3,\n  body[data-palette=\"dark\"] .lb-story-phase .lb-story-phase-num,\n  body[data-palette=\"dark\"] .lb-story-phase-header .label {\n    color: #F5F6FA !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-phase > p {\n    color: rgba(245,246,250,0.78) !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-phase .lb-story-phase-num {\n    border-color: rgba(255,255,255,0.22) !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-stop-callout .text {\n    color: rgba(245,246,250,0.82) !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-stop-callout .text em { color: #F5F6FA !important; }\n  body[data-palette=\"dark\"] .lb-story-stop-callout {\n    border-top-color: rgba(255,255,255,0.08) !important;\n    border-bottom-color: rgba(255,255,255,0.08) !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-scale {\n    border-top-color: rgba(255,255,255,0.08) !important;\n  }\n  body[data-palette=\"dark\"] .lb-story-scale .lead {\n    color: #F5F6FA !important;\n  }\n\n  /* Compliance in dark mode */\n  body[data-palette=\"dark\"] .compliance-pill {\n    background: #0B0E17 !important;\n    border-color: rgba(255,255,255,0.12) !important;\n    color: rgba(245,246,250,0.82) !important;\n  }\n  body[data-palette=\"dark\"] .compliance-pill.live { color: #F5F6FA !important; }\n  body[data-palette=\"dark\"] .compliance-pill.flight { color: rgba(245,246,250,0.62) !important; }\n\n  /* Section heads — H2 color, lede color */\n  body[data-palette=\"dark\"] .lb-proof-head h2,\n  body[data-palette=\"dark\"] .lb-deploy-head h2,\n  body[data-palette=\"dark\"] .lb-story-head h2,\n  body[data-palette=\"dark\"] .lb-compliance-head h2 {\n    color: #F5F6FA !important;\n  }\n  body[data-palette=\"dark\"] .lb-proof-head p,\n  body[data-palette=\"dark\"] .lb-deploy-head p,\n  body[data-palette=\"dark\"] .lb-story-head p,\n  body[data-palette=\"dark\"] .lb-compliance-head p {\n    color: rgba(245,246,250,0.72) !important;\n  }\n\n  /* Eyebrow dot motif — glows more prominently against dark */\n  body[data-palette=\"dark\"] .lb-proof-head .eyebrow::before,\n  body[data-palette=\"dark\"] .lb-deploy-head .eyebrow::before,\n  body[data-palette=\"dark\"] .lb-story-head .eyebrow::before,\n  body[data-palette=\"dark\"] .lb-compliance .eyebrow::before {\n    box-shadow:\n      0 0 14px rgba(131, 228, 255, 0.75),\n      0 0 0 3px rgba(131, 228, 255, 0.22) !important;\n  }\n  /* Eyebrow label also needs to be readable */\n  body[data-palette=\"dark\"] .lb-proof-head .eyebrow,\n  body[data-palette=\"dark\"] .lb-deploy-head .eyebrow,\n  body[data-palette=\"dark\"] .lb-story-head .eyebrow,\n  body[data-palette=\"dark\"] .lb-compliance .eyebrow {\n    color: rgba(245,246,250,0.78) !important;\n  }\n\n  /* Hero panel's internal gradient — darker version; reduce atmospheric washes */\n  body[data-palette=\"dark\"] .lb-panel::before {\n    background:\n      radial-gradient(ellipse 55% 55% at 8% 92%, rgba(0,0,0,0.45) 0%, transparent 55%),\n      radial-gradient(ellipse 40% 40% at 40% 30%, rgba(0,0,0,0.25) 0%, transparent 70%) !important;\n  }\n\n  /* Kill the tonal-continuity bleeds (they were designed for light mode) */\n  body[data-palette=\"dark\"] .lb-proof::before,\n  body[data-palette=\"dark\"] .lb-compliance::before {\n    display: none !important;\n  }\n\n  /* Close agenda strip — already designed for dark navy, works as-is */\n\n  /* Card hover state in dark — border brightens to cyan (same as light) */\n  body[data-palette=\"dark\"] .lb-proof-card:hover,\n  body[data-palette=\"dark\"] .lb-deploy-card:hover,\n  body[data-palette=\"dark\"] .lb-story-evidence:hover {\n    border-color: rgba(131, 228, 255, 0.55) !important;\n  }\n\n  /* ═ Dark palette — atm-frames panel overrides ═\n     The atm-frames mode paints ::before pseudo-elements WHITE on Deploy/Story/Compliance/Proof\n     sections, creating rounded white \"panels\" inside the section background. Those completely\n     break dark mode. Force them dark. */\n  body[data-palette=\"dark\"].atm-frames .lb-proof::before,\n  body[data-palette=\"dark\"].atm-frames .lb-deploy::before,\n  body[data-palette=\"dark\"].atm-frames .lb-story::before,\n  body[data-palette=\"dark\"].atm-frames .lb-compliance::before {\n    background: transparent !important;\n    box-shadow: none !important;\n    border-color: rgba(255,255,255,0.06) !important;\n  }\n  /* Also catch any atm-frames ::after rules */\n  body[data-palette=\"dark\"].atm-frames .lb-proof::after,\n  body[data-palette=\"dark\"].atm-frames .lb-deploy::after,\n  body[data-palette=\"dark\"].atm-frames .lb-story::after,\n  body[data-palette=\"dark\"].atm-frames .lb-compliance::after {\n    background: transparent !important;\n    color: rgba(255,255,255,0.28) !important;\n  }\n\n  /* Agency card in dark mode — text is already dark ink (which is correct against\n     sky blue) but we need to explicitly force it since the dark palette's inverted\n     ink variables would otherwise make text nearly white. */\n  body[data-palette=\"dark\"] .lb-deploy-card.agency * {\n    color: #0B1220 !important;\n  }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency h3 { color: #0B1220 !important; }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency .card-body { color: rgba(11, 18, 32, 0.82) !important; }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency ul li { color: rgba(11, 18, 32, 0.82) !important; }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency .card-eyebrow { color: #0B2540 !important; }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency .cta-primary {\n    background: #0B1220 !important;\n    color: #FFFFFF !important;\n  }\n  body[data-palette=\"dark\"] .lb-deploy-card.agency ul li::before { background: #0B2540 !important; }\n\n  /* Close agenda strip — it's INSIDE the now-dark close panel, hairlines need to\n     adjust since the strip's own dividers are already white-alpha. No changes needed\n     but make sure the numbers stay cyan and times stay readable. */\n  body[data-palette=\"dark\"] .lb-close-agenda .beat,\n  body[data-palette=\"dark\"] .lb-close-agenda .min {\n    /* These already use white in the base CSS; keep as-is. */\n  }\n\n  /* Site nav logo — keep ORIGINAL colors (user explicitly requested) */\n  body[data-palette=\"dark\"] .site-nav .wordmark img {\n    filter: none !important;\n  }\n  /* Footer mark logo — also original colors */\n  body[data-palette=\"dark\"] .footer-mark img {\n    filter: none !important;\n  }\n\n  /* Floating palette switcher */\n  .palette-switcher {\n    position: fixed;\n    bottom: 24px;\n    right: 24px;\n    z-index: 9999;\n    background: rgba(10, 15, 30, 0.95);\n    color: white;\n    padding: 14px 18px;\n    border-radius: 12px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    line-height: 1.8;\n    letter-spacing: 0.06em;\n    box-shadow: 0 12px 32px rgba(0,0,0,0.3);\n    backdrop-filter: blur(12px);\n    border: 1px solid rgba(255,255,255,0.1);\n    min-width: 240px;\n  }\n  .palette-switcher .ps-title {\n    font-weight: 700; text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: rgba(131,228,255,0.9);\n    margin-bottom: 10px; font-size: 10px;\n  }\n  .palette-switcher .ps-item {\n    display: flex; align-items: center; gap: 10px;\n    cursor: pointer;\n    padding: 6px 8px; margin: 0 -8px;\n    border-radius: 6px;\n    color: rgba(255,255,255,0.7);\n    transition: all 160ms;\n    user-select: none;\n  }\n  .palette-switcher .ps-item:hover {\n    color: white; background: rgba(255,255,255,0.06);\n  }\n  .palette-switcher .ps-item.active {\n    color: white; background: rgba(131,228,255,0.12);\n  }\n  .palette-switcher .ps-key {\n    width: 22px; height: 22px;\n    border-radius: 4px;\n    background: rgba(255,255,255,0.08);\n    display: inline-flex; align-items: center; justify-content: center;\n    font-weight: 700; font-size: 11px;\n    flex-shrink: 0;\n  }\n  .palette-switcher .ps-item.active .ps-key {\n    background: rgba(131,228,255,0.25);\n    color: rgba(131,228,255,1);\n  }\n  .palette-switcher .ps-hint {\n    font-size: 9px;\n    color: rgba(255,255,255,0.4);\n    margin-top: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n  }\n<\u002Fstyle>\n\n<aside class=\"palette-switcher\" aria-label=\"Palette switcher\">\n  <div class=\"ps-title\">Palette explorer<\u002Fdiv>\n  <div class=\"ps-item active\" data-palette-btn=\"current\"><span class=\"ps-key\">1<\u002Fspan><span>Current · navy + cool<\u002Fspan><\u002Fdiv>\n  <div class=\"ps-item\" data-palette-btn=\"warm\"><span class=\"ps-key\">2<\u002Fspan><span>Warm editorial<\u002Fspan><\u002Fdiv>\n  <div class=\"ps-item\" data-palette-btn=\"cold\"><span class=\"ps-key\">3<\u002Fspan><span>Cold industrial<\u002Fspan><\u002Fdiv>\n  <div class=\"ps-item\" data-palette-btn=\"dark\"><span class=\"ps-key\">4<\u002Fspan><span>Fully dark<\u002Fspan><\u002Fdiv>\n  <div class=\"ps-hint\">Press 1 · 2 · 3 · 4 anywhere<\u002Fdiv>\n<\u002Faside>\n\n<script>\n(() => {\n  const btns = document.querySelectorAll('[data-palette-btn]');\n  function setPalette(p) {\n    if (p === 'current') document.body.removeAttribute('data-palette');\n    else document.body.setAttribute('data-palette', p);\n    btns.forEach(b => b.classList.toggle('active', b.dataset.paletteBtn === p));\n    try { localStorage.setItem('trillet-palette-explorer', p); } catch(e) {}\n  }\n  btns.forEach(b => b.addEventListener('click', () => setPalette(b.dataset.paletteBtn)));\n  document.addEventListener('keydown', (e) => {\n    if (e.target.matches('input, textarea, [contenteditable]')) return;\n    if (e.key === '1') setPalette('current');\n    else if (e.key === '2') setPalette('warm');\n    else if (e.key === '3') setPalette('cold');\n    else if (e.key === '4') setPalette('dark');\n  });\n  try {\n    const saved = localStorage.getItem('trillet-palette-explorer');\n    if (saved && saved !== 'current') setPalette(saved);\n  } catch(e) {}\n})();\n<\u002Fscript>\n<!-- END PALETTE IMMERSION ═════════════════════════════════════════════ -->\n\n<!-- PAGE SPINE · persistent left-edge marker that runs across all sections.\n     A thin vertical hairline with 5 anchor marks (§ 01 → § 05) for Proof / Deploy /\n     Story / Compliance / Close. As you scroll, the active section's anchor brightens\n     to cyan and its label becomes fully opaque. This is the page's fingerprint —\n     one continuous thread that ties the sections into a single scroll.\n     2026-04-18 cohesion pass. -->\n<nav class=\"page-spine\" aria-label=\"Page sections\" data-spine=\"\">\n  <span class=\"page-spine-rule\" aria-hidden=\"true\"><\u002Fspan>\n  <a class=\"page-spine-mark\" href=\"#proof\" data-spine-mark=\"proof\" data-spine-num=\"01\">\n    <span class=\"page-spine-dot\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"page-spine-label\"><span class=\"num\">§ 01<\u002Fspan><span class=\"name\">Production signal<\u002Fspan><\u002Fspan>\n  <\u002Fa>\n  <a class=\"page-spine-mark\" href=\"#deploy\" data-spine-mark=\"deploy\" data-spine-num=\"02\">\n    <span class=\"page-spine-dot\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"page-spine-label\"><span class=\"num\">§ 02<\u002Fspan><span class=\"name\">Deployment paths<\u002Fspan><\u002Fspan>\n  <\u002Fa>\n  <a class=\"page-spine-mark\" href=\"#story\" data-spine-mark=\"story\" data-spine-

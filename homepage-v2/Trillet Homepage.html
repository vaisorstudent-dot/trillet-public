document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Urbanist';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"077338ed-49aa-4775-83b1-978e16a8190c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Urbanist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b3e05478-ae2a-4372-bbdc-20f20b52620a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Urbanist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"077338ed-49aa-4775-83b1-978e16a8190c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* Shared styles for Strategy B mockups · 2026-04-16 */\n/* Anchors preserved: brand blues, Inter, Urbanist family, dark-hero-pattern, brand motion */\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n\n/* ─────────────  Validation pass HIGH must-fixes (per ui-ux-pro-max audit)  ───────────── */\n/* 1. Focus-visible — keyboard navigation accessibility (HIGH severity per skill) */\n:focus { outline: none; }\n:focus-visible {\n  outline: 2px solid var(--brand-secondary, #27A3FD);\n  outline-offset: 2px;\n  border-radius: 4px;\n}\n.on-dark :focus-visible,\n.lb-panel :focus-visible,\n.op-console :focus-visible,\n.site-nav-dark :focus-visible {\n  outline-color: var(--brand-highlight, #83E4FF);\n}\n/* 2. Reduced motion — respect user preference (HIGH severity per skill) */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n    scroll-behavior: auto !important;\n  }\n}\n/* 3. Cursor on interactive elements */\nbutton { cursor: pointer; }\nbutton:disabled { cursor: not-allowed; }\n\n/* Skip-to-main link (Medium severity per skill, accessibility win) */\n.skip-link {\n  position: absolute; left: -9999px; top: 0; z-index: 999;\n  padding: 12px 18px; background: var(--brand-primary, #0062E9); color: white;\n  font-weight: 600; border-radius: 0 0 8px 0;\n}\n.skip-link:focus { left: 0; }\n\nbody {\n  font-family: 'Inter', system-ui, -apple-system, sans-serif;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  margin: 0;\n  color: #1E293B;\n  background: #FFFFFF;\n  line-height: 1.5;\n}\na { color: inherit; text-decoration: none; }\n\n:root {\n  /* Brand blues (anchored, unchanged) */\n  --brand-deep: #023A84;\n  --brand-primary: #0062E9;\n  --brand-secondary: #27A3FD;\n  --brand-highlight: #83E4FF;\n  /* Backgrounds */\n  --bg-white: #FFFFFF;\n  --bg-tint: #ECF1FD;     /* The pale-blue tint section bg, anchored from current site */\n  --bg-dark: #0A0F1E;      /* The dark hero-panel bg, anchored from current site */\n  --bg-dark-deeper: #050810;\n  /* Text */\n  --text-primary: #0A0F1E;\n  --text-body: #475569;\n  --text-muted: #94A3B8;\n  --text-on-dark: rgba(255,255,255,0.96);\n  --text-on-dark-body: rgba(255,255,255,0.78);\n  --text-on-dark-muted: rgba(255,255,255,0.5);\n  /* Borders */\n  --border-light: #E2E8F0;\n  --border-dark: rgba(255,255,255,0.10);\n  /* Status (existing usage preserved) */\n  --status-live: #10B981;\n  --status-eval: #F59E0B;\n  /* Radius */\n  --radius: 8px;\n}\n\n/* ─────────────  Top preview banner (mockup nav between options)  ───────────── */\n.preview-banner {\n  background: #050810; color: rgba(255,255,255,0.92);\n  font-size: 12px; font-weight: 500;\n  padding: 10px 24px;\n  display: flex; justify-content: space-between; align-items: center;\n  position: sticky; top: 0; z-index: 100;\n  border-bottom: 1px solid rgba(255,255,255,0.06);\n}\n.preview-banner .label { letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.55; }\n.preview-banner .links { display: flex; gap: 8px; align-items: center; }\n.preview-banner .links a {\n  padding: 5px 11px; border-radius: 6px; font-size: 11px;\n  transition: background 0.15s;\n}\n.preview-banner .links a:hover { background: rgba(255,255,255,0.08); }\n.preview-banner .links a.active { background: var(--brand-primary); color: white; }\n\n/* ─────────────  Site nav  ───────────── */\n.site-nav {\n  height: 68px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 32px;\n  border-bottom: 1px solid var(--border-light);\n  background: rgba(255, 255, 255, 0.92);\n  backdrop-filter: blur(20px);\n  position: sticky; top: 38px; z-index: 90;\n}\n.site-nav .wordmark img { height: 26px; display: block; }\n.site-nav nav { display: flex; gap: 28px; align-items: center; }\n.site-nav nav a {\n  font-size: 14px; font-weight: 500; color: var(--text-body);\n  transition: color 0.15s;\n}\n.site-nav nav a:hover { color: var(--brand-primary); }\n.site-nav .cta {\n  background: var(--brand-primary); color: white;\n  padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;\n  transition: background 0.15s;\n}\n.site-nav .cta:hover { background: var(--brand-deep); }\n\n/* Dark variant of site nav (for full-dark hero options) */\n.site-nav-dark {\n  background: rgba(5, 8, 16, 0.85);\n  border-bottom-color: rgba(255,255,255,0.06);\n}\n.site-nav-dark .wordmark img { filter: brightness(0) invert(1) brightness(0.95); }\n.site-nav-dark nav a { color: rgba(255,255,255,0.78); }\n.site-nav-dark nav a:hover { color: var(--brand-highlight); }\n.site-nav-dark .cta { background: white; color: var(--bg-dark); }\n.site-nav-dark .cta:hover { background: var(--brand-highlight); }\n\n/* ─────────────  Trifecta pills  ───────────── */\n.tri-pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 6px 13px; border-radius: 999px;\n  border: 1px solid var(--border-light); background: white;\n  font-size: 13px; font-weight: 500; color: var(--text-primary);\n}\n.tri-pill .d {\n  width: 5px; height: 5px; border-radius: 50%;\n  background: var(--brand-secondary);\n}\n.tri-pill.on-dark {\n  border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);\n  color: var(--text-on-dark-body);\n}\n.tri-pill.on-dark .d { background: var(--brand-highlight); }\n\n/* ─────────────  CTAs  ───────────── */\n.cta-primary {\n  display: inline-flex; align-items: center; gap: 8px;\n  background: var(--brand-primary); color: white;\n  padding: 13px 22px; border-radius: 10px;\n  font-size: 14px; font-weight: 600;\n  transition: background 0.15s, transform 0.15s;\n}\n.cta-primary:hover { background: var(--brand-deep); transform: translateY(-1px); }\n.cta-secondary {\n  display: inline-flex; align-items: center; gap: 8px;\n  background: white; color: var(--text-primary);\n  border: 1px solid var(--border-light);\n  padding: 13px 22px; border-radius: 10px;\n  font-size: 14px; font-weight: 600;\n  transition: background 0.15s;\n}\n.cta-secondary:hover { background: var(--bg-tint); }\n.cta-primary.on-dark { background: white; color: var(--bg-dark); }\n.cta-primary.on-dark:hover { background: var(--brand-highlight); }\n.cta-secondary.on-dark {\n  background: transparent; color: var(--text-on-dark);\n  border-color: rgba(255,255,255,0.18);\n}\n.cta-secondary.on-dark:hover { background: rgba(255,255,255,0.06); }\n\n/* ─────────────  Status pill  ───────────── */\n.status-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--text-muted);\n}\n.status-pill.on-dark { color: rgba(255,255,255,0.56); }\n.status-pill .dot-wrap { position: relative; display: inline-flex; width: 6px; height: 6px; }\n.status-pill .ping {\n  position: absolute; inset: 0; border-radius: 50%; background: var(--status-live);\n  opacity: 0.6; animation: ping 1.6s cubic-bezier(0,0,0.2,1) infinite;\n}\n.status-pill .core {\n  position: relative; display: inline-flex; width: 6px; height: 6px;\n  border-radius: 50%; background: var(--status-live);\n}\n@keyframes ping { 75%, 100% { transform: scale(2.2); opacity: 0; } }\n\n/* ─────────────  Heading typography (Urbanist 600, the bold-move evolution)  ───────────── */\n.h1-display {\n  font-family: 'Urbanist', system-ui, sans-serif;\n  font-weight: 600;\n  letter-spacing: -0.025em;\n  line-height: 1.0;\n  margin: 0;\n  text-wrap: balance;\n}\n.h1-display.on-dark { color: var(--text-on-dark); }\n.h1-display.on-light { color: var(--text-primary); }\n.h2-display {\n  font-family: 'Urbanist', system-ui, sans-serif;\n  font-weight: 600;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  margin: 0;\n}\n\n.body-l2 {\n  font-size: clamp(15px, 1.4vw, 19px);\n  line-height: 1.6;\n  font-weight: 400;\n}\n.body-l2.on-dark { color: var(--text-on-dark-body); }\n.body-l2.on-light { color: var(--text-body); }\n\n/* ─────────────  Brand glow (anchor: glowingBorder pulse from current site)  ───────────── */\n.brand-glow {\n  border: 1px solid rgba(0, 98, 233, 0.5);\n  animation: brandGlow 1.5s ease-in-out infinite;\n}\n@keyframes brandGlow {\n  0%, 100% { border-color: rgba(0, 98, 233, 0.5); box-shadow: 0 0 10px rgba(0, 98, 233, 0.5); }\n  50% { border-color: rgba(0, 98, 233, 1); box-shadow: 0 0 20px rgba(0, 98, 233, 1); }\n}\n\n/* ─────────────  Operator console (recurring product UI motif — Strategy B's \"one bold move\")  ───────────── */\n.op-console {\n  background: var(--bg-dark);\n  border: 1px solid var(--border-dark);\n  border-radius: 16px;\n  overflow: hidden;\n  box-shadow: 0 24px 64px rgba(2, 58, 132, 0.30);\n}\n.op-console-head {\n  padding: 16px 22px;\n  display: flex; justify-content: space-between; align-items: center;\n  border-bottom: 1px solid var(--border-dark);\n  background: rgba(255,255,255,0.015);\n}\n.op-console-head .title {\n  font-size: 12px; font-weight: 600; color: var(--text-on-dark);\n  display: flex; align-items: center; gap: 10px;\n}\n.op-console-head .live-pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;\n  letter-spacing: 0.14em; text-transform: uppercase;\n  padding: 4px 10px; border-radius: 999px;\n  background: rgba(131, 228, 255, 0.12); color: var(--brand-highlight);\n  border: 1px solid rgba(131, 228, 255, 0.25);\n  box-shadow: 0 0 16px rgba(131, 228, 255, 0.15);\n}\n.op-console-head .live-pill .d {\n  width: 5px; height: 5px; border-radius: 50%; background: var(--status-live);\n  box-shadow: 0 0 6px var(--status-live);\n}\n.op-row {\n  padding: 13px 22px;\n  display: grid; grid-template-columns: 1fr auto;\n  gap: 12px; align-items: center;\n  border-bottom: 1px solid rgba(255,255,255,0.04);\n}\n.op-row:last-child { border-bottom: none; }\n.op-row .phone {\n  font-family: 'JetBrains Mono', monospace; font-size: 13px;\n  color: var(--text-on-dark); font-variant-numeric: tabular-nums;\n}\n.op-row .meta {\n  font-size: 11px; color: var(--text-on-dark-muted); margin-top: 2px;\n}\n.op-row .meta .status {\n  font-family: 'JetBrains Mono', monospace; font-weight: 600; letter-spacing: 0.08em;\n}\n.op-row .meta .status.verify { color: var(--status-eval); }\n.op-row .meta .status.ground { color: var(--status-live); }\n.op-row .meta .status.act { color: var(--status-live); }\n.op-row .duration {\n  font-family: 'JetBrains Mono', monospace; font-size: 12px;\n  color: var(--text-on-dark-body); font-variant-numeric: tabular-nums;\n}\n\n/* ─────────────  Voice waveform (anchor: voice-first identity preserved)  ───────────── */\n.waveform {\n  display: flex; align-items: center; justify-content: center;\n  gap: 3px; height: 80px;\n}\n.waveform span {\n  display: inline-block; width: 3px;\n  background: linear-gradient(to top, var(--brand-secondary), var(--brand-highlight));\n  border-radius: 3px;\n  animation: wv 1.8s ease-in-out infinite;\n  box-shadow: 0 0 10px rgba(131, 228, 255, 0.4);\n}\n@keyframes wv {\n  0%, 100% { transform: scaleY(0.2); opacity: 0.5; }\n  50% { transform: scaleY(1); opacity: 1; }\n}\n\n/* ─────────────  Pale-blue tint section (anchor: rest rhythm from current site)  ───────────── */\n.section-tint { background: var(--bg-tint); }\n\n/* ─────────────  Generic section padding  ───────────── */\n.section-pad { padding: 96px 32px; }\n.section-pad-large { padding: 128px 32px; }\n.container { max-width: 1456px; margin: 0 auto; }\n.container-tight { max-width: 1160px; margin: 0 auto; }\n.container-narrow { max-width: 760px; margin: 0 auto; }\n\n/* ─────────────  Trust strip  ───────────── */\n.trust-strip {\n  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 1px;\n  background: var(--border-light);\n  border: 1px solid var(--border-light);\n  border-radius: 16px; overflow: hidden;\n}\n.trust-cell {\n  background: white; padding: 28px 32px;\n}\n.trust-cell .top {\n  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;\n}\n.trust-cell .top .icon {\n  width: 32px; height: 32px; border-radius: 8px;\n  background: rgba(0, 98, 233, 0.08); color: var(--brand-primary);\n  display: flex; align-items: center; justify-content: center;\n}\n.trust-cell .top .name { font-size: 14px; font-weight: 600; color: var(--text-primary); }\n.trust-cell .desc { font-size: 13px; color: var(--text-body); line-height: 1.55; }\n\n/* ─────────────  Footer  ───────────── */\n.site-footer {\n  background: var(--bg-tint);\n  padding: 80px 32px 40px;\n  border-top: 1px solid var(--border-light);\n}\n.footer-inner {\n  max-width: 1456px; margin: 0 auto;\n  display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;\n  gap: 48px;\n  margin-bottom: 64px;\n}\n.footer-mark {\n  display: flex; flex-direction: column; gap: 18px;\n}\n.footer-mark img {\n  height: 38px; width: auto; display: block;\n}\n.footer-mark p {\n  font-size: 13px; color: var(--text-body); line-height: 1.6;\n  margin: 0; max-width: 280px;\n}\n.footer-col h4 {\n  font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--text-muted); margin: 0 0 16px 0;\n}\n.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }\n.footer-col ul a { font-size: 14px; color: var(--text-body); transition: color 0.15s; }\n.footer-col ul a:hover { color: var(--brand-primary); }\n.footer-bar {\n  max-width: 1456px; margin: 0 auto;\n  padding-top: 32px; border-top: 1px solid var(--border-light);\n  display: flex; justify-content: space-between; align-items: center;\n  font-size: 12px; color: var(--text-muted);\n}\n.footer-bar nav { display: flex; gap: 24px; }\n\n@media (max-width: 1024px) {\n  .footer-inner { grid-template-columns: 1fr 1fr; }\n}\n@media (max-width: 640px) {\n  .footer-inner { grid-template-columns: 1fr; }\n  .site-nav nav a:not(.cta) { display: none; }\n  .preview-banner { flex-direction: column; gap: 6px; padding: 8px 16px; }\n}\n\n/* ─────────────  Option-footer marker  ───────────── */\n.option-footer {\n  background: #050810; padding: 36px 32px; text-align: center;\n  font-size: 13px; color: rgba(255,255,255,0.6);\n}\n.option-footer a { color: var(--brand-highlight); font-weight: 500; }\n.option-footer a:hover { color: white; }\n\n/* ─────────────  Reusable \"footer\" block (drop-in to each option page)  ───────────── */\n<\u002Fstyle>\n<style>\n  /* ═══════════════════════════════════════════════════════════════════\n   * COHESION PASS (2026-04-18) — layered over existing wireframe.\n   * Unifies card vocab, collapses palette, replaces phase-color coding\n   * with weight hierarchy, upgrades type scale, kills redundant chrome.\n   * ═══════════════════════════════════════════════════════════════════ */\n  :root {\n    --ink: #0A0F1E;\n    --ink-2: #2E3448;\n    --ink-3: #5E6678;\n    --ink-4: #8A91A3;\n    --rule-hair: #E8ECF3;\n    --rule-soft: #D8DEEA;\n    --rule-firm: #B8C1D4;\n    --surface: #FFFFFF;\n    --surface-rest: #F4F6FB;\n    --live: #10B981;\n    --shadow-card: 0 1px 2px rgba(10,15,30,0.04), 0 8px 24px rgba(10,15,30,0.06);\n    --shadow-dark: 0 32px 80px rgba(2,58,132,0.22);\n    --radius-card: 14px;\n    --radius-inline: 8px;\n    --section-pad: 128px;\n\n    /* Page grid — all sections share this max-width (2026-04-18 cohesion pass).\n       Prior drift: 1160 / 1280 / 1360. One canvas now. Matches the hero panel's\n       max-width so content is visually drawn on one invisible sheet. */\n    --page-max: 1360px;\n\n    /* Section rhythm — every section head uses the SAME spacing scale\n       (2026-04-18 cohesion pass). Makes sections feel like chapters from the\n       same author, not independent blocks. Applied via a unified rule below. */\n    --space-eyebrow-to-h2: 22px;\n    --space-h2-to-lede: 16px;\n    --space-head-to-body: 56px;\n\n    /* Motion — unified micro-interaction timing (2026-04-18 premium polish pass).\n       Use --t-snap for all hover/tap micro-interactions (color, background, border,\n       transform, box-shadow, opacity on interactive elements). Larger state changes\n       like phase transitions or transcript swaps keep their own longer timings. */\n    --t-snap: 160ms cubic-bezier(0.4, 0, 0.2, 1);\n\n    /* Focus ring — one designed focus state for all interactive elements.\n       2px cyan ring with 2px offset. Applied via a universal rule below. */\n    --focus-ring: 0 0 0 2px var(--surface), 0 0 0 4px var(--brand-highlight, #83E4FF);\n    --focus-ring-dark: 0 0 0 2px var(--bg-dark, #0A1630), 0 0 0 4px var(--brand-highlight, #83E4FF);\n\n    /* Card idiom — hairline over shadow (2026-04-18 commit).\n       Cards use 1px rules + subtle surface shift, not soft drop shadows.\n       Exception: hero .lb-panel keeps its shadow as the one \"floating\" moment.\n       Signature hover: border brightens to cyan + 1px lift. */\n    --card-border: 1px solid var(--rule-hair);\n    --card-border-dark: 1px solid rgba(255, 255, 255, 0.08);\n    --card-border-hover: 1px solid rgba(131, 228, 255, 0.55);\n    --card-lift: translateY(-1px);\n  }\n\n  /* ===== PREMIUM POLISH PASS · 2026-04-18 =====\n     Three surgical moves:\n     1) Tabular numerals on all numeric display type — counter, metrics, times, IDs\n     2) Unified transition timing via --t-snap\n     3) Designed focus states on every interactive element\n     These are invisible individually but collectively tighten the page. */\n\n  /* 1 · Tabular numerals everywhere numbers appear as data.\n     Applied broadly but safely — proportional figures still work for body copy. */\n  .lb-counter,\n  .proof-metric,\n  .lb-hero-proof-item .v,\n  .lb-story-phase-num,\n  .lb-story-caller-head,\n  #lb-story-duration,\n  .lb-story-caller-id,\n  .lb-story-chip-counter,\n  .lb-close-agenda .num,\n  .lb-close-agenda .min,\n  .lb-story-closure-time,\n  .lb-story-phase-counter,\n  .eyebrow .chap,\n  .mono, [class*=\"mono\"],\n  [class*=\"-num\"], [class*=\"-counter\"],\n  [class*=\"-metric\"], [class*=\"-time\"] {\n    font-variant-numeric: tabular-nums !important;\n    font-feature-settings: \"tnum\" 1, \"lnum\" 1;\n  }\n\n  /* 3 · Universal focus ring.\n     Remove default outline, apply designed ring. Works on light or dark backgrounds\n     via selective override on elements inside dark panels. */\n  a:focus-visible,\n  button:focus-visible,\n  [role=\"button\"]:focus-visible,\n  input:focus-visible,\n  textarea:focus-visible,\n  select:focus-visible,\n  [tabindex]:focus-visible {\n    outline: none;\n    box-shadow: var(--focus-ring);\n    border-radius: 4px;\n    transition: box-shadow var(--t-snap);\n  }\n  /* Elements inside dark panels get the dark-context ring */\n  .lb-hero-wrap a:focus-visible,\n  .lb-hero-wrap button:focus-visible,\n  .lb-close a:focus-visible,\n  .lb-close button:focus-visible,\n  .lb-deploy-card.enterprise a:focus-visible,\n  .lb-deploy-card.enterprise button:focus-visible {\n    box-shadow: var(--focus-ring-dark);\n  }\n\n  /* ===== SIGNATURE HOVER PATTERN · 2026-04-18 =====\n     One move repeated: border brightens to cyan + 1px lift.\n     Applied to cards and card-like hoverable surfaces across the page.\n     This is the page's fingerprint — the one interaction you see everywhere. */\n  .lb-proof-card,\n  .lb-deploy-card,\n  .lb-story-evidence,\n  .lb-close-agenda > li {\n    transition: transform var(--t-snap), border-color var(--t-snap), background var(--t-snap);\n  }\n  .lb-proof-card:hover,\n  .lb-deploy-card:hover,\n  .lb-story-evidence:hover {\n    transform: var(--card-lift);\n    border-color: rgba(131, 228, 255, 0.55) !important;\n  }\n  /* Agency card is light-filled, so it gets a subtle navy-ink border on hover\n     instead of cyan (which would disappear against the sky blue). */\n  .lb-deploy-card.agency:hover {\n    border-color: rgba(10, 18, 32, 0.35) !important;\n  }\n  /* Close agenda items — subtle inner highlight on hover, no lift (they're\n     part of a bound capsule, not standalone cards). */\n  .lb-close-agenda > li:hover {\n    background: rgba(131, 228, 255, 0.04);\n  }\n  /* Close agenda item hover also brightens its numeral */\n  .lb-close-agenda > li:hover .num {\n    color: #a7eeff;\n  }\n\n  /* ===== PAGE SPINE · 2026-04-18 cohesion pass =====\n     Tried a persistent left-edge marker running across all sections.\n     Verdict: too much chrome; didn't create cohesion, added noise. Killed 2026-04-18.\n     Markup and IDs kept for potential future revisit; styles disabled. */\n  .page-spine { display: none !important; }\n  .page-spine {\n    position: fixed;\n    left: 22px;\n    top: 50%;\n    transform: translateY(-50%);\n    z-index: 90;\n    display: flex;\n    flex-direction: column;\n    gap: 32px;\n    padding: 4px 0;\n    /* Invisible on narrow viewports — spine would crowd the content */\n    opacity: 1;\n    pointer-events: auto;\n    transition: opacity var(--t-snap);\n  }\n  .page-spine-rule {\n    position: absolute;\n    left: 6px;\n    top: 10px;\n    bottom: 10px;\n    width: 1px;\n    background: linear-gradient(\n      to bottom,\n      transparent 0%,\n      rgba(10, 15, 30, 0.10) 8%,\n      rgba(10, 15, 30, 0.10) 92%,\n      transparent 100%\n    );\n    pointer-events: none;\n  }\n  .page-spine-mark {\n    position: relative;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    color: var(--ink-3);\n    text-decoration: none;\n    transition: color var(--t-snap);\n  }\n  .page-spine-dot {\n    position: relative;\n    z-index: 1;\n    width: 13px;\n    height: 13px;\n    border-radius: 50%;\n    background: var(--surface);\n    border: 1px solid var(--rule-firm);\n    flex-shrink: 0;\n    transition: border-color var(--t-snap), background var(--t-snap), box-shadow var(--t-snap);\n  }\n  .page-spine-dot::after {\n    content: '';\n    position: absolute;\n    inset: 3px;\n    border-radius: 50%;\n    background: transparent;\n    transition: background var(--t-snap);\n  }\n  .page-spine-label {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.14em;\n    opacity: 0;\n    transform: translateX(-4px);\n    transition: opacity var(--t-snap), transform var(--t-snap);\n    pointer-events: none;\n    white-space: nowrap;\n  }\n  .page-spine-label .num {\n    color: var(--ink-3);\n    font-variant-numeric: tabular-nums;\n  }\n  .page-spine-label .name {\n    color: var(--ink-2);\n    font-size: 11px;\n    font-family: 'Inter', sans-serif;\n    font-weight: 500;\n    letter-spacing: -0.005em;\n    text-transform: none;\n  }\n  /* Reveal labels on spine hover for discovery */\n  .page-spine:hover .page-spine-label,\n  .page-spine-mark:focus-visible .page-spine-label {\n    opacity: 1;\n    transform: translateX(0);\n  }\n  /* Active section — dot fills with cyan, ring brightens */\n  .page-spine-mark[data-active=\"true\"] .page-spine-dot {\n    border-color: var(--brand-highlight, #83E4FF);\n    box-shadow: 0 0 0 3px rgba(131, 228, 255, 0.14);\n  }\n  .page-spine-mark[data-active=\"true\"] .page-spine-dot::after {\n    background: var(--brand-highlight, #83E4FF);\n  }\n  .page-spine-mark[data-active=\"true\"] .page-spine-label { opacity: 1; transform: translateX(0); }\n  .page-spine-mark[data-active=\"true\"] .num { color: var(--brand-primary); }\n  .page-spine-mark[data-active=\"true\"] .name { color: var(--ink); }\n\n  /* Narrow viewports: hide the spine (not useful at <1200px where content takes the whole width) */\n  @media (max-width: 1200px) {\n    .page-spine { display: none; }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .page-spine *, .page-spine *::after { transition: none !important; }\n  }\n  body { background: var(--surface); color: var(--ink); }\n  ::selection { background: rgba(0,98,233,0.18); }\n  .preview-banner { display: none !important; }\n  .site-nav { top: 0 !important; height: 72px !important; border-bottom: 1px solid var(--rule-hair) !important; }\n  .site-nav .cta { background: var(--brand-primary) !important; color: #fff !important; border-radius: var(--radius-inline) !important; }\n  .site-nav .cta:hover { background: var(--brand-dark, #023A84) !important; }\n  .option-footer { display: none !important; }\n\n  /* Unified eyebrow */\n  .lb-intro .eyebrow, .lb-proof-head .eyebrow, .lb-anatomy-head .eyebrow,\n  .lb-story-head .eyebrow, .lb-deploy-head .eyebrow,\n  .lb-compliance .eyebrow, .lb-close .eyebrow {\n    font-family: 'JetBrains Mono', monospace !important;\n    font-size: 11px !important; font-weight: 600 !important;\n    letter-spacing: 0.16em !important; text-transform: uppercase;\n    color: var(--ink-3) !important;\n    display: inline-flex !important; align-items: center; gap: 12px;\n    margin-bottom: 22px !important;\n  }\n  .lb-intro .eyebrow::before, .lb-proof-head .eyebrow::before,\n  .lb-anatomy-head .eyebrow::before, .lb-story-head .eyebrow::before,\n  .lb-deploy-head .eyebrow::before, .lb-compliance .eyebrow::before,\n  .lb-close .eyebrow::before {\n    /* Recurring motif (2026-04-18 cohesion pass) — breathing cyan dot.\n       Miniature of the hero orb's presence; appears once in every section\n       eyebrow to tie all sections into the same brand voice. */\n    content: '' !important;\n    width: 8px !important; height: 8px !important;\n    border-radius: 50% !important;\n    background: var(--brand-highlight) !important;\n    box-shadow:\n      0 0 10px rgba(131, 228, 255, 0.55),\n      0 0 0 3px rgba(131, 228, 255, 0.14) !important;\n    display: inline-block !important;\n    animation: motif-breath 3.2s ease-in-out infinite;\n    flex-shrink: 0;\n  }\n  @keyframes motif-breath {\n    0%, 100% { transform: scale(1);    opacity: 0.82; }\n    50%      { transform: scale(1.14); opacity: 1;    }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .lb-intro .eyebrow::before, .lb-proof-head .eyebrow::before,\n    .lb-anatomy-head .eyebrow::before, .lb-story-head .eyebrow::before,\n    .lb-deploy-head .eyebrow::before, .lb-compliance .eyebrow::before,\n    .lb-close .eyebrow::before { animation: none !important; }\n  }\n  .lb-close .eyebrow { color: rgba(255,255,255,0.72) !important; }\n  /* Close is dark context — dot stays cyan (brand accent pops on navy) but gets\n     a subtly brighter halo ring to read against the dark background. */\n  .lb-close .eyebrow::before {\n    box-shadow:\n      0 0 12px rgba(131, 228, 255, 0.75),\n      0 0 0 3px rgba(131, 228, 255, 0.22) !important;\n  }\n\n  /* Unified h2 */\n  .lb-intro h2, .lb-anatomy-head h2, .lb-story-head h2,\n  .lb-deploy-head h2, .lb-compliance-head h2, .lb-close h2 {\n    font-size: clamp(38px, 4.4vw, 56px) !important;\n    line-height: 1.02 !important; letter-spacing: -0.032em !important;\n    text-wrap: balance;\n  }\n  /* Unified lede */\n  .lb-intro p, .lb-anatomy-head p, .lb-story-head p,\n  .lb-deploy-head p, .lb-compliance-head p, .lb-close p {\n    font-size: 17.5px !important; line-height: 1.55 !important;\n    color: var(--ink-2) !important; max-width: 640px;\n  }\n\n  /* ===== SECTION RHYTHM · 2026-04-18 cohesion pass =====\n     Enforces the same vertical spacing between eyebrow / H2 / lede / content\n     across every section head. Kills the drift where each section was spaced\n     slightly differently. Applied with !important to override earlier per-section\n     overrides. Text alignment unified: all section heads are LEFT-aligned. */\n  .lb-proof-head, .lb-deploy-head, .lb-story-head,\n  .lb-compliance-head, .lb-close .lb-close-row > div:first-child {\n    text-align: left !important;\n    max-width: 720px;\n  }\n  /* Eyebrow → H2: 22px (already the unified eyebrow's margin-bottom; made explicit here) */\n  .lb-proof-head .eyebrow,\n  .lb-deploy-head .eyebrow,\n  .lb-story-head .eyebrow,\n  .lb-compliance-head .eyebrow,\n  .lb-close .eyebrow {\n    margin-bottom: var(--space-eyebrow-to-h2) !important;\n  }\n  /* H2 → lede: 16px. Consistent across sections. */\n  .lb-proof-head h2,\n  .lb-deploy-head h2,\n  .lb-story-head h2,\n  .lb-compliance-head h2,\n  .lb-close h2 {\n    margin: 0 0 var(--space-h2-to-lede) 0 !important;\n  }\n  /* Lede paragraph: left-aligned, max-width matches, no auto-margin center */\n  .lb-proof-head p,\n  .lb-deploy-head p,\n  .lb-story-head p,\n  .lb-compliance-head p,\n  .lb-close p {\n    margin: 0 !important;\n  }\n  /* Section head → section body: 56px every time */\n  .lb-proof-head,\n  .lb-deploy-head,\n  .lb-story-head,\n  .lb-compliance-head {\n    margin-bottom: var(--space-head-to-body) !important;\n  }\n  /* Close's head→body distance matches (between copy row and agenda strip) */\n  .lb-close-row {\n    margin-bottom: var(--space-head-to-body) !important;\n  }\n  /* Remove the auto-center margin that was leftover on Story's head */\n  .lb-story-head { margin-left: 0 !important; margin-right: 0 !important; }\n\n  /* HERO deepen */\n  .lb-hero-wrap { padding: 24px 32px 120px !important; background: var(--surface) !important; }\n  .lb-panel {\n    border-radius: var(--radius-card) !important;\n    padding: 72px 64px !important; min-height: 580px !important;\n    box-shadow: var(--shadow-dark) !important; gap: 72px !important;\n  }\n  .lb-h1 {\n    font-size: clamp(56px, 7vw, 96px) !important;\n    line-height: 0.98 !important; letter-spacing: -0.045em !important;\n    font-weight: 600 !important; text-wrap: balance;\n  }\n  .lb-pills { display: none !important; }\n  .lb-left .body-l2 { font-size: 18px !important; max-width: 500px; color: rgba(255,255,255,0.82) !important; }\n  /* Hero primary CTA — swap default/hover: cyan rests, white on hover */\n  .lb-left .cta-primary.on-dark {\n    background: var(--brand-highlight) !important;\n    color: var(--bg-dark) !important;\n  }\n  .lb-left .cta-primary.on-dark:hover {\n    background: #fff !important;\n    color: var(--bg-dark) !important;\n  }\n  /* Larger wordmark in site nav */\n  .site-nav .wordmark img { height: 36px !important; width: auto !important; }\n\n  /* ═══════════════════════════════════════════════════════════════\n   * HEADLINE TREATMENTS · \"operating layer\"\n   * 10 variants toggled via data-treatment on <h1 data-headline>.\n   * Default (no attr) = untreated.\n   * ═══════════════════════════════════════════════════════════════ */\n  .h1-op {\n    position: relative;\n    transition: color 200ms ease;\n  }\n\n  /* 1 · Italic serif split */\n  [data-t \n    padding-bottom: 0.18em;\n  }\n  [data-treatment=\"wave-underline\"] .h1-op::after {\n    content: ''; position: absolute;\n    left: 0; right: 0; bottom: 0;\n    height: 0.18em;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 12' preserveAspectRatio='none'><path d='M0 6 Q 5 1 10 6 T 20 6 T 30 6 T 40 6 T 50 6 T 60 6 T 70 6 T 80 6 T 90 6 T 100 6 T 110 6 T 120 6' stroke='%2383e4ff' stroke-width='1.4' fill='none' stroke-linecap='round'/><\u002Fsvg>\");\n    background-repeat: repeat-x;\n    background-size: 60px 0.18em;\n    animation: h1WaveSlide 3s linear infinite;\n    opacity: 0.85;\n  }\n  @keyframes h1WaveSlide {\n    from { background-position: 0 0; }\n    to   { background-position: -60px 0; }\n  }\n\n  /* 8 · Weight contrast */\n  [data-treatment=\"weight-contrast\"] .h1-op {\n    font-weight: 800;\n  }\n\n  /* 9 · Bracket marks */\n  [data-treatment=\"brackets\"] .h1-op::before,\n  [data-treatment=\"brackets\"] .h1-op::after {\n    color: var(--brand-highlight);\n    font-weight: 300;\n    margin: 0 0.12em;\n    opacity: 0.7;\n  }\n  [data-treatment=\"brackets\"] .h1-op::before { content: '['; }\n  [data-treatment=\"brackets\"] .h1-op::after  { content: ']'; }\n\n  /* 10 · Orb-echo radial glow behind the word */\n  [data-treatment=\"orb-echo\"] .h1-op {\n    position: relative;\n    isolation: isolate;\n  }\n  [data-treatment=\"orb-echo\"] .h1-op::before {\n    content: ''; position: absolute;\n    top: 50%; left: 50%;\n    width: 140%; height: 240%;\n    transform: translate(-50%, -50%);\n    background: radial-gradient(ellipse at center, rgba(131,228,255,0.35) 0%, rgba(131,228,255,0.08) 40%, rgba(131,228,255,0) 70%);\n    z-index: -1;\n    filter: blur(12px);\n    animation: h1OrbEcho 4.8s ease-in-out infinite;\n  }\n  @keyframes h1OrbEcho {\n    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); }\n    50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }\n  }\n\n  /* 11 · Gradient + orb-echo (3 × 10 combo)\n     Span is inline and may wrap; halo is drawn on the H1 behind the span\n     via box-shadow-like radial bg on the h1 anchored to the span's box. */\n  [data-treatment=\"gradient-echo\"] .h1-op {\n    background: linear-gradient(100deg, var(--brand-primary) 0%, var(--brand-highlight) 60%, #ffffff 100%);\n    -webkit-background-clip: text; background-clip: text;\n    -webkit-text-fill-color: transparent; color: transparent;\n    -webkit-box-decoration-break: clone;\n    box-decoration-break: clone;\n    position: relative;\n  }\n  /* Halo: inline shadow layered beneath the gradient text via drop-shadow filter on the span */\n  [data-treatment=\"gradient-echo\"] .h1-op {\n    filter: drop-shadow(0 0 22px rgba(131,228,255,0.32)) drop-shadow(0 0 50px rgba(131,228,255,0.18));\n    animation: h1GradEchoPulse 4.8s ease-in-out infinite;\n  }\n  @keyframes h1GradEchoPulse {\n    0%, 100% { filter: drop-shadow(0 0 20px rgba(131,228,255,0.24)) drop-shadow(0 0 48px rgba(131,228,255,0.14)); }\n    50%      { filter: drop-shadow(0 0 28px rgba(131,228,255,0.42)) drop-shadow(0 0 64px rgba(131,228,255,0.22)); }\n  }\n\n  /* ─── TWEAKS PANEL (hidden until ?tweaks or host activates) ─── */\n  .tw-panel {\n    position: fixed; right: 20px; bottom: 20px;\n    width: 260px;\n    background: rgba(10, 16, 32, 0.96);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    border: 1px solid rgba(131,228,255,0.22);\n    border-radius: 14px;\n    padding: 14px 14px 10px;\n    font-family: 'Urbanist', sans-serif;\n    color: #fff;\n    z-index: 9999;\n    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;\n    display: none;\n  }\n  .tw-panel.is-active { display: block; }\n  .tw-panel h4 {\n    font-size: 11px; font-weight: 700;\n    letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--brand-highlight);\n    margin: 0 0 10px; padding-bottom: 10px;\n    border-bottom ;\n    background: conic-gradient(from 200deg at 50% 50%,\n      transparent 0deg,\n      rgba(131, 228, 255, 0.0) 40deg,\n      rgba(131, 228, 255, 0.55) 80deg,\n      rgba(131, 228, 255, 0.0) 120deg,\n      transparent 360deg);\n    mix-blend-mode: screen;\n    opacity: 0.7;\n    pointer-events: none;\n    animation: orbSweep 8s linear infinite;\n  }\n  @keyframes orbSweep {\n    to { transform: rotate(360deg); }\n  }\n\n  /* Story-section orb gets the same treatment, but smaller */\n  .lb-story-caller .orb-aura { width: 190px !important; height: 190px !important; }\n  .lb-story-caller .orb-aura::after { inset: -28px !important; }\n  .lb-story-caller .orb-ring-3 { width: 260px !important; height: 260px !important; }\n  .lb-story-caller .orb { width: 164px !important; height: 164px !important; }\n  .lb-story-caller .orb-wrap::before { width: 340px; height: 340px; }\n  .lb-story-caller .orb-wrap::after { width: 320px; height: 320px; }\n\n  /* Reduced motion respect */\n  /* ─── HERO ICP strip + running phase ──────────────────────────── */\n  .va-icp-strip {\n    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px;\n    background: rgba(255,255,255,0.08);\n    border: 1px solid rgba(255,255,255,0.10);\n    border-radius: var(--radius-inline);\n    overflow: hidden;\n    margin-bottom: 18px;\n  }\n  .va-icp-item {\n    padding: 10px 12px;\n    background: rgba(255,255,255,0.02);\n    display: flex; align-items: center; gap: 8px;\n    text-decoration: none;\n    border: 0; cursor: pointer;\n    font: inherit; color: inherit;\n    transition: background var(--t-snap), box-shadow var(--t-snap);\n    position: relative;\n    text-align: left;\n  }\n  .va-icp-item:hover { background: rgba(131,228,255,0.06); }\n  .va-icp-item.is-active {\n    background: rgba(131,228,255,0.10);\n    box-shadow: inset 0 -2px 0 var(--brand-highlight);\n  }\n  .va-icp-item.is-active .l { color: #fff; }\n  .va-icp-item.is-active .n { opacity: 1; }\n  .va-icp-item .n {\n    font-fami

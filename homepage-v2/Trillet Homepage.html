vg>\n          <\u002Fspan>\n          Enterprise\n        <\u002Fdiv>\n        <h3>For regulated, controlled, system-bound environments.<\u002Fh3>\n        <p class=\"card-body\">When the call surface touches sensitive systems, strict operating boundaries, identity requirements, or infrastructure that cannot be treated as a normal SaaS rollout.<\u002Fp>\n        <ul>\n          <li>On-premise Docker, private-cloud, or managed enterprise deployment<\u002Fli>\n          <li>Configurable data residency by geography<\u002Fli>\n          <li>Audited identity + access + deployment-boundary controls<\u002Fli>\n          <li>Integration with the systems your business already runs on<\u002Fli>\n        <\u002Ful>\n        <div class=\"card-ctas\">\n          <a href=\"#\" class=\"cta-primary on-dark\">\n            Review enterprise fit\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <a href=\"#\" class=\"cta-secondary on-dark\">Map your enterprise deployment<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lb-deploy-card agency\">\n        <div class=\"card-eyebrow\">\n          <span class=\"icon\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"12 2 2 7 12 12 22 7 12 2\"><\u002Fpolygon><polyline points=\"2 17 12 22 22 17\"><\u002Fpolyline><polyline points=\"2 12 12 17 22 12\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fspan>\n          Agency\n        <\u002Fdiv>\n        <h3>Your brand on every call. Many clients, one platform.<\u002Fh3>\n        <p class=\"card-body\">White-label the brand surface, keep the operating layer underneath, deploy clients in days not months.<\u002Fp>\n        <ul>\n          <li>White-label brand + custom domain per client<\u002Fli>\n          <li>Multi-tenant operator console<\u002Fli>\n          <li>Per-client margin economics<\u002Fli>\n          <li>Deploy new clients in days, not months<\u002Fli>\n        <\u002Ful>\n        <div class=\"card-ctas\">\n          <a href=\"#\" class=\"cta-primary\">\n            Explore agency deployment\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OPTION A · SINGLE-CALL SPINE · replaces Anatomy section. One caller walked through V/G/A/FT with sticky-left + scroll-phases-right. -->\n<section class=\"lb-story\" id=\"story\" data-spine-section=\"story\" aria-labelledby=\"story-heading\">\n  <div class=\"lb-story-inner\">\n\n    <div class=\"lb-story-head\">\n      <div class=\"eyebrow\" data-chapter=\"· § 03\">One call, end to end <span class=\"chap\">· § 03<\u002Fspan><\u002Fdiv>\n      <h2 id=\"story-heading\">Watch a single call go the distance.<\u002Fh2>\n      <p>Most voice agents stop at the conversation. Trillet runs on your live business systems — verifying, grounding, acting, and following through on every call.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- PHASE PROGRESS STRIP — sticky skimmer aid; IO marks active step + completes prior steps -->\n    <div class=\"lb-story-progress-wrap\">\n      <div class=\"lb-story-progress\" role=\"progressbar\" aria-label=\"Call progress\">\n        <div class=\"lb-story-progress-step is-active\" data-phase=\"verify\">\n          <span class=\"lb-story-progress-num\">01<\u002Fspan>\n          <span class=\"lb-story-progress-label\">Verify<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"lb-story-progress-step\" data-phase=\"ground\">\n          <span class=\"lb-story-progress-num\">02<\u002Fspan>\n          <span class=\"lb-story-progress-label\">Ground<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"lb-story-progress-step\" data-phase=\"act\">\n          <span class=\"lb-story-progress-num\">03<\u002Fspan>\n          <span class=\"lb-story-progress-label\">Act<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"lb-story-progress-step\" data-phase=\"follow\">\n          <span class=\"lb-story-progress-num\">04<\u002Fspan>\n          <span class=\"lb-story-progress-label\">Follow-through<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lb-story-grid\">\n\n      <!-- STICKY · the caller that is being traced throughout -->\n      <div class=\"lb-story-caller-col\">\n        <div class=\"lb-story-caller\">\n          <div class=\"lb-story-caller-head\">\n            <span><span class=\"dot\"><\u002Fspan>Live call · in progress<\u002Fspan>\n            <span id=\"lb-story-duration\">00:34<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"lb-story-caller-id\">+1 (415) 555 · 0482<\u002Fdiv>\n          <div class=\"lb-story-caller-meta\">\n            <span>Inbound · U.S. retail banking customer<\u002Fspan>\n            <span class=\"deployment\">retail-banking-v3 · enterprise<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"lb-story-orb-wrap\">\n            <div class=\"orb-aura\"><\u002Fdiv>\n            <div class=\"orb-ring-3\"><\u002Fdiv>\n            <div class=\"orb\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"lb-story-phase-chip\" data-phase=\"verify\" id=\"lb-story-chip\">\n            <span class=\"label\"><span class=\"active-dot\"><\u002Fspan><span id=\"lb-story-chip-label\">Verifying<\u002Fspan><\u002Fspan>\n            <span class=\"counter\" id=\"lb-story-chip-counter\">01 / 04<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Transcript snippet — swaps per phase via JS -->\n          <div class=\"lb-story-caller-transcript\" id=\"lb-story-transcript\">\n            <span class=\"speaker\" id=\"lb-story-transcript-who\">Caller<\u002Fspan>\n            <span id=\"lb-story-transcript-text\">\"Hi — I need to reset my password. I can't get into my account.\"<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Activity row — what the agent is doing right now -->\n          <div class=\"lb-story-caller-activity\" id=\"lb-story-activity\">\n            <span class=\"left\"><span class=\"pulse\"><\u002Fspan><span id=\"lb-story-activity-left\">Verifying identity<\u002Fspan><\u002Fspan>\n            <span class=\"right\" id=\"lb-story-activity-right\">2FA · 6-digit<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"lb-story-timer\">\n            <span>Intent<\u002Fspan>\n            <span class=\"elapsed\">Password reset<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SCROLL · 4 phase panels -->\n      <div class=\"lb-story-phases\">\n\n        <!-- 01 · VERIFY -->\n        <section class=\"lb-story-phase\" data-phase=\"verify\" id=\"phase-verify\">\n          <div class=\"lb-story-phase-header\">\n            <span class=\"lb-story-phase-num\">01<\u002Fspan>\n            <span class=\"name\">Verify<\u002Fspan>\n            <span class=\"sep\">·<\u002Fspan>\n            <span class=\"pledge\">no action before identity<\u002Fspan>\n          <\u002Fdiv>\n          <h3>Before anything else happens, the caller is who they say they are.<\u002Fh3>\n          <p>Trillet authenticates against your CRM record — 2FA out of band, voice biometrics, or whatever your compliance layer requires. No account-touching action begins until verification completes.<\u002Fp>\n          <div class=\"lb-story-evidence\">\n            <div class=\"lb-story-evidence-head\">\n              <span class=\"lb-story-evidence-title\">Identity challenge<\u002Fspan>\n              <span>retail-banking-v3<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"ev-verify\">\n              <div class=\"ev-verify-step\">\n                <span class=\"check\"><svg viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M2 6l3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span>CRM record matched · account #8842<\u002Fspan>\n                <span class=\"time\">00:04<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-verify-step\">\n                <span class=\"check\"><svg viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M2 6l3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span>2FA code sent to mobile ending 4217<\u002Fspan>\n                <span class=\"time\">00:09<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-verify-code\">\n                <span>6<\u002Fspan><span>3<\u002Fspan><span>8<\u002Fspan><span>0<\u002Fspan><span>1<\u002Fspan><span>2<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-verify-step\">\n                <span class=\"check\"><svg viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M2 6l3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span>Code confirmed · identity verified<\u002Fspan>\n                <span class=\"time\">00:31<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 02 · GROUND -->\n        <section class=\"lb-story-phase\" data-phase=\"ground\" id=\"phase-ground\">\n          <div class=\"lb-story-phase-header\">\n            <span class=\"lb-story-phase-num\">02<\u002Fspan>\n            <span class=\"name\">Ground<\u002Fspan>\n            <span class=\"sep\">·<\u002Fspan>\n            <span class=\"pledge\">on your live systems<\u002Fspan>\n          <\u002Fdiv>\n          <h3>The agent reads your systems the way a good rep would<br>— live, not from a stale extract.<\u002Fh3>\n          <p>Account history, open tickets, per-product rules, calendar availability. Trillet grounds the conversation in whatever your business already runs, so the answers match what your CRM says right now.<\u002Fp>\n          <div class=\"lb-story-evidence\">\n            <div class=\"lb-story-evidence-head\">\n              <span class=\"lb-story-evidence-title\">Live context · read<\u002Fspan>\n              <span>4 sources · 120ms<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"ev-ground\">\n              <div class=\"ev-ground-row\">\n                <span class=\"source\">CRM<\u002Fspan>\n                <span class=\"value\">account tier · platinum · 6y customer<\u002Fspan>\n                <span class=\"pulse\"><\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-ground-row\">\n                <span class=\"source\">Auth policy<\u002Fspan>\n                <span class=\"value\">password reset · requires recent 2FA (✓)<\u002Fspan>\n                <span class=\"pulse\"><\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-ground-row\">\n                <span class=\"source\">Ticket history<\u002Fspan>\n                <span class=\"value\">0 open · last issue resolved 2 weeks ago<\u002Fspan>\n                <span class=\"pulse\"><\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-ground-row\">\n                <span class=\"source\">Fraud signal<\u002Fspan>\n                <span class=\"value\">clean · device + number match on file<\u002Fspan>\n                <span class=\"pulse\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- CONTRAST CALLOUT · where most voice agents stop -->\n        <div class=\"lb-story-stop-callout\">\n          <div class=\"line\">Where most voice agents stop<\u002Fdiv>\n          <div class=\"text\">The conversation ends. Nothing is <em>written<\u002Fem>, <em>scheduled<\u002Fem>, or <em>routed<\u002Fem>. A human picks up the work after the call.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 03 · ACT -->\n        <section class=\"lb-story-phase\" data-phase=\"act\" id=\"phase-act\">\n          <div class=\"lb-story-phase-header\">\n            <span class=\"lb-story-phase-num\">03<\u002Fspan>\n            <span class=\"name\">Act<\u002Fspan>\n            <span class=\"sep\">·<\u002Fspan>\n            <span class=\"pledge\">inside your systems, with scope<\u002Fspan>\n          <\u002Fdiv>\n          <h3>Trillet takes the action the caller asked for<br>— on your systems, inside the scope you granted.<\u002Fh3>\n          <p>Password reset issued, calendar event booked, ticket created, CRM updated. Every action runs against your live backend with an auditable trail, not an export.<\u002Fp>\n          <div class=\"lb-story-evidence\">\n            <div class=\"lb-story-evidence-head\">\n              <span class=\"lb-story-evidence-title\">Actions executed<\u002Fspan>\n              <span>3 actions · all succeeded<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"ev-act\">\n              <div class=\"ev-act-step\">\n                <span class=\"icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span><div>Password reset · email + SMS sent<\u002Fdiv><div class=\"label-sub\">POST /accounts/8842/reset<\u002Fdiv><\u002Fspan>\n                <span class=\"status\">200 OK<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-act-step\">\n                <span class=\"icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M9 13h6M9 17h3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span><div>CRM summary written · interaction logged<\u002Fdiv><div class=\"label-sub\">PATCH /contacts/c-8842/interactions<\u002Fdiv><\u002Fspan>\n                <span class=\"status\">201 Created<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ev-act-step\">\n                <span class=\"icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 0 1-3.46 0\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span><div>Fraud alert suppressed · signal clean<\u002Fdiv><div class=\"label-sub\">POST /risk/review/skip<\u002Fdiv><\u002Fspan>\n                <span class=\"status\">200 OK<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 04 · FOLLOW-THROUGH -->\n        <section class=\"lb-story-phase\" data-phase=\"follow\" id=\"phase-follow\">\n          <div class=\"lb-story-phase-header\">\n            <span class=\"lb-story-phase-num\">04<\u002Fspan>\n            <span class=\"name\">Follow-through<\u002Fspan>\n            <span class=\"sep\">·<\u002Fspan>\n            <span class=\"pledge\">what happens after the call ends<\u002Fspan>\n          <\u002Fdiv>\n          <h3>The call wraps, and the work keeps moving — on its own.<\u002Fh3>\n          <p>Confirmation queued. Next-best-action written into the CRM. Escalation routed to the right human if something needs one. The post-call layer is where most voice products quietly hand the work back to your team. Trillet doesn't.<\u002Fp>\n          <div class=\"lb-story-evidence\">\n            <div class=\"lb-story-evidence-head\">\n              <span class=\"lb-story-evidence-title\">Post-call queue<\u002Fspan>\n              <span>04 items · all dispatched<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"ev-follow\">\n              <div class=\"ev-follow-item\">\n                <div class=\"kind\">Email summary<\u002Fdiv>\n                <div class=\"what\">Sent to customer · \"Your password has been reset. Full interaction log attached.\"<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ev-follow-item\">\n                <div class=\"kind\">CRM next-step<\u002Fdiv>\n                <div class=\"what\">30-day check-in scheduled · assigned to account owner Rachel L.<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ev-follow-item\">\n                <div class=\"kind\">SMS confirmation<\u002Fdiv>\n                <div class=\"what\">Queued for 09:00 tomorrow · \"Your account is secure. Anything else we can help with?\"<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ev-follow-item\">\n                <div class=\"kind\">Escalation<\u002Fdiv>\n                <div class=\"what\">None required · intent satisfied · confidence 0.97 · no hot signal flagged<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- CLOSURE BEAT — closes the loop emotionally; chip flips to WRAPPED in the caller card too via JS -->\n          <div class=\"lb-story-closure\">\n            <div class=\"lb-story-closure-left\">\n              <span class=\"lb-story-closure-icon\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              <\u002Fspan>\n              <span class=\"lb-story-closure-text\"><strong>Call wrapped.<\u002Fstrong> All four post-call actions dispatched. Customer notified.<\u002Fspan>\n            <\u002Fdiv>\n            <span class=\"lb-story-closure-time\">04:23 · END<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SCALE-OUT bridge into Proof Ledger -->\n    <div class=\"lb-story-scale\">\n      <div class=\"lead\">One call. Every night Trillet runs this same loop <em>47 more times<\u002Fem> on this deployment alone — and millions of times across every customer.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n  /* Option A · single-call spine\n     - IntersectionObserver updates the caller chip + transcript + activity row + phase progress strip\n     - Timer ticks up so the call feels live\n     - When user fully scrolls past Follow-through, closure mode kicks in (chip → WRAPPED)\n  */\n  (function () {\n    const phases = [\n      { id: 'phase-verify',  key: 'verify',  label: 'Verifying',           counter: '01 / 04',\n        transcript: { who: 'Caller', text: '\"Hi — I need to reset my password. I can\\'t get into my account.\"' },\n        activity:   { left: 'Verifying identity', right: '2FA · 6-digit' } },\n      { id: 'phase-ground',  key: 'ground',  label: 'Grounded',            counter: '02 / 04',\n        transcript: { who: 'Trillet', text: '\"Thanks Sarah. I see you on the platinum tier — your last issue was resolved two weeks ago. Let\\'s get you back in.\"' },\n        activity:   { left: 'Reading systems', right: '4 sources · 120ms' } },\n      { id: 'phase-act',     key: 'act',     label: 'Act · in progress',   counter: '03 / 04',\n        transcript: { who: 'Trillet', text: '\"Resetting now. New temporary password sent to the email on file. You\\'ll be prompted to change it on login.\"' },\n        activity:   { left: 'Writing actions', right: '2 systems · 2 OK' } },\n      { id: 'phase-follow',  key: 'follow',  label: 'Follow-through',      counter: '04 / 04',\n        transcript: { who: 'Trillet', text: '\"Confirmation email sent. I\\'ve scheduled a 30-day check-in with Rachel, your account owner. Anything else today?\"' },\n        activity:   { left: 'Wrap queue', right: '4 items · dispatching' } }\n    ];\n    const wrappedState = { label: 'Wrapped', counter: '✓ COMPLETE',\n      transcript: { who: 'End of call', text: 'All four post-call actions dispatched. Customer notified. Loop closed without human handoff.' },\n      activity:   { left: 'Loop complete', right: '04:23 · END' } };\n\n    const chip          = document.getElementById('lb-story-chip');\n    const chipLabel     = document.getElementById('lb-story-chip-label');\n    const chipCounter   = document.getElementById('lb-story-chip-counter');\n    const timerEl       = document.getElementById('lb-story-duration');\n    const transcriptEl  = document.getElementById('lb-story-transcript');\n    const transcriptWho = document.getElementById('lb-story-transcript-who');\n    const transcriptTxt = document.getElementById('lb-story-transcript-text');\n    const activityLeft  = document.getElementById('lb-story-activity-left');\n    const activityRight = document.getElementById('lb-story-activity-right');\n    const progressSteps = document.querySelectorAll('.lb-story-progress-step');\n    if (!chip || !chipLabel || !chipCounter || !timerEl) return;\n\n    function fmt(sec) {\n      const m = Math.floor(sec / 60).toString().padStart(2, '0');\n      const s = Math.floor(sec % 60).toString().padStart(2, '0');\n      return m + ':' + s;\n    }\n    function applyState(state, phaseKey) {\n      // chip\n      chip.setAttribute('data-phase', phaseKey || 'follow');\n      chipLabel.textContent = state.label;\n      chipCounter.textContent = state.counter;\n      // transcript with quick fade\n      transcriptEl.classList.add('is-changing');\n      setTimeout(() => {\n        transcriptWho.textContent = state.transcript.who;\n        transcriptTxt.textContent = state.transcript.text;\n        activityLeft.textContent  = state.activity.left;\n        activityRight.textContent = state.activity.right;\n        transcriptEl.classList.remove('is-changing');\n      }, 200);\n    }\n    function updateProgress(activeKey) {\n      const order = ['verify','ground','act','follow'];\n      const activeIdx = order.indexOf(activeKey);\n      progressSteps.forEach((step) => {\n        const stepKey = step.dataset.phase;\n        const stepIdx = order.indexOf(stepKey);\n        step.classList.remove('is-active', 'is-done');\n        if (stepIdx < activeIdx) step.classList.add('is-done');\n        else if (stepIdx === activeIdx) step.classList.add('is-active');\n      });\n    }\n\n    // track which phase is currently \"most in view\"\n    let currentKey = 'verify';\n    let isWrapped = false;\n    const callerEl = document.querySelector('.lb-story-caller');\n    // Caller is sticky-pinned via CSS; no transform manipulation needed.\n    function rollCallerContinuous() { /* no-op — caller is CSS-sticky */ }\n    function rollCallerTo(_phaseKey) { /* no-op */ }\n    // Scroll-driven activation — picks the phase whose top crosses the viewport's upper-third.\n    // More reliable than IntersectionObserver when phases are tall and user scrolls at variable speed.\n    function pickActivePhase() {\n      const trigger = window.innerHeight * 0.35; // activation line at 35% from top\n      let active = phases[0].key;\n      phases.forEach((p) => {\n        const el = document.getElementById(p.id);\n        if (!el) return;\n        const top = el.getBoundingClientRect().top;\n        if (top <= trigger) active = p.key;\n      });\n      return active;\n    }\n    function syncToScroll() {\n      // Roll caller every tick for smooth pace-with-scroll motion.\n      if (!isWrapped) rollCallerContinuous();\n      if (isWrapped) return;\n      const key = pickActivePhase();\n      if (key !== currentKey) {\n        currentKey = key;\n        const phase = phases.find(p => p.key === key);\n        if (phase) {\n          applyState(phase, phase.key);\n          updateProgress(phase.key);\n        }\n      }\n    }\n    let rafId = null;\n    window.addEventListener('scroll', () => {\n      if (rafId) return;\n      rafId = requestAnimationFrame(() => { syncToScroll(); rafId = null; });\n    }, { passive: true });\n    // Initial sync in case page loads mid-section\n    syncToScroll();\n\n    phases.forEach(p => {\n      const el = document.getElementById(p.id);\n      // phases observed via scroll handler, no IO needed here\n      void el;\n    });\n\n    // Closure detection — when the closure card itself enters the viewport, flip to WRAPPED\n    const closureEl = document.querySelector('.lb-story-closure');\n    if (closureEl) {\n      const closureObs = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting && !isWrapped) {\n            isWrapped = true;\n            applyState(wrappedState, 'follow');\n            updateProgress('follow');\n            rollCallerTo('follow');\n            // mark all steps done\n            progressSteps.forEach(step => {\n              step.classList.remove('is-active');\n              step.classList.add('is-done');\n            });\n          }\n        });\n      }, { threshold: 0.5 });\n      closureObs.observe(closureEl);\n    }\n\n    // Timer — advance based on which phase we're in\n    const baseTimes = { verify: 34, ground: 78, act: 142, follow: 218 };\n    let tick = baseTimes.verify;\n    setInterval(() => {\n      if (isWrapped) {\n        timerEl.textContent = '04:23';\n        return;\n      }\n      const target = baseTimes[currentKey] + 20;\n      if (tick < target) tick += 1;\n      else tick += 0.2;\n      timerEl.textContent = fmt(tick);\n    }, 1000);\n  })();\n<\u002Fscript>\n\n<!-- COMPLIANCE · expanded (per 2026-04-17 Sprinto content integration). Pills now reflect Sprinto's actual posture: HIPAA BAA + encryption + PII redaction + audit log + HITL + SLA live; ISO/SOC2 in audit. On-prem Docker + residency kept per user confirmation 2026-04-17. -->\n<section class=\"lb-compliance\" id=\"compliance\" data-spine-section=\"compliance\">\n  <div class=\"lb-compliance-inner\">\n\n    <!-- Row 1 — frame -->\n    <div class=\"lb-compliance-head\">\n      <div class=\"eyebrow\" data-chapter=\"· § 04\">Compliance <span class=\"chap\">· § 04<\u002Fspan><\u002Fdiv>\n      <h2>Compliance posture, before any contract.<\u002Fh2>\n      <p>Every control below is either live today or in active audit. Nothing is aspirational. If it's not here, it's on the full posture page.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Row 2 — pill clusters -->\n    <div class=\"lb-compliance-clusters\">\n      <div class=\"lb-compliance-cluster\">\n        <span class=\"lb-compliance-cluster-label\">Active today<\u002Fspan>\n        <div class=\"lb-compliance-pills\">\n          <span class=\"compliance-pill live\">HIPAA · BAA available<\u002Fspan>\n          <span class=\"compliance-pill live\">Encryption in transit + at rest<\u002Fspan>\n          <span class=\"compliance-pill live\">Automated PII redaction<\u002Fspan>\n          <span class=\"compliance-pill live\">Full audit log · 90-day retention<\u002Fspan>\n          <span class=\"compliance-pill live\">Human-in-the-loop<\u002Fspan>\n          <span class=\"compliance-pill live\">99.99% stability SLA<\u002Fspan>\n          <span class=\"compliance-pill live\">On-premise Docker available<\u002Fspan>\n          <span class=\"compliance-pill live\">Configurable residency<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lb-compliance-cluster\">\n        <span class=\"lb-compliance-cluster-label\">In audit<\u002Fspan>\n        <div class=\"lb-compliance-pills\">\n          <span class=\"compliance-pill flight\">ISO 27001 · audit in progress<\u002Fspan>\n          <span class=\"compliance-pill flight\">SOC 2 Type II · audit in progress<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Row 3 — sub-processors + actions -->\n    <div class=\"lb-compliance-foot\">\n      <div class=\"lb-compliance-subprocessors\">\n        <span class=\"label\">Built on<\u002Fspan>\n        <div class=\"list\">\n          <span>Google (Gemini)<\u002Fspan>\n          <span>ElevenLabs<\u002Fspan>\n          <span>Stripe<\u002Fspan>\n          <span>Twilio<\u002Fspan>\n          <span>Sprinto<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lb-compliance-actions\">\n        <a href=\"#\" class=\"lb-compliance-link-muted\">Read the full AI posture →<\u002Fa>\n        <a href=\"https://trust.trillet.ai\" class=\"lb-compliance-link\">\n          View live security posture\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLOSE · DARK, enterprise working session (agency determination removed per Ori 2026-04-17 — agencies self-serve via /agency/pricing, they don't need a pre-session) -->\n<section class=\"lb-close\" id=\"close\" data-spine-section=\"close\">\n  <div class=\"lb-close-inner\">\n    <div class=\"lb-close-row\">\n      <div>\n        <div class=\"eyebrow\" data-chapter=\"· § 05\">Working session <span class=\"chap\">· § 05<\u002Fspan><\u002Fdiv>\n        <h2>Start with one working session.<\u002Fh2>\n        <p>Ninety minutes with Trillet engineering. You leave with a deployment shape, integration scope, and a written proposal for what ships first.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ctas\">\n        <a href=\"#\" class=\"cta-primary on-dark\">\n          Book the working session\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#\" class=\"cta-secondary on-dark\">See a sample agenda<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Session agenda strip — visual anchor echoing the Story section's phase progression.\n         Five beats of the 90-minute session, as numbered mono chips. Replaces the empty navy field\n         with a concrete preview of what the working session actually covers. -->\n    <ol class=\"lb-close-agenda\" aria-label=\"Working session agenda\">\n      <li><span class=\"num\">01<\u002Fspan><span class=\"beat\">Call paths<\u002Fspan><span class=\"min\">~15 min<\u002Fspan><\u002Fli>\n      <li><span class=\"num\">02<\u002Fspan><span class=\"beat\">Identity &amp; verification<\u002Fspan><span class=\"min\">~15 min<\u002Fspan><\u002Fli>\n      <li><span class=\"num\">03<\u002Fspan><span class=\"beat\">System integrations<\u002Fspan><span class=\"min\">~20 min<\u002Fspan><\u002Fli>\n      <li><span class=\"num\">04<\u002Fspan><span class=\"beat\">Residency &amp; posture<\u002Fspan><span class=\"min\">~15 min<\u002Fspan><\u002Fli>\n      <li><span class=\"num\">05<\u002Fspan><span class=\"beat\">Deployment mode<\u002Fspan><span class=\"min\">~20 min<\u002Fspan><\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- FOOTER · with brand mark -->\n<footer class=\"site-footer\">\n  <div class=\"footer-inner\">\n    <div class=\"footer-mark\">\n      <img src=\"eaef9073-2b28-4c7d-8389-b54d21bd4d14\" alt=\"Trillet\">\n      <p>The voice operating layer. Voice agents that verify the caller, run on your live business systems, and take authorized action.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-col\"><h4>Platform<\u002Fh4><ul><li><a href=\"#\">Overview<\u002Fa><\u002Fli><li><a href=\"#\">Enterprise<\u002Fa><\u002Fli><li><a href=\"#\">Agency<\u002Fa><\u002Fli><li><a href=\"../2026-04-16-page-mockups/agent.html\">Agent<\u002Fa><\u002Fli><li><a href=\"#\">Pricing<\u002Fa><\u002Fli><\u002Ful><\u002Fdiv>\n    <div class=\"footer-col\"><h4>Product<\u002Fh4><ul><li><a href=\"#\">How it works<\u002Fa><\u002Fli><li><a href=\"#\">Integrations<\u002Fa><\u002Fli><li><a href=\"#\">Changelog<\u002Fa><\u002Fli><li><a href=\"#\">API<\u002Fa><\u002Fli><\u002Ful><\u002Fdiv>\n    <div class=\"footer-col\"><h4>Company<\u002Fh4><ul><li><a href=\"#\">About<\u002Fa><\u002Fli><li><a href=\"#\">Careers<\u002Fa><\u002Fli><li><a href=\"#\">Contact<\u002Fa><\u002Fli><li><a href=\"#\">Privacy<\u002Fa><\u002Fli><\u002Ful><\u002Fdiv>\n    <div class=\"footer-col\"><h4>Resources<\u002Fh4><ul><li><a href=\"#\">Docs<\u002Fa><\u002Fli><li><a href=\"#\">Guides<\u002Fa><\u002Fli><li><a href=\"#\">Blog<\u002Fa><\u002Fli><li><a href=\"#\">Status<\u002Fa><\u002Fli><\u002Ful><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bar\">\n    <div>© 2026 Trillet. All rights reserved.<\u002Fdiv>\n    <nav><a href=\"#\">Privacy<\u002Fa><a href=\"#\">Terms<\u002Fa><a href=\"#\">Security<\u002Fa><\u002Fnav>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"option-footer\" style=\"background: #3B1F68;\">\n  <strong style=\"color: white;\">🧪 OPTION A · Single-call spine · 2026-04-17<\u002Fstrong> · Narrative alternative to the locked v2 baseline. Trades the capability-bucket Anatomy section for a scroll-driven story that walks one caller (<code>+1 (415) 555-0482<\u002Fcode>, <code>retail-banking-v3<\u002Fcode>, password reset) through Verify → Ground → Act → Follow-through. Sticky caller card on the left; 4 phase panels + live evidence cards on the right. IntersectionObserver updates the chip as each phase scrolls into view, so the caller card feels live.\n  <p style=\"margin-top: 8px;\"><strong>What changed from v2:<\u002Fstrong> Anatomy section's phase band + definition cards + operator console are replaced by a single-call narrative. The operator console (4 parallel calls) is retired here — this page only shows <em>one<\u002Fem> call. \"Where most voice agents stop\" becomes a callout between Act and Follow-through, so the contrast lives at the exact moment of differentiation. A bridge line into Proof Ledger (\"47 more times on this deployment alone\") handles the scale-out.<\u002Fp>\n  <p style=\"margin-top: 8px;\"><strong>Risks to evaluate:<\u002Fstrong> (a) favors the generic enterprise reader over TopDown composable-MSP agency reader; (b) requires a more ambitious visual build than the baseline; (c) the single-call pattern is brand-distinctive but untested with regulated buyers who may prefer the operator-console \"many calls at once\" proof. See v2 baseline side-by-side: <a href=\"homepage-v2.html\" style=\"color: #83E4FF;\">← homepage-v2.html<\u002Fa>.<\u002Fp>\n<\u002Fdiv>\n\n<script>\n// Animated counter for the 1.4M+ Proof Ledger metric.\n// Triggers on scroll-into-view via IntersectionObserver; falls back to immediate animation\n// if IO is unavailable. Respects prefers-reduced-motion (jumps straight to final value).\n(function() {\n  var counter = document.querySelector('.lb-counter');\n  if (!counter) return;\n\n  var target = parseInt(counter.getAttribute('data-target'), 10) || 0;\n  var duration = 1800;\n  var prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  var finalText = counter.textContent;\n  var triggered = false;\n\n  function formatNumber(n) {\n    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M+';\n    if (n >= 1000) return Math.floor(n / 1000) + 'K+';\n    return Math.floor(n).toString();\n  }\n\n  function animate() {\n    if (triggered) return;\n    triggered = true;\n    if (prefersReducedMotion) {\n      counter.textContent = finalText;\n      return;\n    }\n    counter.textContent = '0';\n    var start = performance.now();\n    function tick(now) {\n      var elapsed = now - start;\n      var progress = Math.min(elapsed / duration, 1);\n      var eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic\n      if (progress < 1) {\n        counter.textContent = formatNumber(target * eased);\n        requestAnimationFrame(tick);\n      } else {\n        counter.textContent = finalText;\n      }\n    }\n    requestAnimationFrame(tick);\n  }\n\n  // Primary trigger: IntersectionObserver with low threshold + root margin so it fires\n  // reliably as soon as any part of the counter enters the viewport.\n  if ('IntersectionObserver' in window) {\n    var observer = new IntersectionObserver(function(entries) {\n      for (var i = 0; i < entries.length; i++) {\n        if (entries[i].isIntersecting) {\n          animate();\n          observer.disconnect();\n          break;\n        }\n      }\n    }, { threshold: 0.01, rootMargin: '0px 0px -10% 0px' });\n    observer.observe(counter);\n  } else {\n    // Fallback: animate immediately (older browsers without IO support)\n    animate();\n  }\n\n  // Safety fallback: if somehow nothing has triggered after 3 seconds AND the counter\n  // is already in the viewport, trigger directly. Covers edge cases where IO may be\n  // throttled or the element is already visible on load without scroll.\n  setTimeout(function() {\n    if (triggered) return;\n    var rect = counter.getBoundingClientRect();\n    if (rect.top < window.innerHeight && rect.bottom > 0) {\n      animate();\n    }\n  }, 3000);\n})();\n<\u002Fscript>\n\n<script>\n/* ═══════════════════════════════════════════════════════════════\n * HERO · VIRTUAL CONCIERGE\n * The website greeter. Orb = presence. ICP rail = optional\n * fast-path signal for the concierge. CTA = invite to engage.\n * ═══════════════════════════════════════════════════════════════ */\n(() => {\n  const card = document.querySelector('[data-va-card]');\n  if (!card) return;\n  const tabs = card.querySelectorAll('.va-icp-item');\n  const cta  = card.querySelector('[data-concierge-btn]');\n\n  let currentICP = 'enterprise';\n\n  tabs.forEach(t => {\n    t.addEventListener('click', () => {\n      tabs.forEach(x => {\n        const is = x === t;\n        x.classList.toggle('is-active', is);\n        x.setAttribute('aria-selected', is);\n      });\n      currentICP = t.dataset.agent;\n    });\n  });\n\n  if (cta) {\n    cta.addEventListener('click', () => {\n      // TODO: open concierge conversation, pass currentICP as hint\n      console.log('[trillet] concierge requested', { icp: currentICP });\n    });\n  }\n})();\n<\u002Fscript>\n\n<!-- ═══════════════════════════════════════════════════════════════\n     TWEAKS · headline \"operating layer\" treatments\n     ═══════════════════════════════════════════════════════════════ -->\n<div class=\"tw-panel\" id=\"twPanel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tw-label\">Headline · \"operating layer\"<\u002Fdiv>\n  <div class=\"tw-options\" id=\"twOptions\"><\u002Fdiv>\n  <div class=\"tw-label\" style=\"margin-top:14px;\">Orb style<\u002Fdiv>\n  <div class=\"tw-options\" id=\"twOrbOptions\"><\u002Fdiv>\n  <div class=\"tw-label\" style=\"margin-top:14px;\">Agency card fill<\u002Fdiv>\n  <div class=\"tw-options\" id=\"twAgencyOptions\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(() => {\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"headlineTreatment\": \"gradient-echo\",\n    \"orbStyle\": \"classic\",\n    \"agencyStyle\": \"cobalt\"\n  }/*EDITMODE-END*/;\n\n  const TREATMENTS = [\n    { id: 'none',              label: 'Default' },\n    { id: 'italic-serif',      label: 'Italic serif' },\n    { id: 'cyan-wash',         label: 'Cyan wash' },\n    { id: 'gradient',          label: 'Gradient text' },\n    { id: 'highlight-bar',     label: 'Highlight bar' },\n    { id: 'letter-fade',       label: 'Letter fade-in' },\n    { id: 'caption-underline', label: 'Caption underline' },\n    { id: 'wave-underline',    label: 'Voice-wave underline' },\n    { id: 'weight-contrast',   label: 'Weight contrast' },\n    { id: 'brackets',          label: 'Bracket marks' },\n    { id: 'orb-echo',          label: 'Orb-echo glow' },\n    { id: 'gradient-echo',     label: 'Gradient + orb-echo' },\n  ];\n\n  const h1    = document.querySelector('[data-headline]');\n  const op    = document.querySelector('[data-h1-op]');\n  const panel = document.getElementById('twPanel');\n  const opts  = document.getElementById('twOptions');\n  const opText = op ? op.textContent : '';\n\n  // Build option buttons\n  TREATMENTS.forEach((t, i) => {\n    const btn = document.createElement('button');\n    btn.type = 'button';\n    btn.className = 'tw-opt';\n    btn.dataset.treatment = t.id;\n    btn.innerHTML = '<span class=\"num\">' + String(i).padStart(2,'0') + '<\u002Fspan><span>' + t.label + '<\u002Fspan>';\n    btn.addEventListener('click', () => applyTreatment(t.id));\n    opts.appendChild(btn);\n  });\n\n  function splitIntoLetters() {\n    if (!op) return;\n    op.innerHTML = '';\n    [...opText].forEach((ch, i) => {\n      const s = document.createElement('span');\n      s.className = 'ltr';\n      s.textContent = ch;\n      s.style.animationDelay = (i * 0.04) + 's';\n      op.appendChild(s);\n    });\n  }\n  function unsplitLetters() {\n    if (!op) return;\n    op.textContent = opText;\n  }\n\n  function applyTreatment(id) {\n    if (!h1) return;\n    if (id === 'none') h1.removeAttribute('data-treatment');\n    else h1.setAttribute('data-treatment', id);\n\n    // Letter-fade needs per-letter spans; others want plain text.\n    if (id === 'letter-fade') splitIntoLetters();\n    else unsplitLetters();\n\n    // Update active state\n    opts.querySelectorAll('.tw-opt').forEach(b => {\n      b.classList.toggle('is-active', b.dataset.treatment === id);\n    });\n\n    // Persist to host\n    try {\n      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {headlineTreatment: id}}, '*');\n    } catch(e) {}\n  }\n\n  // Apply default from tweaks\n  applyTreatment(TWEAK_DEFAULTS.headlineTreatment || 'none');\n\n  // Listen for host activate/deactivate\n  window.addEventListener('message', (ev) => {\n    if (!ev.data || typeof ev.data !== 'object') return;\n    if (ev.data.type === '__activate_edit_mode')   panel.classList.add('is-active');\n    if (ev.data.type === '__deactivate_edit_mode') panel.classList.remove('is-active');\n  });\n  // Announce availability\n  try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e) {}\n\n  // Dev shortcut: ?tweaks=1 in URL shows panel immediately\n  if (/[?&]tweaks=1/.test(location.search)) panel.classList.add('is-active');\n\n  // ── ORB STYLE TWEAKS ──\n  const ORB_STYLES = [\n    { id: 'classic',  label: 'Classic' },\n    { id: 'glass',    label: 'Glass sphere' },\n    { id: 'plasma',   label: 'Plasma core' },\n    { id: 'metal',    label: 'Liquid metal' },\n    { id: 'neural',   label: 'Neural wireframe' },\n    { id: 'waveform', label: 'Voice waveform' },\n    { id: 'ambient',  label: 'Ambient dot' },\n  ];\n  const orbStage = document.querySelector('.va-concierge-stage');\n  const orbEl    = document.querySelector('[data-orb]');\n  const orbOpts  = document.getElementById('twOrbOptions');\n  const waveGroup = document.querySelector('.orb-waveform .wave-bars');\n\n  // Build waveform bars once (40 radial rects)\n  if (waveGroup) {\n    const cx = 100, cy = 100, rInner = 68, rMax = 96;\n    const count = 40;\n    const frag = document.createDocumentFragment();\n    for (let i = 0; i < count; i++) {\n      const angle = (i / count) * Math.PI * 2;\n      const x1 = cx + Math.cos(angle) * rInner;\n      const y1 = cy + Math.sin(angle) * rInner;\n      const phase = i * 0.18;\n      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');\n      line.setAttribute('x1', x1.toFixed(2));\n      line.setAttribute('y1', y1.toFixed(2));\n      line.setAttribute('stroke', '#83e4ff');\n      line.setAttribute('stroke-width', '1.6');\n      line.setAttribute('stroke-linecap', 'round');\n      line.setAttribute('opacity', '0.85');\n      // Animate stroke end outward with varying amplitude\n      const dur = (1.6 + (i % 5) * 0.2).toFixed(2);\n      const a1 = 6 + ((i * 7) % 18);\n      const a2 = 14 + ((i * 11) % 16);\n      const r1 = rInner + a1;\n      const r2 = rInner + a2;\n      const x2a = cx + Math.cos(angle) * r1;\n      const y2a = cy + Math.sin(angle) * r1;\n      const x2b = cx + Math.cos(angle) * r2;\n      const y2b = cy + Math.sin(angle) * r2;\n      line.setAttribute('x2', x2a.toFixed(2));\n      line.setAttribute('y2', y2a.toFixed(2));\n      const animX = document.createElementNS('http://www.w3.org/2000/svg', 'animate');\n      animX.setAttribute('attributeName', 'x2');\n      animX.setAttribute('values', `${x2a.toFixed(2)};${x2b.toFixed(2)};${x2a.toFixed(2)}`);\n      animX.setAttribute('dur', dur + 's');\n      animX.setAttribute('repeatCount', 'indefinite');\n      animX.setAttribute('begin', (phase).toFixed(2) + 's');\n      const animY = document.createElementNS('http://www.w3.org/2000/svg', 'animate');\n      animY.setAttribute('attributeName', 'y2');\n      animY.setAttribute('values', `${y2a.toFixed(2)};${y2b.toFixed(2)};${y2a.toFixed(2)}`);\n      animY.setAttribute('dur', dur + 's');\n      animY.setAttribute('repeatCount', 'indefinite');\n      animY.setAttribute('begin', (phase).toFixed(2) + 's');\n      line.appendChild(animX);\n      line.appendChild(animY);\n      frag.appendChild(line);\n    }\n    waveGroup.appendChild(frag);\n  }\n\n  // Pointer-tracking highlight for glass\n  if (orbEl) {\n    orbEl.addEventListener('mousemove', (e) => {\n      const r = orbEl.getBoundingClientRect();\n      const cx = r.left + r.width / 2;\n      const cy = r.top + r.height / 2;\n      const mx = Math.max(-40, Math.min(40, (e.clientX - cx) / 3));\n      const my = Math.max(-40, Math.min(40, (e.clientY - cy) / 3));\n      orbEl.style.setProperty('--mx', mx + 'px');\n      orbEl.style.setProperty('--my', my + 'px');\n    });\n    orbEl.addEventListener('mouseleave', () => {\n      orbEl.style.setProperty('--mx', '0px');\n      orbEl.style.setProperty('--my', '0px');\n    });\n  }\n\n  function applyOrbStyle(id) {\n    if (!orbStage) return;\n    orbStage.setAttribute('data-orb-style', id);\n    orbOpts.querySelectorAll('.tw-opt').forEach(b => {\n      b.classList.toggle('is-active', b.dataset.orbstyle === id);\n    });\n    try {\n      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {orbStyle: id}}, '*');\n    } catch(e) {}\n  }\n\n  ORB_STYLES.forEach((t, i) => {\n    const btn = document.createElement('button');\n    btn.type = 'button';\n    btn.className = 'tw-opt';\n    btn.dataset.orbstyle = t.id;\n    btn.innerHTML = '<span class=\"num\">' + String(i).padStart(2,'0') + '<\u002Fspan><span>' + t.label + '<\u002Fspan>';\n    btn.addEventListener('click', () => applyOrbStyle(t.id));\n    orbOpts.appendChild(btn);\n  });\n\n  applyOrbStyle(TWEAK_DEFAULTS.orbStyle || 'classic');\n\n  // ── AGENCY CARD FILL TWEAKS ──\n  const AGENCY_STYLES = [\n    { id: 'white',  label: 'White' },\n    { id: 'cobalt', label: 'Deep cobalt' },\n    { id: 'teal',   label: 'Teal cobalt' },\n    { id: 'pale',   label: 'Pale sky' },\n    { id: 'sky',    label: 'Fresh sky' },\n  ];\n  const agencyGrid = document.querySelector('.lb-deploy-grid');\n  const agencyOpts = document.getElementById('twAgencyOptions');\n\n  function applyAgencyStyle(id) {\n    if (agencyGrid) agencyGrid.setAttribute('data-agency-style', id);\n    if (agencyOpts) agencyOpts.querySelectorAll('.tw-opt').forEach(b => {\n      b.classList.toggle('is-active', b.dataset.agencystyle === id);\n    });\n    try {\n      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {agencyStyle: id}}, '*');\n    } catch(e) {}\n  }\n\n  if (agencyOpts) {\n    AGENCY_STYLES.forEach((t, i) => {\n      const btn = document.createElement('button');\n      btn.type = 'button';\n      btn.className = 'tw-opt';\n      btn.dataset.agencystyle = t.id;\n      btn.innerHTML = '<span class=\"num\">' + String(i).padStart(2,'0') + '<\u002Fspan><span>' + t.label + '<\u002Fspan>';\n      btn.addEventListener('click', () => applyAgencyStyle(t.id));\n      agencyOpts.appendChild(btn);\n    });\n  }\n  applyAgencyStyle(TWEAK_DEFAULTS.agencyStyle || 'teal');\n  // ═══════════════════════════════════════════════════════════════════\n  // AMBIENT DOT · State-machine driven animation\n  // Cycles: idle → listening → thinking → speaking → acting → speaking → idle\n  // Each state has its own Web Animation (bypasses prefers-reduced-motion).\n  // Mirrors what real voice-agent telemetry will drive: audio amplitude on\n  // speaking, LLM status on thinking, tool-call events on acting.\n  // ═══════════════════════════════════════════════════════════════════\n  const ambientCore  = document.querySelector('.ambient-core');\n  const ambientAura  = document.querySelector('.ambient-aura');\n  const stateChip    = document.querySelector('[data-ambient-state]');\n  const stateLabel   = document.querySelector('[data-ambient-state-label]');\n  const transcript   = document.querySelector('[data-ambient-transcript]');\n  const transLines   = transcript ? [...transcript.querySelectorAll('.at-line')] : [];\n\n  let coreAnim = null, auraAnim = null;\n\n  function stopAnims() {\n    if (coreAnim) { coreAnim.cancel(); coreAnim = null; }\n    if (auraAnim) { auraAnim.cancel(); auraAnim = null; }\n  }\n\n  // Keyframe banks per state\n  const STATE_MOTION = {\n    idle: {\n      core: [\n        { transform: 'translate(-50%, -50%) scale(1, 1)',    borderRadius: '50%', offset: 0 },\n        { transform: 'translate(-50%, -50%) scale(1.15, 1.15)', borderRadius: '50%', offset: 0.5 },\n        { transform: 'translate(-50%, -50%) scale(1, 1)',    borderRadius: '50%', offset: 1 },\n      ],\n      aura: [\n        { transform: 'translate(-50%, -50%) scale(1.0)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.12), 0 0 20px 4px rgba(131,228,255,0.22), 0 0 90px 22px rgba(131,228,255,0.06)',\n          offset: 0 },\n        { transform: 'transla nslate(-50%, -50%) scale(0.75, 0.85)',borderRadius: '45% / 52%', offset: 0.86 },\n        { transform: 'translate(-50%, -50%) scale(1.0, 1.0)',  borderRadius: '50%',       offset: 1 },\n      ],\n      aura: [\n        { transform: 'translate(-50%, -50%) scale(1.3)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.22), 0 0 36px 10px rgba(131,228,255,0.48), 0 0 140px 36px rgba(131,228,255,0.16)',\n          offset: 0 },\n        { transform: 'translate(-50%, -50%) scale(2.8)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.36), 0 0 56px 14px rgba(131,228,255,0.72), 0 0 200px 50px rgba(131,228,255,0.26)',\n          offset: 0.24 },\n        { transform: 'translate(-50%, -50%) scale(4.0)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.46), 0 0 78px 20px rgba(131,228,255,0.95), 0 0 260px 66px rgba(131,228,255,0.34)',\n          offset: 0.50 },\n        { transform: 'translate(-50%, -50%) scale(2.0)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.28), 0 0 42px 12px rgba(131,228,255,0.56), 0 0 170px 42px rgba(131,228,255,0.20)',\n          offset: 0.74 },\n        { transform: 'translate(-50%, -50%) scale(1.3)',\n          boxShadow: '0 0 0 1px rgba(131,228,255,0.22), 0 0 36px 10px rgba(131,228,255,0.48), 0 0 140px 36px rgba(131,228,255,0.16)',\n          offset: 1 },\n      ],\n      duration: 4800,\n    },\n    acting: {\n      // \"snap\" — dot flattens to a line, then returns. Purple/violet.\n      core: [\n        { transform: 'translate(-50%, -50%) scale(1.0, 1.0)',  borderRadius: '50%', background: '#c0a0ff', offset: 0 },\n        { transform: 'translate(-50%, -50%) scale(4.5, 0.15)', borderRadius: '50%', background: '#e0c6ff', offset: 0.35 },\n        { transform: 'translate(-50%, -50%) scale(4.5, 0.15)', borderRadius: '50%', background: '#e0c6ff', offset: 0.55 },\n        { transform: 'translate(-50%, -50%) scale(1.2, 1.2)',  borderRadius: '50%', background: '#c0a0ff', offset: 0.85 },\n        { transform: 'translate(-50%, -50%) scale(1.0, 1.0)',  borderRadius: '50%', background: '#c0a0ff', offset: 1 },\n      ],\n      aura: [\n        { transform: 'translate(-50%, -50%) scale(1.2)',\n          boxShadow: '0 0 0 1px rgba(192,160,255,0.26), 0 0 38px 10px rgba(192,160,255,0.52), 0 0 150px 36px rgba(192,160,255,0.18)',\n          offset: 0 },\n        { transform: 'translate(-50%, -50%) scale(3.0)',\n          boxShadow: '0 0 0 1px rgba(192,160,255,0.40), 0 0 64px 16px rgba(192,160,255,0.82), 0 0 220px 56px rgba(192,160,255,0.30)',\n          offset: 0.45 },\n        { transform: 'translate(-50%, -50%) scale(1.2)',\n          boxShadow: '0 0 0 1px rgba(192,160,255,0.26), 0 0 38px 10px rgba(192,160,255,0.52), 0 0 150px 36px rgba(192,160,255,0.18)',\n          offset: 1 },\n      ],\n      duration: 1400,\n    },\n  };\n\n  function setAmbientState(state) {\n    if (!ambientCore || !ambientAura) return;\n    const m = STATE_MOTION[state];\n    if (!m) return;\n    stopAnims();\n    coreAnim = ambientCore.animate(m.core, { duration: m.duration, iterations: Infinity, easing: 'ease-in-out' });\n    auraAnim = ambientAura.animate(m.aura, { duration: m.duration, iterations: Infinity, easing: 'ease-in-out' });\n    if (stateChip)  stateChip.setAttribute('data-state', state);\n    if (stateLabel) stateLabel.textContent = state.charAt(0).toUpperCase() + state.slice(1);\n  }\n\n  // State cycle — mimics a real call.\n  // Timings chosen to feel like a real turn exchange, not a demo reel.\n  const AMBIENT_SCRIPT = [\n    { state: 'idle',      duration: 2200, line: null },\n    { state: 'speaking',  duration: 3200, line: 1 },  // AGENT greets\n    { state: 'listening', duration: 2600, line: 2 },  // caller replies\n    { state: 'thinking',  duration: 1400, line: null },\n    { state: 'acting',    duration: 1200, line: null },\n    { state: 'speaking',  duration: 3000, line: 3 },  // AGENT responds\n    { state: 'listening', duration: 1800, line: null },\n    { state: 'idle',      duration: 3000, line: null },\n  ];\n\n  let scriptTimer = null;\n  let scriptIdx = 0;\n\n  function runScriptStep() {\n    const step = AMBIENT_SCRIPT[scriptIdx];\n    setAmbientState(step.state);\n    // Handle transcript line reveal/active\n    if (step.line !== null) {\n      const el = transLines.find(l => l.dataset.atLine === String(step.line));\n      if (el) {\n        el.classList.add('is-visible');\n        // briefly mark the active line\n        transLines.forEach(l => l.classList.remove('is-active'));\n        el.classList.add('is-active');\n      }\n    } else {\n      transLines.forEach(l => l.classList.remove('is-active'));\n    }\n    // On idle at end, reset transcript after fade\n    if (step.state === 'idle' && scriptIdx === AMBIENT_SCRIPT.length - 1) {\n      setTimeout(() => {\n        transLines.forEach(l => { l.classList.remove('is-visible'); l.classList.remove('is-active'); });\n      }, step.duration - 600);\n    }\n    scriptIdx = (scriptIdx + 1) % AMBIENT_SCRIPT.length;\n    scriptTimer = setTimeout(runScriptStep, step.duration);\n  }\n\n  // Start / stop based on orb style\n  function ambientScriptStart() {\n    if (scriptTimer) return;\n    scriptIdx = 0;\n    transLines.forEach(l => l.classList.remove('is-visible'));\n    runScriptStep();\n  }\n  function ambientScriptStop() {\n    if (scriptTimer) { clearTimeout(scriptTimer); scriptTimer = null; }\n    stopAnims();\n    transLines.forEach(l => l.classList.remove('is-visible'));\n    classicScriptStop();\n  }\n\n  // ═══════════════════════════════════════════════════════════════════\n  // CLASSIC ORB · state-driven breathing\n  // Overlays on top of the existing CSS animations on .orb / .orb-aura /\n  // .orb-wrap. We animate a CSS variable `--orb-breath` (scale multiplier)\n  // on the .va-concierge-orb and tint via `--orb-energy` (0–1).\n  // ═══════════════════════════════════════════════════════════════════\n  const classicOrb = document.querySelector('.va-concierge-orb');\n  let classicAnim = null, classicScriptTimer = null, classicScriptIdx = 0;\n\n  const CLASSIC_STATES = {\n    idle:      { scale: [1.0, 1.04, 1.0],            energy: [0.5, 0.7, 0.5],   duration: 4200 },\n    listening: { scale: [1.0, 1.06, 1.02, 1.08, 1.0],energy: [0.6, 0.85, 0.7, 0.9, 0.6], duration: 2600 },\n    thinking:  { scale: [1.0, 0.94, 1.0],            energy: [0.55, 0.75, 0.55],duration: 1500 },\n    speaking:  { scale: [1.0, 1.14, 1.02, 1.18, 1.06, 1.22, 1.0], energy: [0.7, 1.0, 0.85, 1.0, 0.9, 1.0, 0.7], duration: 4600 },\n    acting:    { scale: [1.0, 1.08, 1.02, 1.0],      energy: [0.7, 1.0, 0.9, 0.7], duration: 1300 },\n  };\n\n  function classicSetState(state) {\n    if (!classicOrb) return;\n    const m = CLASSIC_STATES[state];\n    if (!m) return;\n    if (classicAnim) classicAnim.cancel();\n    const frames = m.scale.map((s, i) => ({\n      transform: `scale(${s})`,\n      filter: `brightness(${0.92 + m.energy[i] * 0.22}) saturate(${0.95 + m.energy[i] * 0.25})`,\n      offset: i / (m.scale.length - 1),\n    }));\n    classicAnim = classicOrb.animate(frames, { duration: m.duration, iterations: Infinity, easing: 'ease-in-out' });\n  }\n\n  function classicRunStep() {\n    const step = AMBIENT_SCRIPT[classicScriptIdx];\n    classicSetState(step.state);\n    classicScriptIdx = (classicScriptIdx + 1) % AMBIENT_SCRIPT.length;\n    classicScriptTimer = setTimeout(classicRunStep, step.duration);\n  }\n  function classicScriptStart() {\n    if (classicScriptTimer) return;\n    classicScriptIdx = 0;\n    classicRunStep();\n  }\n  function classicScriptStop() {\n    if (classicScriptTimer) { clearTimeout(classicScriptTimer); classicScriptTimer = null; }\n    if (classicAnim) { classicAnim.cancel(); classicAnim = null; }\n    if (classicOrb) { classicOrb.style.transform = ''; classicOrb.style.filter = ''; }\n  }\n\n  // Wrap applyOrbStyle to drive the script\n  const _origApplyOrbStyle = applyOrbStyle;\n  window.__applyOrbStyle = function(id) {\n    _origApplyOrbStyle(id);\n    if (id === 'ambient') { ambientScriptStart(); classicScriptStop(); }\n    else if (id === 'classic') { ambientScriptStop(); classicScriptStart(); }\n    else { ambientScriptStop(); classicScriptStop(); }\n  };\n  // Re-wire the existing buttons to use the new wrapper\n  document.querySelectorAll('#twOrbOptions .tw-opt').forEach(btn => {\n    const newBtn = btn.cloneNode(true);\n    btn.replaceWith(newBtn);\n    newBtn.addEventListener('click', () => window.__applyOrbStyle(newBtn.dataset.orbstyle));\n  });\n  // Boot\n  const bootStyle = TWEAK_DEFAULTS.orbStyle || 'classic';\n  if (bootStyle === 'ambient') ambientScriptStart();\n  else if (bootStyle === 'classic') classicScriptStart();\n})();\n<\u002Fscript>\n\n<script>\n/* ═══════════════════════════════════════════════════════════════\n * PAGE SPINE · active-section tracker (2026-04-18 cohesion pass)\n * Watches Proof/Deploy/Story/Compliance/Close via IntersectionObserver.\n * The section closest to the viewport top-third wins and its spine mark\n * gets data-active=\"true\". Smooth scroll on click for in-page nav.\n * ═══════════════════════════════════════════════════════════════ */\n(() => {\n  const spine = document.querySelector('[data-spine]');\n  if (!spine) return;\n  const marks = Array.from(spine.querySelectorAll('[data-spine-mark]'));\n  const sections = marks\n    .map(m => ({ key: m.dataset.spineMark, el: document.getElementById(m.dataset.spineMark), mark: m }))\n    .filter(s => s.el);\n  if (!sections.length) return;\n\n  // IntersectionObserver with a line-shaped root margin: the \"read line\"\n  // is ~33% down the viewport. Whichever section's top crosses above that\n  // line most recently is considered active.\n  const visibility = new Map();\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      visibility.set(e.target.id, {\n        ratio: e.intersectionRatio,\n        top: e.boundingClientRect.top,\n      });\n    });\n    // Pick the section whose top is closest to but above the read line (33vh)\n    const readLine = window.innerHeight * 0.33;\n    let best = null;\n    let bestDist = Infinity;\n    sections.forEach(s => {\n      const r = s.el.getBoundingClientRect();\n      // only consider sections that have entered the viewport at all\n      if (r.bottom < 0 || r.top > window.innerHeight) return;\n      // distance from the read line to the section top (prefer sections whose top is at or above the line)\n      const dist = Math.abs(r.top - readLine);\n      if (dist < bestDist) {\n        bestDist = dist;\n        best = s;\n      }\n    });\n    marks.forEach(m => m.removeAttribute('data-active'));\n    if (best) best.mark.setAttribute('data-active', 'true');\n  }, {\n    // Watch as sections pass through the top 80% of the viewport\n    rootMargin: '0px 0px -20% 0px',\n    threshold: [0, 0.1, 0.25, 0.5, 0.75, 1],\n  });\n  sections.forEach(s => io.observe(s.el));\n\n  // Smooth scroll on click — defer to CSS scroll-behavior if the browser supports it\n  marks.forEach(m => {\n    m.addEventListener('click', (e) => {\n      const id = m.dataset.spineMark;\n      const target = document.getElementById(id);\n      if (!target) return;\n      e.preventDefault();\n      const navOffset = 72; // site-nav height\n      const y = target.getBoundingClientRect().top + window.scrollY - navOffset;\n      window.scrollTo({ top: y, behavior: 'smooth' });\n    });\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"

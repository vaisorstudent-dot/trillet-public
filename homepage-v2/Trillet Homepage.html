chip {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 5px 10px 5px 8px;\n    margin-top: 4px;\n    background: rgba(131,228,255,0.06);\n    border: 1px solid rgba(131,228,255,0.16);\n    border-radius: 4px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 500;\n    color: rgba(255,255,255,0.82);\n    letter-spacing: 0.02em;\n    width: fit-content;\n    transition: opacity 220ms ease;\n  }\n  .va-tool-chip .tool-dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--brand-highlight);\n    box-shadow: 0 0 6px rgba(131,228,255,0.8);\n    animation: toolPulse 1.4s ease-in-out infinite;\n  }\n  @keyframes toolPulse {\n    0%, 100% { opacity: 0.6; transform: scale(1); }\n    50%      { opacity: 1;   transform: scale(1.2); }\n  }\n  .va-tool-chip .tool-arrow { opacity: 0.45; }\n\n  /* Cross-fade hook for agent swaps */\n  .va-card.is-swapping .va-caller,\n  .va-card.is-swapping .va-transcript,\n  .va-card.is-swapping .va-tool-chip,\n  .va-card.is-swapping .va-phase-note,\n  .va-card.is-swapping .va-live-title,\n  .va-card.is-swapping .va-live-sub,\n  .va-card.is-swapping [data-live-agent-state] { opacity: 0.25; }\n\n  /* ═══════════════════════════════════════════════════════════════\n   * CONCIERGE CARD · orb as centerpiece\n   * Right-column hero. The orb is the VA that greets visitors.\n   * ICP rail = optional fast-path; otherwise the concierge asks.\n   * ═══════════════════════════════════════════════════════════════ */\n  .va-card-concierge {\n    display: flex; flex-direction: column;\n    align-items: stretch;\n    gap: 0;\n    padding: 22px 22px 28px;\n    /* Deeper card so the orb's aura has somewhere to bleed */\n    background: radial-gradient(ellipse at 50% 50%, rgba(131,228,255,0.04), rgba(0,0,0,0) 60%), var(--bg-dark-card, rgba(8, 20, 44, 0.5));\n    overflow: hidden;\n    position: relative;\n  }\n  .va-card-concierge .va-icp-strip {\n    margin-bottom: 0;\n    border: 1px solid rgba(255,255,255,0.08);\n    background: rgba(0,0,0,0.18);\n  }\n\n  /* Eyebrow label above the ICP strip — makes the role-picker self-explanatory */\n  .va-icp-eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    margin: 0 0 10px 2px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    color: rgba(131,228,255,0.65);\n  }\n  .va-icp-eyebrow .eb-mark {\n    width: 18px; height: 1px;\n    background: currentColor;\n    opacity: 0.55;\n  }\n\n  /* The stage — gives the orb breathing room and contains the aura */\n  .va-concierge-stage {\n    position: relative;\n    min-height: 480px;\n    display: flex; align-items: center; justify-content: center;\n    margin: 20px 0 12px;\n  }\n  /* Ambient backdrop — soft cyan radial emerging from the orb's center. Widened 2026-04-18. */\n  .va-concierge-stage::before {\n    content: ''; position: absolute; inset: -60%;\n    background:\n      radial-gradient(circle at 50% 50%, rgba(131,228,255,0.10) 0%, rgba(131,228,255,0.04) 25%, rgba(131,228,255,0.01) 50%, rgba(131,228,255,0) 70%);\n    pointer-events: none;\n    filter: blur(10px);\n  }\n  /* Thin concentric rings beyond the orb — softened 2026-04-18 so the rings\n     don't touch the panel edges and create a perceived frame. Bigger but fainter. */\n  .va-concierge-stage::after {\n    content: ''; position: absolute;\n    top: 50%; left: 50%;\n    width: 540px; height: 540px;\n    transform: translate(-50%, -50%);\n    border-radius: 50%;\n    border: 1px solid rgba(131,228,255,0.04);\n    box-shadow:\n      0 0 0 80px rgba(131,228,255,0.018),\n      0 0 0 180px rgba(131,228,255,0.010);\n    pointer-events: none;\n    opacity: 0.6;\n  }\n\n  /* The orb itself — heroic scale (300 → 360, 2026-04-18) */\n  .va-concierge-orb {\n    position: relative;\n    width: 360px; height: 360px;\n    min-height: 0 !important;\n    padding: 0 !important;\n    z-index: 1;\n  }\n  .va-concierge-orb::before,\n  .va-concierge-orb::after { display: none !important; }\n  .va-concierge-orb .orb-aura {\n    width: 340px !important; height: 340px !important;\n  }\n  .va-concierge-orb .orb-aura::after {\n    inset: -40px !important;\n    filter: blur(22px);\n    opacity: 0.92;\n  }\n  .va-concierge-orb .orb-ring-3 {\n    width: 376px !important; height: 376px !important;\n    border-color: rgba(131, 228, 255, 0.22) !important;\n  }\n  .va-concierge-orb .orb {\n    width: 260px !important; height: 260px !important;\n    animation: conciergeBreath 4.6s ease-in-out infinite;\n  }\n  @keyframes conciergeBreath {\n    0%, 100% { transform: scale(1);    filter: brightness(1); }\n    50%      { transform: scale(1.03); filter: brightness(1.06); }\n  }\n\n  /* Concierge CTA — a quiet sign, not a shouty button */\n  .va-concierge-cta {\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    align-self: center;\n    padding: 14px 22px;\n    margin-top: 8px;\n    background: rgba(255,255,255,0.04);\n    border: 1px solid rgba(131,228,255,0.22);\n    border-radius: 999px;\n    color: #fff;\n    font-family: 'Urbanist', sans-serif;\n    font-size: 14px; font-weight: 500;\n    letter-spacing: 0.005em;\n    cursor: pointer;\n    transition: background var(--t-snap), border-color var(--t-snap), transform var(--t-snap), box-shadow 220ms ease;\n    box-shadow: 0 0 0 0 rgba(131,228,255,0);\n  }\n  .va-concierge-cta:hover {\n    background: rgba(131,228,255,0.10);\n    border-color: rgba(131,228,255,0.48);\n    box-shadow: 0 0 30px rgba(131,228,255,0.25);\n  }\n  .va-concierge-cta .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--status-live, #3ecf8e);\n    box-shadow: 0 0 8px var(--status-live, #3ecf8e);\n    animation: conciergePulse 2s ease-in-out infinite;\n  }\n  @keyframes conciergePulse {\n    0%, 100% { opacity: 0.75; transform: scale(1); }\n    50%      { opacity: 1;    transform: scale(1.2); }\n  }\n  .va-concierge-cta .label {\n    font-weight: 500;\n    white-space: nowrap;\n  }\n  .va-concierge-cta .arrow {\n    color: var(--brand-highlight);\n    font-weight: 600;\n    transition: transform var(--t-snap);\n  }\n  .va-concierge-cta:hover .arrow {\n    transform: translateX(2px);\n  }\n\n  /* Want your own? Simple under-card link */\n  .va-want-own {\n    display: flex; align-items: center; justify-content: center;\n    margin-top: 14px;\n    text-decoration: none;\n  }\n  .va-want-own .want-own-link {\n    font-size: 13px;\n    color: rgba(255,255,255,0.52);\n    transition: color var(--t-snap);\n    letter-spacing: -0.005em;\n  }\n  .va-want-own:hover .want-own-link { color: var(--brand-highlight); }\n\n  /* ═══════════════════════════════════════════════════════════════\n   * ORB · MULTI-STYLE (tweak-switchable)\n   * Toggle via data-orb-style on .va-concierge-stage:\n   *   classic | glass | plasma | metal | neural | waveform\n   * ═══════════════════════════════════════════════════════════════ */\n  /* All treatment layers start hidden; enable per style */\n  .orb-glass, .orb-plasma, .orb-metal, .orb-neural, .orb-waveform {\n    position: absolute;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    width: 220px; height: 220px;\n    border-radius: 50%;\n    pointer-events: none;\n    opacity: 0;\n    transition: opacity 280ms ease;\n  }\n  /* ── CLASSIC (default) ── */\n  [data-orb-style=\"classic\"] .classic-core { opacity: 1; }\n  [data-orb-style=\"classic\"] .orb-aura,\n  [data-orb-style=\"classic\"] .orb-ring-3 { opacity: 1; }\n\n  /* Hide classic when any other style active */\n  [data-orb-style]:not([data-orb-style=\"classic\"]) .classic-core { opacity: 0; }\n\n  /* ── GLASS SHELL (shared across glass/plasma/metal/neural/waveform) ── */\n  .orb-glass { overflow: hidden; isolation: isolate; }\n  .glass-body, .glass-highlight, .glass-rim, .glass-shadow {\n    position: absolute; inset: 0; border-radius: 50%;\n  }\n  /* GLASS base material */\n  .glass-body {\n    background:\n      radial-gradient(circle at 35% 30%,\n        rgba(255,255,255,0.12) 0%,\n        rgba(131,228,255,0.18) 18%,\n        rgba(2,98,233,0.30) 50%,\n        rgba(0,14,44,0.9) 90%,\n        #000 100%\n      );\n  }\n  /* Studio highlight — large soft spec, moves via --mx/--my pointer vars */\n  .glass-highlight {\n    background: radial-gradient(\n      circle at calc(30% + var(--mx, 0px)) calc(26% + var(--my, 0px)),\n      rgba(255,255,255,0.9) 0%,\n      rgba(255,255,255,0.35) 6%,\n      rgba(255,255,255,0) 22%\n    );\n    mix-blend-mode: screen;\n    transition: background 220ms ease-out;\n  }\n  /* Rim light — thin bright ring at the edge */\n  .glass-rim {\n    box-shadow:\n      inset 0 0 0 1px rgba(131,228,255,0.45),\n      inset 0 0 18px 2px rgba(131,228,255,0.18),\n      inset 0 -28px 40px -20px rgba(0,0,0,0.7);\n  }\n  /* Inner shadow on the bottom */\n  .glass-shadow {\n    background: radial-gradient(ellipse at 50% 110%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 60%);\n    mix-blend-mode: multiply;\n  }\n  [data-orb-style=\"glass\"]   .orb-glass,\n  [data-orb-style=\"plasma\"]  .orb-glass,\n  [data-orb-style=\"metal\"]   .orb-glass,\n  [data-orb-style=\"neural\"]  .orb-glass,\n  [data-orb-style=\"waveform\"] .orb-glass { opacity: 1; }\n  /* For plasma/metal/neural/waveform, the shell is just the rim + highlight overlay */\n  [data-orb-style=\"plasma\"] .glass-body,\n  [data-orb-style=\"metal\"]  .glass-body,\n  [data-orb-style=\"neural\"] .glass-body,\n  [data-orb-style=\"waveform\"] .glass-body {\n    background: transparent;\n  }\n\n  /* ── PLASMA ── */\n  [data-orb-style=\"plasma\"] .orb-plasma { opacity: 1; }\n  .orb-plasma { animation: plasmaSpin 60s linear infinite; }\n  @keyframes plasmaSpin {\n    from { transform: translate(-50%, -50%) rotate(0deg); }\n    to   { transform: translate(-50%, -50%) rotate(360deg); }\n  }\n\n  /* ── LIQUID METAL ── */\n  [data-orb-style=\"metal\"] .orb-metal { opacity: 1; }\n  .orb-metal { animation: metalSpin 40s linear infinite; }\n  @keyframes metalSpin {\n    from { transform: translate(-50%, -50%) rotate(0deg); }\n    to   { transform: translate(-50%, -50%) rotate(360deg); }\n  }\n\n  /* ── NEURAL / WIREFRAME ── */\n  [data-orb-style=\"neural\"] .orb-neural { opacity: 1; }\n  .orb-neural { animation: neuralSpin 80s linear infinite; transform-origin: center; }\n  @keyframes neuralSpin {\n    from { transform: translate(-50%, -50%) rotate(0deg); }\n    to   { transform: translate(-50%, -50%) rotate(360deg); }\n  }\n\n  /* ── VOICE WAVEFORM ── */\n  [data-orb-style=\"waveform\"] .orb-waveform { opacity: 1; }\n\n  /* ── SONAR RINGS (replaces static concentric, shown on all styles) ── */\n  .orb-sonar {\n    position: absolute;\n    top: 50%; left: 50%;\n    width: 0; height: 0;\n    pointer-events: none;\n    z-index: 0;\n  }\n  .orb-sonar .sonar-ring {\n    position: absolute;\n    top: 0; left: 0;\n    width: 240px; height: 240px;\n    margin: -120px 0 0 -120px;\n    border-radius: 50%;\n    border: 1px solid rgba(131,228,255,0.5);\n    opacity: 0;\n    animation: sonarPulse 4.2s ease-out infinite;\n  }\n  .orb-sonar .sonar-ring:nth-child(2) { animation-delay: 1.4s; }\n  .orb-sonar .sonar-ring:nth-child(3) { animation-delay: 2.8s; }\n  @keyframes sonarPulse {\n    0%   { transform: scale(1);   opacity: 0.55; border-width: 1px; }\n    70%  { opacity: 0.12; }\n    100% { transform: scale(2.2); opacity: 0;    border-width: 0.5px; }\n  }\n\n  /* ── AMBIENT MOTES (floating particles around orb) ── */\n  .orb-motes {\n    position: absolute; inset: 0;\n    pointer-events: none;\n    z-index: 0;\n  }\n  .orb-motes .mote {\n    position: absolute;\n    width: 3px; height: 3px;\n    border-radius: 50%;\n    background: rgba(131,228,255,0.75);\n    box-shadow: 0 0 6px rgba(131,228,255,0.9);\n    top: 50%; left: 50%;\n    opacity: 0;\n  }\n  .orb-motes .mote:nth-child(1) { animation: moteOrbit 14s linear infinite;       animation-delay: 0s;   }\n  .orb-motes .mote:nth-child(2) { animation: moteOrbit 17s linear infinite reverse; animation-delay: 2s; }\n  .orb-motes .mote:nth-child(3) { animation: moteOrbit 12s linear infinite;       animation-delay: 4s;  }\n  .orb-motes .mote:nth-child(4) { animation: moteOrbit 19s linear infinite reverse; animation-delay: 1s; }\n  .orb-motes .mote:nth-child(5) { animation: moteOrbit 15s linear infinite;       animation-delay: 5s;  }\n  .orb-motes .mote:nth-child(6) { animation: moteOrbit 21s linear infinite reverse; animation-delay: 3s; }\n  .orb-motes .mote:nth-child(7) { animation: moteOrbit 13s linear infinite;       animation-delay: 6s;  }\n  .orb-motes .mote:nth-child(8) { animation: moteOrbit 18s linear infinite reverse; animation-delay: 7s; }\n  @keyframes moteOrbit {\n    0%   { transform: rotate(0deg)   translateX(160px) rotate(0deg);   opacity: 0; }\n    10%  { opacity: 0.9; }\n    50%  { opacity: 0.8; }\n    90%  { opacity: 0.6; }\n    100% { transform: rotate(360deg) translateX(160px) rotate(-360deg); opacity: 0; }\n  }\n\n  /* Stage hover — entire thing amps slightly */\n  .va-concierge-stage:hover .orb-sonar .sonar-ring { animation-duration: 3s; }\n  .va-concierge-stage:hover [data-orb] { filter: brightness(1.08) saturate(1.1); }\n\n  /* Disable classic rings backdrop on non-classic styles (cleaner look) */\n  [data-orb-style]:not([data-orb-style=\"classic\"]) .va-concierge-stage::after { display: none; }\n  [data-orb-style=\"classic\"] .orb-sonar { display: none; }\n\n  /* ── AMBIENT DOT ── restraint: almost nothing. A single breathing pinpoint. */\n  [data-orb-style=\"ambient\"] .orb-glass,\n  [data-orb-style=\"ambient\"] .orb-plasma,\n  [data-orb-style=\"ambient\"] .orb-metal,\n  [data-orb-style=\"ambient\"] .orb-neural,\n  [data-orb-style=\"ambient\"] .orb-waveform,\n  [data-orb-style=\"ambient\"] .classic-core,\n  [data-orb-style=\"ambient\"] .orb-aura,\n  [data-orb-style=\"ambient\"] .orb-ring-1,\n  [data-orb-style=\"ambient\"] .orb-ring-2,\n  [data-orb-style=\"ambient\"] .orb-ring-3,\n  [data-orb-style=\"ambient\"] .orb-sonar,\n  [data-orb-style=\"ambient\"] .orb-motes { opacity: 0 !important; display: none !important; }\n\n  [data-orb-style=\"ambient\"] .va-concierge-stage { background: transparent; }\n  [data-orb-style=\"ambient\"] .va-concierge-stage::before,\n  [data-orb-style=\"ambient\"] .va-concierge-stage::after { display: none !important; }\n\n  /* In ambient mode, strip the entire VA card's container frame —\n     keep the top ICP strip + concierge CTA button (user wants them),\n     only hide the head copy, tool chip, and \"want your own\" link. */\n  .va-card-concierge:has([data-orb-style=\"ambient\"]) {\n    background: transparent !important;\n    border: none !important;\n    box-shadow: none !important;\n    backdrop-filter: none !important;\n  }\n  .va-card-concierge:has([data-orb-style=\"ambient\"]) .va-concierge-head,\n  .va-card-concierge:has([data-orb-style=\"ambient\"]) .va-tool-chip,\n  .va-card-concierge:has([data-orb-style=\"ambient\"]) .va-want-own {\n    opacity: 0 !important;\n    pointer-events: none !important;\n  }\n\n  /* ORB-AMBIENT\n     Two-layer structure so shape-morph and breathing-glow can be independent:\n       .orb-ambient  — outer positioner (never transforms)\n       .ambient-core — the pinpoint; morphs shape + scale to simulate speech cadence\n       .ambient-aura — soft halo; separate pulse timing so glow \"lags\" the mouth  */\n  .orb-ambient {\n    position: absolute; top: 50%; left: 50%;\n    width: 0; height: 0;\n    transform: translate(-50%, -50%);\n    opacity: 0;\n    pointer-events: none;\n  }\n  [data-orb-style=\"ambient\"] .orb-ambient { opacity: 1; }\n\n  .ambient-core {\n    display: block;\n    position: absolute; left: 50%; top: 50%;\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    background: var(--brand-highlight);\n    transform: translate(-50%, -50%);\n    will-change: transform, border-radius;\n  }\n  .ambient-aura {\n    display: block;\n    position: absolute; left: 50%; top: 50%;\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    transform: translate(-50%, -50%);\n    background: transparent;\n    box-shadow:\n      0 0 0 1px rgba(131,228,255,0.18),\n      0 0 18px 4px rgba(131,228,255,0.42),\n      0 0 90px 22px rgba(131,228,255,0.12);\n    animation: none;\n    will-change: transform, box-shadow;\n  }\n\n  /* Morph cadence: circle → wider oval (speaking) → squish → tall sliver → back.\n     Irregular timing mimics syllables rather than a metronome breath. */\n  @keyframes ambientCoreMorph {\n    0%   { transform: translate(-50%, -50%) scale(1, 1);       border-radius: 50%; }\n    14%  { transform: translate(-50%, -50%) scale(1.35, 0.85); border-radius: 44% / 48%; }\n    26%  { transform: translate(-50%, -50%) scale(1.55, 1.1);  border-radius: 40% / 55%; }\n    38%  { transform: translate(-50%, -50%) scale(0.95, 1.3);  border-radius: 48% / 42%; }\n    52%  { transform: translate(-50%, -50%) scale(1.7, 0.75);  border-radius: 50%; }\n    66%  { transform: translate(-50%, -50%) scale(1.15, 1.05); border-radius: 50%; }\n    80%  { transform: translate(-50%, -50%) scale(0.85, 0.9);  border-radius: 45% / 52%; }\n    100% { transform: translate(-50%, -50%) scale(1, 1);       border-radius: 50%; }\n  }\n  /* Aura scales with energy of the core but lags slightly and stays round */\n  @keyframes ambientAuraPulse {\n    0%   { transform: translate(-50%, -50%) scale(1);\n           box-shadow: 0 0 0 1px rgba(131,228,255,0.16), 0 0 16px 4px rgba(131,228,255,0.34), 0 0 80px 20px rgba(131,228,255,0.09); }\n    26%  { transform: translate(-50%, -50%) scale(1.5);\n           box-shadow: 0 0 0 1px rgba(131,228,255,0.28), 0 0 30px 6px rgba(131,228,255,0.62), 0 0 120px 30px rgba(131,228,255,0.20); }\n    52%  { transform: translate(-50%, -50%) scale(1.9);\n           box-shadow: 0 0 0 1px rgba(131,228,255,0.34), 0 0 38px 8px rgba(131,228,255,0.74), 0 0 140px 36px rgba(131,228,255,0.24); }\n    80%  { transform: translate(-50%, -50%) scale(1.1);\n           box-shadow: 0 0 0 1px rgba(131,228,255,0.18), 0 0 18px 4px rgba(131,228,255,0.38), 0 0 90px 22px rgba(131,228,255,0.12); }\n    100% { transform: translate(-50%, -50%) scale(1);\n           box-shadow: 0 0 0 1px rgba(131,228,255,0.16), 0 0 16px 4px rgba(131,228,255,0.34), 0 0 80px 20px rgba(131,228,255,0.09); }\n  }\n\n  /* Faint label — \"LISTENING · AMBIENT\" so she still reads as alive, not just decorative */\n  .orb-ambient-label {\n    position: absolute;\n    top: calc(50% + 40px); left: 50%;\n    transform: translateX(-50%);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; font-weight: 700; letter-spacing: 0.26em;\n    text-transform: uppercase;\n    color: rgba(131,228,255,0.55);\n    white-space: nowrap;\n    opacity: 0;\n    animation: ambientLabelFade 3.6s ease-in-out infinite;\n    pointer-events: none;\n  }\n  [data-orb-style=\"ambient\"] .orb-ambient-label { display: none; }\n  @keyframes ambientLabelFade {\n    0%, 100% { opacity: 0.45; }\n    50%      { opacity: 0.95; }\n  }\n\n  /* ═══ AMBIENT STATE CHIP ═══\n     Small status pill above the dot. Only visible in ambient mode. */\n  .orb-ambient-state {\n    position: absolute;\n    top: calc(50% - 72px); left: 50%;\n    transform: translateX(-50%);\n    display: none !important;\n    align-items: center; gap: 8px;\n    padding: 5px 11px 5px 9px;\n    background: rgba(131,228,255,0.06);\n    border: 1px solid rgba(131,228,255,0.20);\n    border-radius: 100px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px; font-weight: 700;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    color: rgba(255,255,255,0.88);\n    white-space: nowrap;\n    backdrop-filter: blur(8px);\n    pointer-events: none;\n    transition: background 260ms ease, border-color 260ms ease, color 260ms ease;\n  }\n  [data-orb-style=\"ambient\"] .orb-ambient-state { display: inline-flex; }\n  .orb-ambient-state .st-dot {\n    width: 5px; height: 5px; border-radius: 50%;\n    background: var(--brand-highlight);\n    box-shadow: 0 0 6px rgba(131,228,255,0.8);\n  }\n  /* State-specific chip tinting */\n  [data-state=\"listening\"] { color: rgba(255,255,255,0.88); border-color: rgba(131,228,255,0.22); }\n  [data-state=\"thinking\"]  { color: #ffcf8f; border-color: rgba(255,207,143,0.30); background: rgba(255,207,143,0.06); }\n  [data-state=\"thinking\"] .st-dot { background: #ffcf8f; box-shadow: 0 0 6px rgba(255,207,143,0.8); }\n  [data-state=\"speaking\"]  { color: #83e4ff; border-color: rgba(131,228,255,0.34); background: rgba(131,228,255,0.10); }\n  [data-state=\"acting\"]    { color: #c0a0ff; border-color: rgba(192,160,255,0.32); background: rgba(192,160,255,0.08); }\n  [data-state=\"acting\"] .st-dot { background: #c0a0ff; box-shadow: 0 0 6px rgba(192,160,255,0.8); }\n  [data-state=\"idle\"]      { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); }\n  [data-state=\"idle\"] .st-dot { background: rgba(255,255,255,0.55); box-shadow: none; }\n\n  /* ═══ AMBIENT TRANSCRIPT ═══\n     Chat-bubble log beneath the dot. Lines appear sequentially, driven by state machine. */\n  .orb-ambient-transcript {\n    position: absolute;\n    top: calc(50% + 220px); left: 50%;\n    transform: translateX(-50%);\n    display: none;\n    flex-direction: column; gap: 10px;\n    width: min(420px, 88%);\n    padding: 0;\n    background: transparent;\n    border: none;\n    border-radius: 0;\n    backdrop-filter: none;\n    pointer-events: none;\n  }\n  [data-orb-style=\"ambient\"] .orb-ambient-transcript { display: flex; }\n  .at-line {\n    display: flex; align-items: flex-start; gap: 14px;\n    opacity: 0;\n    transform: translateY(4px);\n    transition: opacity 480ms ease, transform 480ms ease;\n    font-size: 13px; line-height: 1.5;\n  }\n  .at-line.is-visible { opacity: 1; transform: translateY(0); }\n  .at-line .role {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px; font-weight: 700;\n    letter-spacing: 0.20em; text-transform: uppercase;\n    color: rgba(131,228,255,0.55);\n    min-width: 44px; padding-top: 3px;\n    flex-shrink: 0;\n  }\n  .at-line .text { color: rgba(255,255,255,0.88); text-wrap: pretty; }\n  .at-line[data-at-line=\"2\"] .role { color: rgba(255,255,255,0.38); }\n  /* Active line highlight (currently being spoken) */\n  .at-line.is-active .text { color: #fff; }\n  .at-line.is-active .role { color: var(--brand-highlight); }\n\n  /* ─── ZONE 1 · DEMO PREVIEW ─── */\n  .va-zone-demo {\n    padding-top: 4px;\n  }\n  .va-zone-demo .va-status { margin-bottom: 14px; }\n  .va-zone-demo .va-caller { margin-bottom: 14px; }\n  .va-zone-demo .va-phase-running { margin-top: 0; margin-bottom: 14px; }\n  .va-zone-demo .va-transcript {\n    margin-top: 0;\n    padding: 10px 14px;\n    background: rgba(0,0,0,0.18);\n    border: 1px solid rgba(255,255,255,0.06);\n    border-radius: var(--radius-inline);\n    min-height: 44px;\n  }\n\n  /* ─── DIVIDER — \"or talk to this agent now\" ─── */\n  .va-zone-divider {\n    display: flex; align-items: center; gap: 14px;\n    margin: 22px 0 20px;\n  }\n  .va-zone-divider .line {\n    flex: 1; height: 1px;\n    background: linear-gradient(to right, transparent, rgba(255,255,255,0.18), transparent);\n  }\n  .va-zone-divider .label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 600;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.52);\n    white-space: nowrap;\n  }\n\n  /* ─── ZONE 2 · LIVE AGENT ─── */\n  .va-zone-live {\n    position: relative;\n    background: radial-gradient(ellipse at center top, rgba(131,228,255,0.10), rgba(0,0,0,0.22) 70%);\n    border: 1px solid rgba(131,228,255,0.18);\n    border-radius: var(--radius-inline);\n    padding: 22px 20px 20px;\n    overflow: hidden;\n  }\n  .va-zone-live::before {\n    content: ''; position: absolute; inset: -1px;\n    border-radius: inherit;\n    background: linear-gradient(180deg, rgba(131,228,255,0.25), rgba(131,228,255,0) 60%);\n    -webkit-mask: linear-gradient(#fff, #fff) content-box, linear-gradient(#fff, #fff);\n    -webkit-mask-composite: xor; mask-composite: exclude;\n    padding: 1px; pointer-events: none; opacity: 0.4;\n  }\n  .va-live-inner {\n    display: grid;\n    grid-template-columns: 130px 1fr;\n    grid-template-areas:\n      \"orb meta\"\n      \"orb cta\";\n    gap: 4px 18px;\n    align-items: center;\n    position: relative; z-index: 1;\n  }\n\n  /* Balanced-size orb (~120px) for the live zone */\n  .va-live-orb {\n    grid-area: orb;\n    width: 120px; height: 120px;\n    min-height: 0 !important;\n    padding: 0 !important;\n    flex-shrink: 0;\n    align-self: center;\n    justify-self: center;\n  }\n  .va-live-orb::before,\n  .va-live-orb::after { display: none !important; }\n  .va-live-orb .orb-aura {\n    width: 110px !important; height: 110px !important;\n  }\n  .va-live-orb .orb-aura::after { inset: -8px !important; }\n  .va-live-orb .orb-ring-3 {\n    width: 122px !important; height: 122px !important;\n    border-color: rgba(2, 58, 132, 0.55) !important;\n  }\n  .va-live-orb .orb {\n    width: 86px !important; height: 86px !important;\n  }\n\n  .va-live-meta {\n    grid-area: meta;\n    display: flex; flex-direction: column; gap: 5px;\n    min-width: 0;\n    align-self: end;\n  }\n  .va-live-status {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--brand-highlight);\n  }\n  .va-live-status .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--status-live);\n    box-shadow: 0 0 8px var(--status-live);\n    animation: livePulse 1.6s ease-in-out infinite;\n  }\n  @keyframes livePulse {\n    0%, 100% { opacity: 0.8; transform: scale(1); }\n    50%      { opacity: 1;   transform: scale(1.2); }\n  }\n  .va-live-title {\n    font-family: 'Urbanist', sans-serif;\n    font-size: 18px; font-weight: 600;\n    letter-spacing: -0.01em;\n    color: #fff;\n    line-height: 1.2;\n    transition: opacity 220ms ease;\n  }\n  .va-live-sub {\n    font-size: 12.5px;\n    color: rgba(255,255,255,0.62);\n    line-height: 1.45;\n    transition: opacity 220ms ease;\n  }\n  .va-live-cta-btn {\n    grid-area: cta;\n    justify-self: start;\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 11px 18px;\n    background: var(--brand-highlight);\n    color: var(--bg-dark);\n    border: 0; border-radius: var(--radius-inline);\n    font-weight: 600; font-size: 13.5px;\n    letter-spacing: -0.005em;\n    cursor: pointer;\n    box-shadow: 0 0 24px rgba(131,228,255,0.35);\n    transition: transform var(--t-snap), box-shadow var(--t-snap), background var(--t-snap);\n    flex-shrink: 0;\n    white-space: nowrap;\n  }\n  .va-live-cta-btn:hover {\n    transform: translateY(-1px);\n    box-shadow: 0 4px 28px rgba(131,228,255,0.5);\n    background: #a7eeff;\n  }\n  .va-live-cta-btn:active { transform: translateY(0); }\n\n  /* Want your own? — secondary routing line below the whole card */\n  .va-want-own {\n    display: flex; align-items: center; justify-content: center;\n    gap: 8px; margin-top: 16px;\n    text-decoration: none;\n    font-size: 12.5px;\n    color: rgba(255,255,255,0.62);\n    transition: color var(--t-snap);\n  }\n  .va-want-own:hover { color: #fff; }\n  .va-want-own:hover .want-own-link { color: var(--brand-highlight); }\n  .va-want-own .want-own-lead {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 600;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.42);\n  }\n  .va-want-own .want-own-link {\n    font-weight: 500;\n    color: rgba(255,255,255,0.82);\n    transition: color var(--t-snap);\n  }\n\n  /* Small-viewport stack for the live zone */\n  @media (max-width: 720px) {\n    .va-live-inner {\n      grid-template-columns: 1fr;\n      justify-items: center;\n      text-align: center;\n      gap: 14px;\n    }\n  }\n\n  .va-phase-running {\n    margin-top: -4px; margin-bottom: 8px;\n    padding: 14px 16px;\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: var(--radius-inline);\n    background: rgba(0,0,0,0.18);\n    display: flex; flex-direction: column; gap: 10px;\n  }\n  .va-phase-rail {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    gap: 4px;\n  }\n  .va-phase-pip {\n    position: relative;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; font-weight: 600;\n    letter-spacing: 0.16em;\n    color: rgba(255,255,255,0.35);\n    padding: 6px 0 10px;\n    text-align: center;\n    border-top: 1px solid rgba(255,255,255,0.10);\n  }\n  .va-phase-pip::after {\n    content: attr(data-phase);\n    position: absolute; top: 6px; left: 0; right: 0;\n    text-align: center;\n    font-size: 8px; opacity: 0.45;\n    letter-spacing: 0.1em;\n    color: rgba(255,255,255,0.5);\n    display: none; /* number pre-rendered via visible text; this is a hook for future animation */\n  }\n  .va-phase-pip.active {\n    color: var(--brand-highlight);\n    border-top-color: var(--brand-highlight);\n    text-shadow: 0 0 12px rgba(131,228,255,0.5);\n  }\n  .va-phase-pip.active::before {\n    content: ''; position: absolute;\n    top: -1px; left: 0; right: 0; height: 1px;\n    background: var(--brand-highlight);\n    box-shadow: 0 0 8px rgba(131,228,255,0.7);\n  }\n  .va-phase-pip.done {\n    color: rgba(131,228,255,0.55);\n    border-top-color: rgba(131,228,255,0.35);\n  }\n  .va-phase-note {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px;\n    color: rgba(255,255,255,0.62);\n    letter-spacing: 0.01em;\n  }\n\n  /* ═══════════════════════════════════════════════════════════════════\n   * LIGHT-BG ATMOSPHERE — ties the page together without shouting\n   * Two layers:\n   *   1. Ambient brand auras — near-invisible radial washes per section,\n   *      alternating sides, so the page feels like one continuous space\n   *   2. Section ticks — a faint mono number at the top-left of each\n   *      light section (\"/ 01 —\", \"/ 02 —\"), editorial chaptering\n   * ═══════════════════════════════════════════════════════════════════ */\n  .lb-proof, .lb-deploy, .lb-story, .lb-compliance {\n    position: relative;\n    isolation: isolate;\n  }\n  /* ═══════════════════════════════════════════════════════════════════\n   * LIGHT-BG ATMOSPHERE — 6 SWAPPABLE MODES\n   * Activated by a class on <body>: atm-none | atm-rules | atm-spine |\n   * atm-alt | atm-frames | atm-bleed | atm-gutter\n   * Switcher UI (bottom-right) toggles between them.\n   * All modes target the four light sections: .lb-proof, .lb-deploy,\n   * .lb-story, .lb-compliance\n   * ═══════════════════════════════════════════════════════════════════ */\n  .lb-proof, .lb-deploy, .lb-story, .lb-compliance {\n    position: relative;\n    isolation: isolate;\n  }\n\n  /* ─── MODE 1: atm-rules — ruled baseline grid ─── */\n  body.atm-rules .lb-proof::before,\n  body.atm-rules .lb-deploy::before,\n  body.atm-rules .lb-story::before,\n  body.atm-rules .lb-compliance::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: -1;\n    background-image: repeating-linear-gradient(\n      to bottom,\n      transparent 0,\n      transparent 47px,\n      rgba(2, 58, 132, 0.06) 47px,\n      rgba(2, 58, 132, 0.06) 48px\n    );\n    mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);\n    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);\n  }\n\n  /* ─── MODE 2: atm-spine — single vertical rule with section ticks ─── */\n  body.atm-spine .lb-proof::before,\n  body.atm-spine .lb-deploy::before,\n  body.atm-spine .lb-story::before,\n  body.atm-spine .lb-compliance::before {\n    content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px;\n    background: rgba(2, 58, 132, 0.10);\n    pointer-events: none; z-index: 0;\n  }\n  body.atm-spine .lb-proof::after,\n  body.atm-spine .lb-deploy::after,\n  body.atm-spine .lb-story::after,\n  body.atm-spine .lb-compliance::after {\n    position: absolute;\n    top: 48px; left: 50%; transform: translateX(-50%);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 600;\n    letter-spacing: 0.28em;\n    color: rgba(2, 58, 132, 0.55);\n    pointer-events: none;\n    padding: 0 14px;\n  }\n  body.atm-spine .lb-proof { background: var(--bg-tint); }\n  body.atm-spine .lb-deploy { background: #FFFFFF; }\n  body.atm-spine .lb-story { background: var(--bg-tint); }\n  body.atm-spine .lb-compliance { background: #FFFFFF; }\n  body.atm-spine .lb-proof::after       { content: '§ 01'; background: var(--bg-tint); }\n  body.atm-spine .lb-deploy::after      { content: '§ 02'; background: #FFFFFF; }\n  body.atm-spine .lb-story::after       { content: '§ 03'; background: var(--bg-tint); }\n  body.atm-spine .lb-compliance::after  { content: '§ 04'; background: #FFFFFF; }\n\n  /* ─── MODE 3: atm-alt — alternating tint / white (already mostly the case; strengthen) ─── */\n  body.atm-alt .lb-proof       { background: #EEF3FC; }\n  body.atm-alt .lb-deploy      { background: #FFFFFF; }\n  body.atm-alt .lb-story       { background: #EEF3FC; }\n  body.atm-alt .lb-compliance  { background: #FFFFFF; }\n  body.atm-alt .lb-proof,\n  body.atm-alt .lb-story { border-top: 1px solid rgba(2,58,132,0.08); border-bottom: 1px solid rgba(2,58,132,0.08); }\n\n  /* ─── MODE 4: atm-frames — each light section becomes a rounded panel ─── */\n  body.atm-frames {\n    background: linear-gradient(180deg, #FFFFFF 0%, #F4F7FC 40%, #F4F7FC 60%, #FFFFFF 100%);\n  }\n  body.atm-frames .lb-proof,\n  body.atm-frames .lb-deploy,\n  body.atm-frames .lb-story {\n    background: transparent !important;\n    border: none !important;\n    padding-left: 24px; padding-right: 24px;\n    padding-top: 88px; padding-bottom: 88px;\n  }\n  /* Frame surface — differentiated per section for rhythm.\n     Proof + Story (signal-heavy) → tint panels with stronger shadow\n     Deploy + Compliance (utility) → crisp white panels, lighter treatment */\n  body.atm-frames .lb-proof::before,\n  body.atm-frames .lb-deploy::before,\n  body.atm-frames .lb-story::before,\n  body.atm-frames .lb-compliance::before {\n    content: ''; position: absolute;\n    top: 16px; bottom: 16px; left: 24px; right: 24px;\n    border-radius: 28px;\n    z-index: -1;\n  }\n  body.atm-frames .lb-proof::before {\n    background: var(--bg-tint);\n    box-shadow: 0 24px 56px rgba(2, 58, 132, 0.10), 0 1px 0 rgba(255,255,255,0.7) inset, 0 0 0 1px rgba(2, 58, 132, 0.05);\n  }\n  body.atm-frames .lb-story::before {\n    background: var(--bg-tint);\n    box-shadow: 0 24px 56px rgba(2, 58, 132, 0.10), 0 1px 0 rgba(255,255,255,0.7) inset, 0 0 0 1px rgba(2, 58, 132, 0.05);\n  }\n  body.atm-frames .lb-deploy::before {\n    background: #FFFFFF;\n    box-shadow: 0 16px 40px rgba(2, 58, 132, 0.06), 0 0 0 1px rgba(2, 58, 132, 0.07);\n  }\n  body.atm-frames .lb-compliance::before {\n    background: var(--bg-tint);\n    box-shadow: 0 24px 56px rgba(2, 58, 132, 0.10), 0 1px 0 rgba(255,255,255,0.7) inset, 0 0 0 1px rgba(2, 58, 132, 0.05);\n  }\n  /* Chapter numbering — inline span inside each section eyebrow.\n     Hidden by default; shown only when atm-frames is active. */\n  .eyebrow .chap {\n    display: none;\n    font-family: 'JetBrains Mono', monospace;\n    font-weight: 700;\n    font-size: 10.5px;\n    color: var(--brand-primary);\n    letter-spacing: 0.22em;\n    margin-left: 10px;\n    padding-left: 10px;\n    border-left: 1px solid rgba(2, 58, 132, 0.2);\n    text-transform: uppercase;\n  }\n  body.atm-frames .lb-proof-head .eyebrow .chap,\n  body.atm-frames .lb-deploy-head .eyebrow .chap,\n  body.atm-frames .lb-story-head .eyebrow .chap,\n  body.atm-frames .lb-compliance-head .eyebrow .chap,\n  body.atm-frames .lb-close .eyebrow .chap {\n    display: inline-block;\n  }\n\n  /* ───────────────────────────────────────────────────────────────\n   * COMPLIANCE · dark lockbox treatment\n   * The section itself stays on page surface — no floating frame.\n   * The pill clusters are wrapped in a deep ink card to give\n   * compliance content its own trust-signaling weight.\n   * ─────────────────────────────────────────────────────────────── */\n  body.atm-frames .lb-compliance {\n    background: transparent !important;\n    padding: 96px 32px !important;\n    border-top: none !important;\n    border-bottom: none !important;\n  }\n  body.atm-frames .lb-compliance::before,\n  body.atm-frames .lb-compliance::after {\n    content: none !important;\n  }\n  /* Eyebrow stays editorial (not inside dark card) */\n  body.atm-frames .lb-compliance .lb-compliance-head { position: relative; z-index: 1; }\n\n  /* Dark lockbox around the clusters */\n  body.atm-frames .lb-compliance-clusters {\n    background: linear-gradient(180deg, #0B1530 0%, #060C1F 100%) !important;\n    border: 1px solid rgba(2, 58, 132, 0.6) !important;\n    border-radius: 20px !important;\n    padding: 36px 40px !important;\n    box-shadow:\n      0 24px 56px rgba(2, 12, 31, 0.18),\n      0 1px 0 rgba(255, 255, 255, 0.06) inset,\n      0 0 0 1px rgba(255, 255, 255, 0.02);\n    gap: 28px !important;\n    position: relative;\n  }\n  /* Subtle \"compliance seal\" corner mark */\n  body.atm-frames .lb-compliance-clusters::before {\n    content: 'SECURITY / LIVE POSTURE';\n    position: absolute;\n    top: 14px; right: 18px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; font-weight: 700; letter-spacing: 0.22em;\n    color: rgba(154, 178, 255, 0.4);\n  }\n  body.atm-frames .lb-compliance-cluster-label {\n    color: rgba(255, 255, 255, 0.55) !important;\n  }\n  /* Pills on dark — glass-y with bright status dots */\n  body.atm-frames .lb-compliance-clusters .compliance-pill {\n    background: rgba(255, 255, 255, 0.04) !important;\n    border: 1px solid rgba(255, 255, 255, 0.1) !important;\n    backdrop-filter: blur(4px);\n    transition: background var(--t-snap), border-color var(--t-snap);\n  }\n  body.atm-frames .lb-compliance-clusters .compliance-pill:hover {\n    background: rgba(255, 255, 255, 0.07) !important;\n    border-color: rgba(255, 255, 255, 0.18) !important;\n  }\n  body.atm-frames .lb-compliance-clusters .compliance-pill.live {\n    color: #A7F3D0 !important;\n    border-color: rgba(16, 185, 129, 0.3) !important;\n  }\n  body.atm-frames .lb-compliance-clusters .compliance-pill.live::before {\n    background: #10B981 !important;\n    box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);\n  }\n  body.atm-frames .lb-compliance-clusters .compliance-pill.flight {\n    color: #FCD34D !important;\n    border-color: rgba(245, 158, 11, 0.28) !important;\n  }\n  body.atm-frames .lb-compliance-clusters .compliance-pill.flight::before {\n    background: #F59E0B !important;\n  }\n\n  /* ─────────────────────────────────────────────────────────────────\n   * PROOF LEDGER · restore dark cards inside the tint frame\n   * Earlier unification pass flattened these to white with !important.\n   * Override that in atm-frames so the 4-card strip reads as a dark\n   * inset band against the tint panel — matches Compliance lockbox.\n   * ───────────────────────────────────────────────────────────────── */\n  body.atm-frames .lb-proof-card {\n    background: linear-gradient(180deg, #0B1530 0%, #060C1F 100%) !important;\n    border: 1px solid rgba(255, 255, 255, 0.08) !important;\n    border-radius: 12px !important;\n    box-shadow:\n      0 12px 32px rgba(2, 12, 31, 0.18),\n      0 1px 0 rgba(255, 255, 255, 0.05) inset !important;\n    padding: 28px 24px !important;\n    gap: 12px !important;\n    position: relative;\n    overflow: hidden;\n  }\n  body.atm-frames .lb-proof-cards {\n    background: transparent !important;\n    gap: 16px !important;\n    border-radius: 0 !important;\n    overflow: visible !important;\n  }\n  body.atm-frames .lb-proof-card::before {\n    display: block !important;\n    content: '' !important;\n    position: absolute; inset: 0; pointer-events: none;\n    background: radial-gradient(ellipse 60% 50% at 100% 0%, rgba(39, 163, 253, 0.14) 0%, transparent 60%);\n  }\n  body.atm-frames .lb-proof-card > * { position: relative; z-index: 1; }\n  body.atm-frames .lb-proof-card .proof-name {\n    color: #FFFFFF !important;\n  }\n  body.atm-frames .lb-proof-card .proof-metric {\n    color: var(--brand-highlight) !important;\n  }\n  body.atm-frames .lb-proof-card .proof-desc {\n    color: rgba(255, 255, 255, 0.72) !important;\n  }\n  body.atm-frames .lb-proof-card .proof-metric-label {\n    color: rgba(255, 255, 255, 0.56) !important;\n  }\n  body.atm-frames .lb-proof-card .proof-status.live {\n    color: #34D399 !important;\n  }\n  body.atm-frames .lb-proof-card .proof-status .dot {\n    background: #34D399 !important;\n    box-shadow: 0 0 8px rgba(52, 211, 153, 0.6) !important;\n  }\n  /* The old ::after approach is a no-op now — remove to keep specificity low */\n  body.atm-frames .lb-proof-head .eyebrow::after,\n  body.atm-frames .lb-deploy-head .eyebrow::after,\n  body.atm-frames .lb-story-head .eyebrow::after,\n  body.atm-frames .lb-compliance-head .eyebrow::after {\n    content: none !important;\n  }\n\n  /* ─── MODE 5: atm-bleed — break with a thin image-band between sections ─── */\n  body.atm-bleed .lb-proof::after,\n  body.atm-bleed .lb-deploy::after,\n  body.atm-bleed .lb-story::after {\n    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 8px;\n    background: linear-gradient(90deg,\n      var(--brand-primary) 0%,\n      var(--brand-primary) 20%,\n      var(--brand-dark) 20%,\n      var(--brand-dark) 45%,\n      var(--brand-secondary) 45%,\n      var(--brand-secondary) 60%,\n      rgba(2,58,132,0.3) 60%,\n      rgba(2,58,132,0.3) 100%);\n    opacity: 0.55;\n  }\n  body.atm-bleed .lb-proof,\n  body.atm-bleed .lb-deploy,\n  body.atm-bleed .lb-story,\n  body.atm-bleed .lb-compliance {\n    border-top: 1px solid rgba(2,58,132,0.08);\n  }\n\n  /* ─── MODE 6: atm-gutter — mono text running vertically along left edge ─── */\n  body.atm-gutter .lb-proof::before,\n  body.atm-gutter .lb-deploy::before,\n  body.atm-gutter .lb-story::before,\n  body.atm-gutter .lb-compliance::before {\n    position: absolute;\n    top: 120px; left: 28px;\n    writing-mode: vertical-rl;\n    transform: rotate(180deg);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 600;\n    letter-spacing: 0.35em;\n    color: rgba(2, 58, 132, 0.40);\n    pointer-events: none;\n  }\n  body.atm-gutter .lb-proof::before      { content: '§ 01  —  PRODUCTION SIGNAL'; }\n  body.atm-gutter .lb-deploy::before     { content: '§ 02  —  DEPLOYMENT PATHS'; }\n  body.atm-gutter .lb-story::before      { content: '§ 03  —  SINGLE-CALL SPINE'; }\n  body.atm-gutter .lb-compliance::before { content: '§ 04  —  ENTERPRISE TRUST'; }\n  body.atm-gutter .lb-proof::after,\n  body.atm-gutter .lb-deploy::after,\n  body.atm-gutter .lb-story::after,\n  body.atm-gutter .lb-compliance::after {\n    content: ''; position: absolute; top: 120px; bottom: 120px; left: 64px;\n    width: 1px; background: rgba(2,58,132,0.08);\n  }\n\n  /* Floating switcher */\n  .atm-switcher {\n    position: fixed; bottom: 20px; right: 20px; z-index: 999;\n    background: #FFFFFF;\n    border: 1px solid rgba(2, 58, 132, 0.12);\n    border-radius: 12px;\n    box-shadow: 0 12px 32px rgba(2, 58, 132, 0.14);\n    padding: 12px;\n    font-family: 'Inter', sans-serif;\n    max-width: 240px;\n  }\n  .atm-switcher-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px; font-weight: 600;\n    letter-spacing: 0.22em;\n    color: var(--ink-4);\n    text-transform: uppercase;\n    margin: 0 0 8px 2px;\n  }\n  .atm-switcher-btns { display: flex; flex-direction: column; gap: 4px; }\n  .atm-switcher button {\n    appearance: none; border: 1px solid rgba(2,58,132,0.08);\n    background: #FFFFFF; color: var(--ink-1);\n    font-family: 'Inter', sans-serif;\n    font-size: 12px; font-weight: 500;\n    padding: 8px 10px; border-radius: 8px;\n    text-align: left; cursor: pointer;\n    transition: all var(--t-snap);\n  }\n  .atm-switcher button:hover { background: var(--bg-tint); border-color: rgba(2,58,132,0.15); }\n  .atm-switcher button.active {\n    background: var(--brand-primary); color: #FFFFFF;\n    border-color: var(--brand-primary);\n  }\n  .atm-switcher button.active:hover { background: var(--brand-dark); }\n  .atm-switcher-hint {\n    margin-top: 8px; padding-top: 8px;\n    border-top: 1px solid rgba(2,58,132,0.06);\n    font-size: 10px; color: var(--ink-4); line-height: 1.4;\n  }\n\n<\u002Fstyle>\n<style>\n  /* ========== HERO · from Option 01: dark navy panel inside light page + orb (brand staple preserved) ========== */\n  .lb-hero-wrap {\n    padding: 40px 32px 96px;\n    background: linear-gradient(to bottom, #FFFFFF 0%, #F7FAFF 100%);\n  }\n  .lb-panel {\n    max-width: var(--page-max); margin: 0 auto;\n    background: var(--bg-dark);\n    border-radius: 28px;\n    padding: 64px 56px;\n    position: relative; overflow: hidden;\n    display: grid; grid-template-columns: 1.15fr 0.85fr;\n    gap: 56px; align-items: center;\n    min-height: 540px;\n    box-shadow: 0 40px 80px rgba(2, 58, 132, 0.18);\n  }\n  .lb-panel::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    /* Reworked 2026-04-18: REMOVED the cyan ellipse that was lifting the orb zone's\n       tonality — it created a brighter pocket around the orb that read as a card\n       shape. The orb now brings its own cyan from .va-concierge-stage::before; the\n       panel's job is atmosphere (brand-blue pool bottom-left, warm top-right depth),\n       NOT spotlighting the orb. */\n    background:\n      radial-gradient(ellipse 55% 55% at 8% 92%, rgba(2, 58, 132, 0.48) 0%, transparent 55%),\n      radial-gradient(ellipse 40% 40% at 40% 30%, rgba(2, 58, 132, 0.22) 0%, transparent 70%);\n  }\n  .lb-panel::after {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    background-image:\n      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);\n    background-size: 32px 32px;\n    opacity: 0.6;\n    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 75%);\n  }\n  .lb-left { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 24px; }\n  .lb-h1 { font-size: clamp(40px, 5.5vw, 72px); font-weight: 600; }\n  .lb-pills { display: flex; flex-wrap: wrap; gap: 8px; }\n  .lb-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }\n\n  /* Voice agent card with orb (brand staple).\n     No outer frame — the orb sits directly in the hero panel, and the\n     .va-card-concierge below provides its own container. Committed hairline-\n     over-shadow doctrine means we don't stack card frames. 2026-04-18. */\n  .va-card {\n    background: transparent;\n    border: none;\n    border-radius: 20px;\n    padding: 0;\n    position: relative; z-index: 1;\n    backdrop-filter: none;\n  }\n  .va-status {\n    display: flex; justify-content: space-between; align-items: center;\n    margin-bottom: 24px;\n    font-size: 12px; color: var(--text-on-dark-body);\n  }\n  .va-status .dot {\n    width: 6px; height: 6px; border-radius: 50%; background: var(--status-live);\n    margin-right: 6px; display: inline-block; box-shadow: 0 0 6px var(--status-live);\n  }\n  .orb-wrap {\n    display: flex; justify-content: center; align-items: center;\n    padding: 24px 0 8px; position: relative; min-height: 240px;\n  }\n  .orb-aura {\n    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);\n    width: 200px; height: 200px; border-radius: 50%;\n    pointer-events: none;\n  }\n  .orb-aura::before, .orb-aura::after {\n    content: ''; position: absolute; inset: 0; border-radius: 50%;\n    border: 1px solid rgba(131, 228, 255, 0.20);\n    animation: orbRing 3.6s ease-in-out infinite;\n  }\n  .orb-aura::after {\n    inset: -28px; animation-delay: 1.2s;\n    border-color: rgba(39, 163, 253, 0.16);\n  }\n  .orb-ring-3 {\n    position: absolute; left: 50%; top: 50%;\n    transform: translate(-50%, -50%);\n    width: 280px; height: 280px; border-radius: 50%;\n    border: 1px solid rgba(2, 58, 132, 0.5);\n    animation: orbRing 3.6s ease-in-out infinite; animation-delay: 2.4s;\n    pointer-events: none;\n  }\n  @keyframes orbRing {\n    0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }\n    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }\n  }\n  .orb {\n    width: 180px; height: 180px; border-radius: 50%;\n    background:\n      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.7) 0%, rgba(184, 229, 255, 0.0) 25%),\n      radial-gradient(circle at 35% 30%, #B8E5FF 0%, #83E4FF 22%, #27A3FD 55%, #0062E9 85%, #023A84 100%);\n    box-shadow:\n      inset 0 -10px 30px rgba(2, 58, 132, 0.55),\n      inset 0 8px 24px rgba(255, 255, 255, 0.55),\n      inset 0 0 0 1px rgba(131, 228, 255, 0.20),\n      0 16px 56px rgba(39, 163, 253, 0.50),\n      0 0 0 1px rgba(255, 255, 255, 0.06);\n    position: relative;\n    z-index: 1;\n  }\n  .orb::after {\n    /* highlight reflection */\n    content: ''; position: absolute;\n    top: 18%; left: 22%;\n    width: 38%; height: 28%; border-radius: 50%;\n    background: radial-gradient(ellipse, rgba(255,255,255,0.45) 0%, transparent 70%);\n    pointer-events: none;\n  }\n  /* audio bar visualizer below the orb (v2 SMBHero pattern) */\n  .audio-bars {\n    display: flex; gap: 5px; align-items: center; justify-content: center;\n    height: 36px; margin: 16px 0 4px;\n    position: relative; z-index: 1;\n  }\n  .audio-bars span {\n    display: inline-block; width: 4px;\n    background: linear-gradient(to top, var(--brand-secondary) 0%, var(--brand-highlight) 100%);\n    border-radius: 4px;\n    box-shadow: 0 0 10px rgba(131, 228, 255, 0.45);\n    animation: audioBar 1.2s ease-in-out infinite;\n  }\n  .audio-bars span:nth-child(1) { animation-delay: 0s; }\n  .audio-bars span:nth-child(2) { animation-delay: 0.15s; }\n  .audio-bars span:nth-child(3) { animation-delay: 0.3s; }\n  .audio-bars span:nth-child(4) { animation-delay: 0.45s; }\n  .audio-bars span:nth-child(5) { animation-delay: 0.6s; }\n  .audio-bars span:nth-child(6) { animation-delay: 0.45s; }\n  .audio-bars span:nth-child(7) { animation-delay: 0.3s; }\n  .audio-bars span:nth-child(8) { animation-delay: 0.15s; }\n  .audio-bars span:nth-child(9) { animation-delay: 0s; }\n  @keyframes audioBar {\n    0%, 100% { height: 6px; opacity: 0.55; }\n    50% { height: 32px; opacity: 1; }\n  }\n  .va-transcript {\n    margin-top: 24px; display: flex; flex-direction: column; gap: 8px;\n    font-size: 13px; line-height: 1.5;\n  }\n  .va-transcript .line { display: flex; gap: 12px; }\n  .va-transcript .role {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text-on-dark-muted); min-width: 44px;\n  }\n  .va-transcript .text { color: var(--text-on-dark-body); }\n  .va-controls {\n    display: flex; gap: 10px; align-items: center; padding-top: 20px;\n    border-top: 1px solid var(--border-dark); margin-top: 20px;\n  }\n  .va-controls .talk {\n    flex: 1; padding: 12px; border-radius: 10px;\n    background: var(--brand-primary); color: white;\n    font-size: 13px; font-weight: 600; text-align: center;\n  }\n  /* Hero door: tertiary link below VA card routing to /agent (the third operating shape, evt_2026_04_17_011).\n     No price in hero -- infrastructure-positioning precedent (Stripe/Anthropic reserve hero for frame). */\n  .va-door-link {\n    display: block; margin-top: 16px; text-align: center;\n    font-family: 'Inter', sans-serif;\n    font-size: 13px; font-weight: 500;\n    color: var(--text-on-dark-body);\n    letter-spacing: 0.01em;\n    transition: color var(--t-snap);\n  }\n  .va-door-link:hover { color: var(--brand-highlight); }\n  .va-door-link span { transition: transform var(--t-snap); display: inline-block; }\n  .va-door-link:hover span { transform: translateX(2px); }\n\n  /* ========== \"OPERATING LAYER, LIVE\" · from Option 01: operator console intro ========== */\n  .lb-intro-section { padding: 96px 32px; background: white; }\n\n  /* OVERRIDE · operator console uses midway brand-blue tone derived from hero bloom math.\n     Hero base #0A0F1E + brand-deep bloom rgba(2,58,132,0.45) ≈ #0B2959.\n     We push toward the bloom end so the box feels part of the hero family,\n     not a disconnected dark slab. Plus complex layered texture matching the hero. */\n  .lb-intro .op-console {\n    background:\n      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(131, 228, 255, 0.10) 0%, transparent 60%),\n      radial-gradient(ellipse 50% 60% at 15% 90%, rgba(39, 163, 253, 0.10) 0%, transparent 65%),\n      linear-gradient(135deg, #0F1E47 0%, #1A3068 100%);\n    border-color: rgba(131, 228, 255, 0.16);\n    box-shadow:\n      0 32px 80px rgba(2, 58, 132, 0.32),\n      inset 0 1px 0 rgba(255, 255, 255, 0.06);\n  }\n  .lb-intro .op-console-head {\n    background: rgba(255, 255, 255, 0.025);\n    border-bottom-color: rgba(255, 255, 255, 0.07);\n  }\n  .lb-intro .op-row {\n    border-bottom-color: rgba(255, 255, 255, 0.05);\n  }\n  .lb-intro {\n    max-width: var(--page-max); margin: 0 auto;\n    display: grid; grid-template-columns: 0.9fr 1.1fr;\n    gap: 48px; align-items: start;\n  }\n  .lb-intro h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(32px, 4vw, 52px);\n    letter-spacing: -0.025em; line-height: 1.05;\n    color: var(--text-primary); margin: 0 0 20px 0;\n  }\n  .lb-intro .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary); margin-bottom: 18px;\n  }\n  .lb-intro .eyebrow::before { content: ''; width: 24px; height: 1px; background: currentColor; }\n  .lb-intro p {\n    font-size: 16px; color: var(--text-body); line-height: 1.65; margin: 0 0 12px 0;\n  }\n\n  /* ========== PROOF LEDGER · TINT bg + DARK cards — evt_2026_04_17_008: section demoted to light-surface with dark proof cards; full-dark reserved for Close finale ========== */\n  .lb-proof { padding: 112px 32px; background: var(--bg-tint); position: relative; overflow: hidden; }\n  .lb-proof-inner { max-width: var(--page-max); margin: 0 auto; position: relative; z-index: 1; }\n  /* Counter \"moment\": soft brand-blue radial aura behind the head block so the 1.4M+ has presence in tint space */\n  .lb-proof-head {\n    position: relative;\n    margin-bottom: 56px;\n    padding: 12px 0 24px;\n    text-align: center;\n  }\n  .lb-proof-head::before {\n    content: ''; position: absolute;\n    top: -20px; bottom: -20px;\n    left: 50%; transform: translateX(-50%);\n    width: min(720px, 90%);\n    background:\n      radial-gradient(ellipse 60% 80% at 50% 50%, rgba(39, 163, 253, 0.16) 0%, transparent 70%),\n      radial-gradient(ellipse 30% 60% at 50% 50%, rgba(2, 58, 132, 0.10) 0%, transparent 70%);\n    pointer-events: none;\n    z-index: -1;\n  }\n  .lb-proof-head .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary); margin-bottom: 14px;\n  }\n  .lb-proof-head .eyebrow::before {\n    content: ''; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--status-live); box-shadow: 0 0 8px var(--status-live);\n  }\n  .lb-counter {\n    font-family: 'JetBrains Mono', monospace; font-weight: 700;\n    font-size: clamp(64px, 9v (255,255,255,0.56);\n    letter-spacing: 0.10em; text-transform: uppercase;\n  }\n  .proof-desc {\n    font-size: 13px; line-height: 1.55;\n    color: rgba(255,255,255,0.72);\n    margin: auto 0 0 0;\n  }\n\n  /* ========== ANATOMY OF A CALL · phase strip + operator console as visual anchor — restores canonical spine Section 4 ========== */\n  .lb-anatomy { padding: 112px 32px; background: white; }\n  .lb-anatomy-inner { max-width: 1360px; margin: 0 auto; }\n  .lb-anatomy-head { text-align: center; margin-bottom: 56px; }\n  .lb-anatomy-head .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary); margin-bottom: 18px;\n  }\n  .lb-anatomy-head h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(32px, 4vw, 52px);\n    letter-spacing: -0.025em; line-height: 1.05;\n    color: var(--text-primary); margin: 0 0 16px 0;\n  }\n  .lb-anatomy-head p {\n    font-size: 16px; color: var(--text-body); line-height: 1.65;\n    max-width: 640px; margin: 0 auto;\n  }\n  /* Thin flow-line band — subordinated connective tissue (2026-04-17): was full section-presence phase diagram; now reads as a labeled rail before the load-bearing cards + console below. Preserves three-abstraction-level pattern (concept → exemplar → live) without competing for stature. */\n  .lb-phase-band {\n    position: relative; margin: 0 auto 36px;\n    max-width: 880px; height: 80px;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 8px;\n  }\n  .lb-phase-band::before {\n    content: ''; position: absolute; left: 20px; right: 20px; top: 50%;\n    height: 1px; transform: translateY(-0.5px);\n    background: linear-gradient(to right,\n      rgba(0,98,233,0.18) 0%,\n      rgba(39,163,253,0.42) 50%,\n      rgba(131,228,255,0.55) 100%);\n  }\n  .lb-phase-pip {\n    position: relative; z-index: 1;\n    display: i :\n      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(131, 228, 255, 0.10) 0%, transparent 60%),\n      radial-gradient(ellipse 50% 60% at 15% 90%, rgba(39, 163, 253, 0.10) 0%, transparent 65%),\n      linear-gradient(135deg, #0F1E47 0%, #1A3068 100%);\n    border-color: rgba(131, 228, 255, 0.16);\n    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);\n  }\n  .lb-anatomy .op-console-head {\n    background: rgba(255, 255, 255, 0.025);\n    border-bottom-color: rgba(255, 255, 255, 0.07);\n    padding: 20px 28px;\n  }\n  .lb-anatomy .op-console-head .title {\n    display: flex; flex-direction: column; gap: 2px;\n  }\n  .lb-anatomy .op-title-main {\n    font-size: 13px; font-weight: 600; color: var(--text-on-dark);\n    letter-spacing: 0.02em;\n  }\n  .lb-anatomy .op-title-sub {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--text-on-dark-muted);\n  }\n  /* Summary metrics band */\n  .op-metrics {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    padding: 14px 28px;\n    background: rgba(255, 255, 255, 0.02);\n    border-bottom: 1px solid rgba(255, 255, 255, 0.05);\n    gap: 20px;\n  }\n  .op-metric { display: flex; flex-direction: column; gap: 4px; }\n  .op-metric-value {\n    font-family: 'JetBrains Mono', monospace; font-weight: 700;\n    font-size: 20px; color: var(--text-on-dark);\n    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;\n  }\n  .op-metric-label {\n    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--text-on-dark-muted);\n  }\n  /* Column headers */\n  .op-rows-head {\n    display: grid;\n    grid-template-columns: 16px 1.4fr 1.4fr 2.2fr 60px;\n    gap: 16px; align-items: center;\n    padding: 10px 28px;\n    background: rgba(255, 255, 255, 0.015);\n    border-bottom: 1px solid rgba(255, 255, 255, 0.04);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--text-on-dark-muted);\n  }\n  .op-rows-head > div:first-child { /* matches the 16px pulse column */ }\n  /* New enriched row */\n  .op-row-v2 {\n    display: grid;\n    grid-template-columns: 16px 1.4fr 1.4fr 2.2fr 60px;\n    gap: 16px; align-items: center;\n    padding: 16px 28px;\n    border-bottom: 1px solid rgba(255, 255, 255, 0.04);\n  }\n  .op-row-v2:last-child { border-bottom: none; }\n  .op-row-pulse {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: #10B981;\n    box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);\n    position: relative;\n  }\n  .op-row-pulse::before {\n    content: ''; position: absolute; inset: 0; border-radius: 50%;\n    background: #10B981; opacity: 0.4;\n    animation: opPulse 1.8s cubic-bezier(0,0,0.2,1) infinite;\n  }\n  @keyframes opPulse {\n    0% { transform: scale(1); opacity: 0.4; }\n    100% { transform: scale(2.4); opacity: 0; }\n  }\n  .op-row-caller { display: flex; flex-direction: column; gap: 3px; }\n  .op-row-phone {\n    font-family: 'JetBrains Mono', monospace; font-size: 13px;\n    color: var(--text-on-dark); font-variant-numeric: tabular-nums;\n    letter-spacing: -0.01em;\n  }\n  .op-row-dir {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--text-on-dark-muted); letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n  .op-row-dep { display: flex; flex-direction: column; gap: 3px; }\n  .op-row-dep-name {\n    font-family: 'JetBrains Mono', monospace; font-size: 12px;\n    color: var(--text-on-dark-body); letter-spacing: -0.01em;\n  }\n  .op-row-dep-tag {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--brand-highlight); letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n  .op-row-status-col {\n    display: flex; flex-direction: row; align-items: center; gap: 12px;\n    min-width: 0;\n  }\n  .op-row-wave {\n    display: in  1px solid rgba(139, 92, 246, 0.30);\n  }\n  .op-row-context {\n    color: var(--text-on-dark-body);\n    font-weight: 500; letter-spacing: 0.01em; text-transform: none;\n    font-size: 11px;\n  }\n  .op-row-dur-v2 {\n    font-family: 'JetBrains Mono', monospace; font-size: 13px;\n    color: var(--text-on-dark-body); font-variant-numeric: tabular-nums;\n    text-align: right;\n  }\n  /* Hide the legacy .op-row class styling from this operator console since we use op-row-v2 */\n  .lb-anatomy .op-row { display: none; }\n\n  /* ========== COMPLIANCE · expanded section (per 2026-04-17 Sprinto content integration — 3-row: frame / pill clusters / sub-processors + actions) ========== */\n  .lb-compliance {\n    padding: 96px 32px;\n    background: var(--bg-tint);\n    border-top: 1px solid var(--border-light);\n    border-bottom: 1px solid var(--border-light);\n  }\n  .lb-compliance-inner {\n    max-width: var(--page-max); margin: 0 auto;\n    display: flex; flex-direction: column; gap: 40px;\n  }\n  .lb-compliance-head {\n    display: flex; flex-direction: column; gap: 12px;\n    max-width: 720px;\n  }\n  .lb-compliance .eyebrow {\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary);\n  }\n  .lb-compliance-head h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(28px, 3vw, 40px); line-height: 1.15;\n    letter-spacing: -0.015em;\n    color: var(--text-primary);\n    margin: 0;\n  }\n  .lb-compliance-head p {\n    font-size: 16px; line-height: 1.55;\n    color: var(--text-subtle);\n    margin: 0; max-width: 620px;\n  }\n  .lb-compliance-clusters {\n    display: flex; flex-direction: column; gap: 20px;\n    padding: 28px 0;\n    border-top: 1px solid rgba(2,58,132,0.08);\n    border-bottom: 1px solid rgba(2,58,132,0.08);\n  }\n  .lb-compliance-cluster { display: flex; flex-direction: column; gap: 12px; }\n  .lb-compliance-cluster-label {\n    font-family: 'JetBrains Mon display: inline-flex; align-items: center; gap: 8px;\n    padding: 12px 20px; border-radius: 10px;\n    background: var(--brand-primary); color: white;\n    font-size: 14px; font-weight: 600;\n    transition: background var(--t-snap);\n    white-space: nowrap;\n  }\n  .lb-compliance-link:hover { background: var(--brand-deep); color: white; }\n  .lb-compliance-link-muted {\n    font-size: 14px; color: var(--text-subtle); font-weight: 500;\n    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;\n    transition: color var(--t-snap);\n  }\n  .lb-compliance-link-muted:hover { color: var(--brand-primary); }\n\n  /* ========== CLOSE · DARK PANEL INSIDE LIGHT SECTION — bookends the hero.\n     Before: full-bleed dark section. After: white section with a dark navy panel inside,\n     matching the hero's panel-in-section idiom. Page now opens AND closes with the same\n     gesture — a dark panel sitting inside the white page. 2026-04-18 signature move. ========== */\n  .lb-close {\n    padding: 40px 32px 96px;\n    background: linear-gradient(to top, #FFFFFF 0%, #F7FAFF 100%);\n    color: var(--ink);\n    position: relative;\n    overflow: visible;\n    border-top: 1px solid var(--rule-hair);\n  }\n  .lb-close::before { display: none; }\n  .lb-close-inner {\n    max-width: var(--page-max);\n    margin: 0 auto;\n    background: var(--bg-dark);\n    border-radius: 28px;\n    padding: 72px 64px 64px;\n    position: relative;\n    overflow: hidden;\n    /* Mirror of hero's shadow (same one kept-moment we committed to) */\n    box-shadow: 0 40px 80px rgba(2, 58, 132, 0.18);\n    color: white;\n    z-index: 1;\n  }\n  /* Close panel's radial gradient — MIRRORED from hero so the visual symmetry is felt:\n     hero has brand-blue in bottom-left + cyan in top-right. Close has them swapped:\n     cyan lift at bottom-right (pointing to CTAs) + brand-blue gravity top-left.\n     This reads as \"coming home\" not \"same as hero.\" */\n  .lb-close-inner::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    border-radius: 28px;\n    background:\n      radial-gradient(ellipse 55% 45% at 22% 82%, rgba(131, 228, 255, 0.22) 0%, transparent 55%),\n      radial-gradient(ellipse 45% 45% at 88% 12%, rgba(2, 58, 132, 0.55) 0%, transparent 55%),\n      radial-gradient(ellipse 30% 30% at 25% 25%, rgba(39, 163, 253, 0.20) 0%, transparent 60%),\n      radial-gradient(ellipse 25% 30% at 65% 65%, rgba(2, 58, 132, 0.30) 0%, transparent 70%);\n  }\n  .lb-close-row {\n    display: grid; grid-template-columns: 1.2fr 0.9fr; gap: 56px; align-items: center;\n    margin-bottom: 48px;\n    position: relative; z-index: 1;\n  }\n  .lb-close .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-highlight); margin-bottom: 18px;\n  }\n  .lb-close .eyebrow::before {\n    content: ''; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--status-eval);\n    box-shadow: 0 0 8px var(--status-eval);\n  }\n  .lb-close h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(32px, 4vw, 52px);\n    letter-spacing: -0.025em; line-height: 1.05;\n    color: white; margin: 0 0 16px 0;\n  }\n  .lb-close p {\n    font-size: 17px; line-height: 1.65;\n    color: rgba(255,255,255,0.82); margin: 0;\n  }\n  .lb-close .ctas {\n    display: flex; flex-direction: column; gap: 12px; align-items: flex-end;\n  }\n  .lb-close-anchors {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;\n    background: rgba(255,255,255,0.08);\n    border: 1px solid rgba(255,255,255,0.12);\n    border-radius: 12px; overflow: hidden;\n  }\n  .lb-close-anchor {\n    background: var(--bg-dark);\n    padding: 20px 24px;\n  }\n  .lb-close-anchor .name {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: 14px; color: white; margin-bottom: 6px;\n  }\n  .lb-close-anchor .desc {\n    font-size: 12px; line-height: 1.55;\n    color: rgba(255,255,255,0.66); margin: 0;\n  }\n  /* Agency-routing sub-line below trust anchors — rescues page-end scrollers\n     who missed Deployment Paths door (evt_2026_04_17_016, qualification-preserve gesture). */\n  .lb-close-agency-line {\n    margin-top: 32px;\n    padding-top: 18px;\n    border-top: 1px solid rgba(255,255,255,0.08);\n    text-align: center;\n    font-size: 13px; color: rgba(255,255,255,0.56);\n  }\n  .lb-close-agency-line a {\n    color: var(--brand-highlight);\n    margin-left: 8px; font-weight: 500;\n    transition: color var(--t-snap);\n  }\n  .lb-close-agency-line a:hover { color: white; text-decoration: underline; }\n\n  /* CLOSE · Working session agenda strip — visual anchor for the close.\n     Five numbered beats of the 90-minute working session, echoing the Story\n     section's phase progression pattern. Cyan numerals on dark navy with a\n     soft hairline border and subtle internal dividers, matching the gutter chips\n     elsewhere on the page. Added 2026-04-17 to fix \"empty navy\" close problem. */\n  .lb-close-agenda {\n    list-style: none;\n    padding: 0;\n    margin: 40px 0 0 0;\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    border: 1px solid rgba(255,255,255,0.10);\n    border-radius: 14px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.00) 100%);\n    overflow: hidden;\n    position: relative; z-index: 1;\n  }\n  .lb-close-agenda > li {\n    position: relative;\n    padding: 22px 22px 20px;\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    align-items: flex-start;\n  }\n  .lb-close-agenda > li + li::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 16px; bottom: 16px;\n    width: 1px;\n    background: rgba(255,255,255,0.08);\n  }\n  .lb-close-agenda .num {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.16em;\n    color: var(--brand-highlight);\n  }\n  .lb-close-agenda .beat {\n    font-family: 'Urbanist', sans-serif;\n    font-size: 15px;\n    font-weight: 600;\n    line-height: 1.3;\n    color: white;\n    letter-spacing: -0.005em;\n  }\n  .lb-close-agenda .min {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px;\n    font-weight: 500;\n    letter-spacing: 0.08em;\n    color: rgba(255,255,255,0.48);\n    margin-top: auto;\n  }\n  @media (max-width: 900px) {\n    .lb-close-agenda { grid-template-columns: 1fr 1fr; }\n    .lb-close-agenda > li:nth-child(odd)::before { display: none; }\n    .lb-close-agenda > li:nth-child(3)::before,\n    .lb-close-agenda > li:nth-child(5)::before {\n      content: '';\n      position: absolute;\n      left: 16px; right: 16px; top: 0;\n      height: 1px; width: auto;\n      background: rgba(255,255,255,0.08);\n    }\n  }\n  @media (max-width: 560px) {\n    .lb-close-agenda { grid-template-columns: 1fr; }\n    .lb-close-agenda > li + li::before {\n      left: 16px; right: 16px; top: 0;\n      width: auto; height: 1px;\n      background: rgba(255,255,255,0.08);\n    }\n  }\n\n  /* ========== DEPLOYMENT PATHS · split card (Enterprise dominant + Agency first-class) — restores canonical spine Section 5 ========== */\n  .lb-deploy { padding: 112px 32px; background: white; }\n  .lb-deploy-inner { max-width: var(--page-max); margin: 0 auto; }\n  .lb-deploy-head { text-align: center; margin-bottom: 56px; }\n  .lb-deploy-head .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--brand-primary); margin-bottom: 20px;\n  }\n  .lb-deploy-head h2 {\n    font-family: 'Urbanist', sans-serif; font-weight: 600;\n    font-size: clamp(32px, 4vw, 52px);\n    letter-spacing: -0.025em; line-height: 1.05;\n    color: var(--text-primary); margin: 0 0 16px 0;\n  }\n  .lb-deploy-head p {\n    font-size: 16px; color: var(--text-body); line-height: 1.65;\n    max-width: 640px; margin: 0 auto;\n  }\n  .lb-deploy-grid {\n    display: grid; grid-template-columns: 1.25fr 0.75fr;\n    gap: 24px;\n  }\n  .lb-deploy-card {\n    border-radius: 20px;\n    padding: 44px 40px;\n    display: flex; flex-direction: column; gap: 20px;\n    position: relative; overflow: hidden;\n    min-height: 480px;\n  }\n  .lb-deploy-card.enterprise {\n    background: #0A1630;\n    color: white;\n  }\n  .lb-deploy-card.enterprise::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    background:\n      radial-gradient(ellipse 60% 50% at 85% 15%, rgba(131, 228, 255, 0.14) 0%, transparent 60%),\n      radial-gradient(ellipse 50% 50% at 15% 90%, rgba(2, 58, 132, 0.40) 0%, transparent 60%);\n  }\n  .lb-deploy-card.enterprise::after {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);\n    background-size: 28px 28px; opacity: 0.7;\n    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);\n  }\n  /* ═══ AGENCY CARD · committed fill ═══\n     Dusted steel-blue — slightly greyed cobalt, reads as premium/editorial.\n     Sits between Enterprise black and Solo white without competing with either. */\n  .lb-deploy-card.agency {\n    background: #7DC3EA;\n    border: 1px solid rgba(10, 18, 32, 0.12);\n    box-shadow: none;\n  }\n  .lb-deploy-card.agency::before,\n  .lb-deploy-card.agency::after { display: none !important; }\n  .lb-deploy-card.agency .card-eyebrow { color: #0B2540 !important; }\n  .lb-deploy-card.agency h3 { color: #0B1220 !important; }\n  .lb-deploy-card.agency .card-body { color: rgba(11, 18, 32, 0.82) !important; }\n  .lb-deploy-card.agency ul li { color: rgba(11, 18, 32, 0.82) !important; }\n  .lb-deploy-card.agency ul li::before { background: #0B2540 !important; }\n  /* CTA button on the sky-blue Agency card — black fill, white
